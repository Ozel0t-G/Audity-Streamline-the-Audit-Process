name: Publish Audity Images

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and publish ${{ matrix.image }}
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: audity-web
            dockerfile: ./audity/apps/web/Dockerfile
          - image: audity-api
            dockerfile: ./audity/apps/api/Dockerfile
          - image: audity-worker
            dockerfile: ./audity/apps/worker/Dockerfile
          - image: audity-updater
            dockerfile: ./audity/apps/updater/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read production version
        id: release
        shell: bash
        run: |
          version="$(node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('./audity/update-channel.json','utf8')); if (manifest.channel !== 'production' || manifest.branch !== 'production') throw new Error('update-channel.json must target production'); if (!/^\\d+\\.\\d+\\.\\d+([+-].*)?$/.test(manifest.version)) throw new Error('Production version must be SemVer'); process.stdout.write(manifest.version)")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${owner}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=production
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./audity
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
