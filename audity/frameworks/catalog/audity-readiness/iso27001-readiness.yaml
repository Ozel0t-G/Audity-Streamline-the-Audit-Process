domains:
  - id: SCOPE-AND-CONTEXT
    name: Scope and Context
    description: Audity readiness domain for scope and context activities.
    controls:
      - id: ISO-RDY-001
        title: ISMS scope and boundaries
        description: Confirm that the assessment has a clear organizational, technical, and process boundary.
        question: Is the business scope of the security management system documented in plain language?
        objective: Confirm that the assessment has a clear organizational, technical, and process boundary.
        defaultWeight: 1
        readinessPassCondition: average_question_score >= 3 and at least one relevant evidence item approved
        gapCondition: average_question_score <= 2 or required evidence is absent, stale, rejected, or unverifiable
        criticalityHint: raise weight for crown-jewel, regulated, customer-facing, privileged, safety-relevant, or
          production-critical scope
        reportMapping:
          executive_summary: true
          domain_heatmap: Scope and Context
          evidence_appendix: true
          priority_gap_candidate: true
        evidenceExamples:
          - Scope statement
          - System/service inventory extract
          - Boundary diagram
          - Exclusion rationale
        tags:
          - audity-native-readiness
          - audity.iso27001.readiness.2022
        licensedMappingSlots:
          - framework_family: ISO/IEC 27001:2022
            official_text_included: false
            tenant_reference_id: null
            tenant_control_title: null
            tenant_import_source: tenant_provided_licensed_content_only
            mapping_status: empty_until_tenant_imports_licensed_content
        questions:
          - id: Q-ISO-RDY-001-01
            text: Is the business scope of the security management system documented in plain language?
            answerScale: 0,1,2,3,4,NA
            minimumEvidenceExpected: 1
            preferredEvidenceTypes:
              - Scope statement
              - System/service inventory extract
              - Boundary diagram
            gapTrigger: score <= 2 or missing approved evidence
          - id: Q-ISO-RDY-001-02
            text: Are excluded sites, teams, systems, and services explicitly listed with a reason?
