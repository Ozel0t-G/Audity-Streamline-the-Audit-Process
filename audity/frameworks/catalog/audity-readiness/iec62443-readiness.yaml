domains:
  - id: OT-GOVERNANCE-AND-SCOPE
    name: OT Governance and Scope
    description: Audity readiness domain for ot governance and scope activities.
    controls:
      - id: IEC-RDY-001
        title: OT scope and process criticality
        description: Define which industrial processes, locations, systems, and operational boundaries are in scope.
        question: Are plants, lines, cells, systems, and remote sites included or excluded from the OT assessment scope?
        objective: Define which industrial processes, locations, systems, and operational boundaries are in scope.
        defaultWeight: 1
        readinessPassCondition: average_question_score >= 3 and at least one relevant evidence item approved
        gapCondition: average_question_score <= 2 or required evidence is absent, stale, rejected, or unverifiable
        criticalityHint: raise weight for crown-jewel, regulated, customer-facing, privileged, safety-relevant, or
          production-critical scope
        reportMapping:
          executive_summary: true
          domain_heatmap: OT Governance and Scope
          evidence_appendix: true
          priority_gap_candidate: true
        evidenceExamples:
          - OT scope map
          - Process criticality register
          - Site list
          - Business impact notes
        tags:
          - audity-native-readiness
          - audity.iec62443.readiness
        licensedMappingSlots:
          - framework_family: IEC 62443 series
            official_text_included: false
            tenant_reference_id: null
            tenant_control_title: null
            tenant_import_source: tenant_provided_licensed_content_only
            mapping_status: empty_until_tenant_imports_licensed_content
        questions:
          - id: Q-IEC-RDY-001-01
            text: Are plants, lines, cells, systems, and remote sites included or excluded from the OT assessment scope?
            answerScale: 0,1,2,3,4,NA
            minimumEvidenceExpected: 1
            preferredEvidenceTypes:
              - OT scope map
              - Process criticality register
              - Site list
            gapTrigger: score <= 2 or missing approved evidence
          - id: Q-IEC-RDY-001-02
