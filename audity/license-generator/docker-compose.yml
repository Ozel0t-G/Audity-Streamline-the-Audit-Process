# Eigenständige Docker-Installation für den Audity License Generator.
#
#   cd license-generator
#   docker compose up -d --build
#   → http://127.0.0.1:4000
#
# Nur an 127.0.0.1 gebunden — der Generator hält den Private-Key und darf NIE
# über ein Netzwerk erreichbar sein.

services:
  license-generator:
    build: .
    image: audity-license-generator
    container_name: audity-license-generator
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      # Privater/öffentlicher Signaturschlüssel vom Hauptprojekt (read-only).
      - ../Keys:/keys:ro
    environment:
      PORT: 4000
      LICENSE_PRIVATE_KEY_FILE: /keys/license_signing.pem
      LICENSE_PUBLIC_KEY_FILE: /keys/license_signing.pub.pem
      # Optionaler einfacher Schutz: wenn gesetzt, verlangt das Formular dieses Passwort.
      LICENSE_GEN_TOKEN: ${LICENSE_GEN_TOKEN:-}
    restart: unless-stopped
