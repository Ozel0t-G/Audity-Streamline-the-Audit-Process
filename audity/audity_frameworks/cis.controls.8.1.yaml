domains:
  - id: foundational
    name: "Foundational Hygiene (Controls 1-6)"
    description: |
      Asset and identity foundations: inventories, data protection,
      configuration, accounts, and access control.
    controls:
      - id: cis.controls.8.1:C-01
        title: "Inventory and Control of Enterprise Assets"
        weight: 3
        answerType: scale
        tags: [asset-management, inventory, discovery, hardware]
        question: |
          Does the enterprise actively manage all hardware assets so
          that only authorized assets are present and unauthorized
          assets are found and addressed?
        purpose: |
          You cannot defend what you do not know exists. Asset
          inventory underpins patching, monitoring, and incident scope.
        expectedOutcome:
          - "Inventory of enterprise assets is maintained (IG1)."
          - "Inventory reconciliation against discovery runs (IG2)."
          - "Active and passive discovery cover transient assets (IG3)."
        howTo:
          - step: "Maintain a central asset inventory"
          - step: "Reconcile inventory against discovery"
          - step: "Address unauthorized assets"
        evidenceExamples:
          - "Asset inventory extract"
          - "Reconciliation report"
          - "Unauthorized asset handling log"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No inventory"
            "3": "Inventory partial"
            "5": "Inventory + discovery + handling"
        crossReferences:
          - nist-csf-2.0:ID.AM-01

      - id: cis.controls.8.1:C-02
        title: "Inventory and Control of Software Assets"
        weight: 3
        answerType: scale
        tags: [asset-management, software, allowlisting]
        question: |
          Does the enterprise actively manage all software so that only
          authorized software is installed and can execute?
        purpose: |
          Unauthorized software is one of the largest sources of
          vulnerability. Active management closes that path.
        expectedOutcome:
          - "Software inventory is maintained (IG1)."
          - "Unauthorized software is uninstalled (IG1)."
          - "Application allowlisting enforces approved software (IG2/IG3)."
        howTo:
          - step: "Maintain software inventory"
          - step: "Uninstall unauthorized software"
          - step: "Enforce application allowlisting"
        evidenceExamples:
          - "Software inventory"
          - "Uninstall log"
          - "Allowlisting configuration"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No software control"
            "3": "Partial"
            "5": "Inventory + allowlisting"
        crossReferences:
          - nist-csf-2.0:ID.AM-02

      - id: cis.controls.8.1:C-03
        title: "Data Protection"
        weight: 3
        answerType: scale
        tags: [data, classification, encryption, dlp, retention]
        question: |
          Does the enterprise classify, handle, retain, and dispose of
          data securely, with technical safeguards (encryption, DLP)
          aligned with classification?
        purpose: |
          Data is the asset that adversaries are after. Comprehensive
          data protection from classification through disposal limits
          impact.
        expectedOutcome:
          - "Data inventory and classification exist (IG1)."
          - "Encryption protects data-at-rest and data-in-transit (IG2)."
          - "DLP enforces handling at egress (IG3)."
        howTo:
          - step: "Inventory and classify data"
          - step: "Encrypt sensitive data at rest and in transit"
          - step: "Enforce DLP at egress"
        evidenceExamples:
          - "Data inventory"
          - "Encryption coverage report"
          - "DLP configuration"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Data unprotected"
            "3": "Partial"
            "5": "Comprehensive"
        crossReferences:
          - iso27001:A.5.12

      - id: cis.controls.8.1:C-04
        title: "Secure Configuration of Enterprise Assets and Software"
        weight: 3
        answerType: scale
        tags: [configuration, hardening, baseline, drift]
        question: |
          Does the enterprise establish and maintain secure configuration
          of assets (end-user devices, servers, network devices) and
          software through baselines and drift management?
        purpose: |
          Default configurations are typically insecure. Hardened
          baselines and drift control restore configuration as a
          reliable control.
        expectedOutcome:
          - "Hardening baselines exist per platform (IG1)."
          - "Drift is detected and remediated (IG2)."
          - "Automated remediation is in use (IG3)."
        howTo:
          - step: "Establish hardening baselines per platform"
          - step: "Detect and remediate drift"
          - step: "Automate remediation"
        evidenceExamples:
          - "Baseline definitions"
          - "Drift report"
          - "Remediation automation"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No baselines"
            "3": "Baselines, no drift"
            "5": "Baselines + drift + automation"
        crossReferences:
          - iso27001:A.8.9

      - id: cis.controls.8.1:C-05
        title: "Account Management"
        weight: 3
        answerType: scale
        tags: [iam, accounts, lifecycle]
        question: |
          Does the enterprise manage authorization for user, admin, and
          service accounts (creation, modification, disablement) under
          documented processes?
        purpose: |
          Account lifecycle gaps, especially failure to disable, are the
          dominant root cause of account-related breaches.
        expectedOutcome:
          - "Inventory of accounts is maintained (IG1)."
          - "Dormant accounts are disabled (IG1)."
          - "Centralized account management is in use (IG2)."
        howTo:
          - step: "Maintain inventory of accounts"
          - step: "Disable dormant accounts"
          - step: "Centralize account management"
        evidenceExamples:
          - "Account inventory"
          - "Dormant disablement log"
          - "Central management evidence"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Unmanaged accounts"
            "3": "Partial"
            "5": "Centralized + dormant disabled"
        crossReferences:
          - iso27001:A.5.16

      - id: cis.controls.8.1:C-06
        title: "Access Control Management"
        weight: 3
        answerType: scale
        tags: [access-control, authorization, mfa, least-privilege]
        question: |
          Does the enterprise grant and revoke access following
          principles of least privilege and using MFA for external,
          remote, and privileged access?
        purpose: |
          Access decisions are the single most-audited area. Discipline
          here determines the strength of every downstream control.
        expectedOutcome:
          - "Access grant / revoke processes are documented (IG1)."
          - "MFA enforced for external, admin, and remote access (IG1/IG2)."
          - "Role-based access reviewed periodically (IG2/IG3)."
        howTo:
          - step: "Document access grant / revoke processes"
          - step: "Enforce MFA for external, admin, and remote access"
          - step: "Review role-based access periodically"
        evidenceExamples:
          - "Access management process"
          - "MFA enforcement report"
          - "Access review report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No access control"
            "3": "Partial"
            "5": "Documented + MFA + reviewed"
        crossReferences:
          - iso27001:A.5.15

  - id: defensive-operations
    name: "Defensive Operations (Controls 7-13)"
    description: |
      Vulnerability management, logging, browser / email defense,
      malware defense, data recovery, network management and
      monitoring.
    controls:
      - id: cis.controls.8.1:C-07
        title: "Continuous Vulnerability Management"
        weight: 3
        answerType: scale
        tags: [vulnerability, patching, scanning]
        question: |
          Does the enterprise continuously identify, prioritize, and
          remediate vulnerabilities across enterprise assets?
        purpose: |
          The window between vulnerability disclosure and exploitation
          continues to shrink. Continuous management is what keeps the
          window manageable.
        expectedOutcome:
          - "Vulnerability scanning runs on a defined cadence (IG1)."
          - "Findings are prioritized and remediated under SLA (IG2)."
          - "Risk-based prioritization integrates intelligence (IG3)."
        howTo:
          - step: "Run scheduled vulnerability scans"
          - step: "Prioritize and remediate under SLA"
          - step: "Integrate intelligence for prioritization"
        evidenceExamples:
          - "Scan reports"
          - "SLA compliance metric"
          - "Risk-based prioritization design"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No VM"
            "3": "Scanning without SLA"
            "5": "SLA + prioritization"
        crossReferences:
          - iso27001:A.8.8

      - id: cis.controls.8.1:C-08
        title: "Audit Log Management"
        weight: 3
        answerType: scale
        tags: [logging, audit, retention, integrity]
        question: |
          Does the enterprise collect, alert on, review, and retain
          audit logs across enterprise assets?
        purpose: |
          Logs underpin detection, investigation, and accountability.
          Centralized, retained, integrity-protected logs make all
          three feasible.
        expectedOutcome:
          - "Audit logging is enabled on enterprise assets (IG1)."
          - "Logs are centralized and retained (IG2)."
          - "Anomalies trigger review (IG2/IG3)."
        howTo:
          - step: "Enable audit logging on assets"
          - step: "Centralize and retain logs"
          - step: "Configure anomaly review"
        evidenceExamples:
          - "Logging coverage report"
          - "Central log store configuration"
          - "Anomaly review log"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No logs"
            "3": "Logs not central"
            "5": "Central + retained + reviewed"
        crossReferences:
          - iso27001:A.8.15

      - id: cis.controls.8.1:C-09
        title: "Email and Web Browser Protections"
        weight: 2
        answerType: scale
        tags: [email, browser, filtering, phishing]
        question: |
          Does the enterprise reduce attack surface and exposure for
          users from email and web browsing?
        purpose: |
          Email and web browsing remain the top initial-access vectors.
          Targeted defenses on these channels yield high risk reduction.
        expectedOutcome:
          - "Supported / patched browser and email client only (IG1)."
          - "DNS filtering and URL filtering in place (IG2)."
          - "Email DMARC / DKIM / SPF enforced (IG2)."
        howTo:
          - step: "Standardize on supported and patched browser / email clients"
          - step: "Deploy DNS / URL filtering"
          - step: "Enforce DMARC / DKIM / SPF"
        evidenceExamples:
          - "Browser / email standard"
          - "Filtering configuration"
          - "DMARC report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 18
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Few protections"
            "3": "Partial"
            "5": "All three pillars"
        crossReferences:
          - iso27001:A.8.23

      - id: cis.controls.8.1:C-10
        title: "Malware Defenses"
        weight: 3
        answerType: scale
        tags: [malware, edr, anti-malware, endpoint]
        question: |
          Does the enterprise prevent or control the installation,
          spread, and execution of malicious applications, code, or
          scripts on enterprise assets?
        purpose: |
          Malware remains a dominant impact vector. Anti-malware /
          EDR coverage is the operational baseline.
        expectedOutcome:
          - "Anti-malware is deployed and current (IG1)."
          - "EDR is deployed (IG2)."
          - "Behavior-based detection is tuned (IG3)."
        howTo:
          - step: "Deploy anti-malware on all endpoints"
          - step: "Deploy EDR with central management"
          - step: "Tune behavior-based detection"
        evidenceExamples:
          - "Anti-malware coverage"
          - "EDR coverage"
          - "Tuning log"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No protection"
            "3": "Partial"
            "5": "Anti-malware + EDR"
        crossReferences:
          - iso27001:A.8.7

      - id: cis.controls.8.1:C-11
        title: "Data Recovery"
        weight: 3
        answerType: scale
        tags: [backup, recovery, ransomware]
        question: |
          Does the enterprise establish and maintain data recovery
          practices sufficient to restore in-scope assets to a known
          good state?
        purpose: |
          Data recovery is the strongest control against destructive
          incidents. Untested recovery is unverified.
        expectedOutcome:
          - "Backup process is documented (IG1)."
          - "Backups are protected and tested (IG2)."
          - "Recovery is tested for in-scope assets (IG3)."
        howTo:
          - step: "Document backup process and frequency"
          - step: "Protect and verify backups"
          - step: "Test recovery"
        evidenceExamples:
          - "Backup policy"
          - "Backup protection design"
          - "Recovery test report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No recovery"
            "3": "Untested"
            "5": "Tested + protected"
        crossReferences:
          - iso27001:A.8.13

      - id: cis.controls.8.1:C-12
        title: "Network Infrastructure Management"
        weight: 2
        answerType: scale
        tags: [network, devices, configuration]
        question: |
          Does the enterprise establish, implement, and actively manage
          network devices in order to prevent attackers from exploiting
          vulnerable network services and access points?
        purpose: |
          Network devices are often the longest-lived and most-skipped
          asset category for hardening. Active management changes that.
        expectedOutcome:
          - "Network infrastructure is current and supported (IG1)."
          - "Architecture is documented (IG2)."
          - "Network devices follow baselines and are monitored (IG2/IG3)."
        howTo:
          - step: "Maintain network infrastructure on current versions"
          - step: "Document network architecture"
          - step: "Baseline and monitor network devices"
        evidenceExamples:
          - "Network device inventory"
          - "Architecture diagram"
          - "Baseline configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Unmanaged"
            "3": "Partial"
            "5": "Inventoried + baselined"

      - id: cis.controls.8.1:C-13
        title: "Network Monitoring and Defense"
        weight: 3
        answerType: scale
        tags: [monitoring, network, ids, soc]
        question: |
          Does the enterprise operate processes and tooling to establish
          and maintain comprehensive network monitoring and defense
          against security threats?
        purpose: |
          Network monitoring is one of the broadest detection signals.
          Defense in addition to detection limits attacker dwell.
        expectedOutcome:
          - "Network monitoring covers in-scope traffic (IG2)."
          - "NIDS / NIPS deployed (IG2)."
          - "Centralized analysis and response are in place (IG3)."
        howTo:
          - step: "Cover in-scope traffic with monitoring"
          - step: "Deploy NIDS / NIPS"
          - step: "Centralize analysis and response"
        evidenceExamples:
          - "Monitoring coverage map"
          - "NIDS / NIPS configuration"
          - "SOC playbook"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No monitoring"
            "3": "Partial"
            "5": "Coverage + IDS + SOC"
        crossReferences:
          - iso27001:A.8.16

  - id: organizational-operations
    name: "Organizational Operations (Controls 14-18)"
    description: |
      Awareness and training, service provider management, application
      security, incident response, and penetration testing.
    controls:
      - id: cis.controls.8.1:C-14
        title: "Security Awareness and Skills Training"
        weight: 2
        answerType: scale
        tags: [awareness, training, skills]
        question: |
          Does the enterprise establish and maintain a security
          awareness program to influence behavior to be security
          conscious and properly skilled?
        purpose: |
          People are part of the control surface. Training reduces
          phishing success, hygiene gaps, and policy violations.
        expectedOutcome:
          - "Awareness program is in place (IG1)."
          - "Role-based skills training exists (IG2)."
          - "Specialized training for IT / security roles (IG3)."
        howTo:
          - step: "Run an awareness program"
          - step: "Deliver role-based skills training"
          - step: "Provide specialized training for IT / security"
        evidenceExamples:
          - "Awareness curriculum"
          - "Completion record"
          - "Specialized training plan"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No program"
            "3": "Generic only"
            "5": "Tiered training"
        crossReferences:
          - iso27001:A.6.3

      - id: cis.controls.8.1:C-15
        title: "Service Provider Management"
        weight: 2
        answerType: scale
        tags: [supplier, third-party, vendor]
        question: |
          Does the enterprise manage service providers that hold
          sensitive data or are responsible for critical IT platforms
          or processes?
        purpose: |
          Service providers extend the trust boundary outside the
          enterprise. Active management is what holds them to
          equivalent standards.
        expectedOutcome:
          - "Inventory of service providers is current (IG1)."
          - "Policy on service provider management exists (IG1)."
          - "Periodic review of service provider security (IG2/IG3)."
        howTo:
          - step: "Maintain inventory of service providers"
          - step: "Adopt service provider management policy"
          - step: "Review service provider security periodically"
        evidenceExamples:
          - "Service provider inventory"
          - "Management policy"
          - "Review reports"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No inventory"
            "3": "Inventory partial"
            "5": "Inventory + reviews"
        crossReferences:
          - iso27001:A.5.19

      - id: cis.controls.8.1:C-16
        title: "Application Software Security"
        weight: 3
        answerType: scale
        tags: [sdlc, application-security, sast, dast]
        question: |
          Does the enterprise manage the security life cycle of
          in-house developed, hosted, or acquired software to prevent,
          detect, and remediate security weaknesses?
        purpose: |
          Application vulnerabilities continue to drive a large share
          of incidents. Lifecycle management catches them at the
          cheapest stage.
        expectedOutcome:
          - "Secure SDLC exists for in-house code (IG2)."
          - "Security testing in development pipeline (IG2)."
          - "Third-party components managed for vulnerability (IG2/IG3)."
        howTo:
          - step: "Adopt secure SDLC"
          - step: "Embed security testing in pipelines"
          - step: "Manage third-party component vulnerabilities"
        evidenceExamples:
          - "Secure SDLC policy"
          - "SAST / DAST results"
          - "SBOM and SCA report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No app security"
            "3": "Partial"
            "5": "SDLC + testing + SCA"
        crossReferences:
          - iso27001:A.8.25
        appliesIf: "organization.develops_software == true"

      - id: cis.controls.8.1:C-17
        title: "Incident Response Management"
        weight: 3
        answerType: scale
        tags: [incident-response, plan, exercise]
        question: |
          Does the enterprise establish a program to develop and
          maintain an incident response capability to prepare, detect,
          and respond to attacks?
        purpose: |
          Improvised incident response is consistently worse than
          planned response. Preparation determines incident outcomes.
        expectedOutcome:
          - "Designated personnel and contact info exist (IG1)."
          - "Incident response plan is documented (IG2)."
          - "Plan is exercised and updated (IG2/IG3)."
        howTo:
          - step: "Designate IR personnel and maintain contacts"
          - step: "Document the IR plan"
          - step: "Exercise and update the plan"
        evidenceExamples:
          - "IR contact list"
          - "IR plan"
          - "Exercise report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No IR"
