framework:
  schemaVersion: 1
  key: cis.controls.8.1
  name: "CIS Critical Security Controls v8.1"
  shortName: "CIS Controls v8.1"
  version: "8.1"
  status: draft
  date: 2026-06-20
  language: en
  category: internal_policy
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "CISO"
    - "Security Operations"
    - "IT Operations"
  estimatedDurationMinutes: 300
  description: |
    The CIS Critical Security Controls v8.1, published by the Center
    for Internet Security, are a prioritized set of safeguards to
    mitigate the most common cyber attacks. v8.1 organizes 153
    Safeguards into 18 Controls with three Implementation Groups (IG1,
    IG2, IG3) reflecting maturity and risk profile.

    This YAML structures each of the 18 Controls as one audit-readiness
    control with its associated Safeguards summarized at Control level.
    Organizations operationalizing CIS should consult the CIS catalog
    for the per-Safeguard text and IG mapping.
  scopeNote: |
    In scope: all 18 CIS Controls v8.1, structured as one audit-control
    per CIS Control, with key Safeguards summarized in the
    expectedOutcome and howTo fields. IG1 / IG2 / IG3 progression is
    noted within each control's expectedOutcome.

    Out of scope: the 153 individual Safeguards as separate controls;
    the CIS Benchmarks; the CIS RAM risk model; sector-specific CIS
    profiles.
  license:
    status: open_licensed
    confirmationRequired: false
    notice: |
      CIS Controls v8.1 is published by the Center for Internet
      Security under a Creative Commons Attribution-NonCommercial-
      NoDerivatives 4.0 International license. Control content has
      been paraphrased into audit-readiness English; CIS attribution
      should accompany any operational use of this file.

severityRubric:
  critical: |
    Failure leaves an IG1 baseline Safeguard unimplemented (high-impact
    foundational hygiene gap).
  high: |
    Material gap in an IG2 Safeguard without compensating measures.
  medium: |
    Partial implementation across a Control; remediable in the normal
    improvement cycle.
  low: |
    Documentation or maturity gap with limited operational impact.

