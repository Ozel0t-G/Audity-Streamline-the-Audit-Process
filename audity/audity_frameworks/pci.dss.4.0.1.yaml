framework:
  schemaVersion: 1
  key: pci.dss.4.0.1
  name: "PCI DSS - Payment Card Industry Data Security Standard 4.0.1"
  shortName: "PCI DSS 4.0.1"
  version: "4.0.1"
  status: draft
  date: 2026-06-20
  language: en
  category: pci_dss
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "QSA"
    - "Compliance Officer"
    - "CISO"
    - "Payments Team"
  estimatedDurationMinutes: 360
  description: |
    PCI DSS 4.0.1 is the global standard issued by the PCI Security
    Standards Council for protecting account data. It applies to all
    entities involved in processing, storing, or transmitting cardholder
    data and sensitive authentication data.

    This YAML covers the 12 main PCI DSS requirements as audit-readiness
    controls. The individual sub-requirements (more than 300 in total)
    are summarized at requirement level; full PCI DSS assessment must
    use the PCI SSC ROC template or SAQ at the sub-requirement level.
  scopeNote: |
    In scope: all 12 main PCI DSS 4.0.1 requirements, structured as one
    control per requirement, with key sub-requirements summarized in
    expectedOutcome and howTo.

    Out of scope: the more than 300 individual sub-requirements as
    separate controls; PCI SSC Self-Assessment Questionnaires (SAQ A,
    A-EP, B, B-IP, C, C-VT, D, P2PE-HW); ROC reporting templates;
    customized approach requirements; appendices.
  license:
    status: tenant_licensed
    confirmationRequired: true
    notice: |
      PCI DSS 4.0.1 is published by the PCI Security Standards Council
      and is subject to its license terms. Audit-question content has
      been paraphrased into Audity audit-readiness language; the
      original PCI DSS text is not reproduced. Use of this file does
      not constitute a PCI DSS assessment.

severityRubric:
  critical: |
    Failure breaks a non-negotiable PCI requirement (e.g., storing PAN
    unencrypted) and would block a Report on Compliance.
  high: |
    Material gap in a requirement without compensating controls.
  medium: |
    Partial implementation; remediable in the normal improvement cycle.
  low: |
    Documentation or maturity gap with no immediate impact on cardholder
    data protection.

