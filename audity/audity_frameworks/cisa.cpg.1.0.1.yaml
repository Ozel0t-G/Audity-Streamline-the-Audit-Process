  - id: other
    name: "8. Other"
    description: |
      Goals not covered by the other categories: network segmentation,
      network monitoring, and detection.
    controls:
      - id: cisa.cpg:OTH-01
        title: "Network Segmentation"
        weight: 3
        answerType: scale
        tags: [network, segmentation, isolation]
        question: |
          Are networks segmented into trust zones such that critical
          systems are isolated from less trusted systems?
        purpose: |
          Flat networks amplify any compromise. Segmentation is the
          systemic defense against lateral movement.
        expectedOutcome:
          - "Segmentation isolates critical systems."
          - "Inter-zone flows are explicit."
          - "Reviews keep segmentation current."
        howTo:
          - step: "Segment critical systems from less trusted ones"
          - step: "Make inter-zone flows explicit"
          - step: "Review segmentation periodically"
        evidenceExamples:
          - "Segmentation design"
          - "Inter-zone flow matrix"
          - "Review record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Flat"
            "3": "Partial"
            "5": "Segmented + reviewed"

      - id: cisa.cpg:OTH-02
        title: "Detection of Relevant Threats and TTPs"
        weight: 3
        answerType: scale
        tags: [detection, threat-intel, ttp]
        question: |
          Does the organization detect relevant threats and tactics,
          techniques, and procedures (TTPs) against in-scope systems?
        purpose: |
          Generic detection misses adversary tradecraft. Aligning
          detection with relevant TTPs increases catch rate.
        expectedOutcome:
          - "Detection coverage is aligned to relevant TTPs."
          - "Detection content is tuned."
          - "Threat intelligence feeds detection."
        howTo:
          - step: "Align detection with relevant TTPs"
          - step: "Tune detection content"
          - step: "Feed threat intel into detection"
        evidenceExamples:
          - "Detection coverage map"
          - "Tuning log"
          - "Intel-driven detection rule"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Generic detection"
            "3": "Partial"
            "5": "TTP-aligned + intel-driven"
