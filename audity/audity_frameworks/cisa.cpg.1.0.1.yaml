        weight: 2
        answerType: scale
        tags: [vulnerability, disclosure, reporting]
        question: |
          Is a vulnerability disclosure policy and process published,
          with a clear channel for reporting?
        purpose: |
          Researchers and customers need a documented channel.
          Without one, disclosures go public.
        expectedOutcome:
          - "Vulnerability disclosure policy is published."
          - "Reporting channel is monitored."
          - "Reporters receive acknowledgement."
