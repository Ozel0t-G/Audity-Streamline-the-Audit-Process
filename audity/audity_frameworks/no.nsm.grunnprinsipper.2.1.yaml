framework:
  schemaVersion: 1
  key: no.nsm.grunnprinsipper.2.1
  name: "NSM Basic Principles for ICT Security 2.1"
  shortName: "NSM Grunnprinsipper"
  version: "2.1"
  status: draft
  date: 2026-06-20
  language: en
  category: internal_policy
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "CISO"
    - "ICT Risk Manager"
    - "Security Architect"
    - "SOC Lead"
  estimatedDurationMinutes: 360
  description: |
    The NSM Basic Principles for ICT Security (Grunnprinsipper for
    IKT-sikkerhet) v2.1 is the foundational ICT security framework
    published by the Norwegian National Security Authority (Nasjonal
    sikkerhetsmyndighet, NSM). It defines 21 principles organized into
    four categories: Identify and Map, Protect and Maintain, Detect,
    and Respond and Recover.

    This YAML treats each of the 21 principles as one audit-readiness
    control. The 118 underlying security measures (sikringstiltak) are
    summarized at principle level rather than enumerated individually;
    organizations using the framework operationally should consult
    NSM's own measure catalog for the detailed sikringstiltak.
  scopeNote: |
    In scope: all 21 principles of NSM Grunnprinsipper for IKT-sikkerhet
    v2.1, structured as one control per principle.

    Out of scope: the 118 individual sikringstiltak as separate controls
    (these are summarized within each principle's expectedOutcome and
    howTo fields, not enumerated); the related NSM publications
    "Grunnprinsipper for sikkerhetsstyring" and the operational
    handbooks; sector-specific guidance.
  license:
    status: open_licensed
    confirmationRequired: false
    notice: |
      NSM Grunnprinsipper for IKT-sikkerhet is published by Nasjonal
      sikkerhetsmyndighet and made available for use by Norwegian and
      international organizations. Principle wording has been
      paraphrased into audit-readiness English and is not reproduced
      verbatim.

severityRubric:
  critical: |
    Failure leaves a foundational principle unimplemented and creates
    a likely path to material incident.
  high: |
    Material gap in a principle without compensating measures.
  medium: |
    Principle is partially implemented; remediable in the normal
    improvement cycle.
  low: |
    Documentation or maturity gap with limited operational impact.

