        howTo:
          - step: "Route cables through protected paths"
          - step: "Document critical runs"
          - step: "Inspect periodically"
        evidenceExamples:
          - "Cable design document"
          - "Inspection log"
          - "Critical run map"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No cable design"
            "3": "Design without inspection"
            "5": "Design + inspection"
        appliesIf: "facility.onPremises == true"

