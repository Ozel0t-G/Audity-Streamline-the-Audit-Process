            "3": "Partial"
            "5": "Defined and tracked"
        appliesIf: "organization.develops_software == true"

      - id: ISO27001:A.8.30
        title: "Outsourced development"
        weight: 2
        answerType: scale
        tags: [supplier, sdlc, outsourcing]
        question: |
          Is outsourced development directed, monitored, and reviewed
          to ensure security requirements are met?
        purpose: |
          Outsourced developers often inherit privileged access without
          inheriting governance. Explicit direction and review aligns
          the relationship to the organization's security expectations.
        expectedOutcome:
          - "Security requirements are part of outsourced contracts."
          - "Deliverables are reviewed against security requirements."
          - "Access by outsourced parties is controlled."
        howTo:
          - step: "Include security requirements in outsourced contracts"
          - step: "Review deliverables against requirements"
          - step: "Control outsourced access"
        evidenceExamples:
          - "Contract clauses"
          - "Review record"
          - "Access control configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No outsourced controls"
            "3": "Partial"
            "5": "Directed and reviewed"
        appliesIf: "organization.uses_outsourced_development == true"

      - id: ISO27001:A.8.31
        title: "Separation of development, test and production environments"
        weight: 3
        answerType: scale
        tags: [sdlc, environments, separation]
        question: |
          Are development, testing, and production environments
          separated and secured?
        purpose: |
          Shared environments allow test data, configuration, and code
          to cross-contaminate production. Separation is the simplest
          defense against entire classes of incidents.
        expectedOutcome:
          - "Environments are separated technically and procedurally."
          - "Data flow rules between environments are documented."
          - "Access boundaries are enforced."
        howTo:
          - step: "Separate environments technically and procedurally"
          - step: "Define inter-environment data flow rules"
          - step: "Enforce access boundaries"
        evidenceExamples:
          - "Environment separation design"
          - "Inter-environment data rule"
          - "Access boundary configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Shared environments"
            "3": "Partial separation"
            "5": "Full separation"
        appliesIf: "organization.develops_software == true"

      - id: ISO27001:A.8.32
        title: "Change management"
        weight: 3
        answerType: scale
        tags: [change-management, governance]
        question: |
          Are changes to information processing facilities and
          information systems subject to change management procedures?
        purpose: |
          Changes cause more outages and incidents than any other
          activity. Change management is the discipline that prevents
          rushed or unreviewed changes from producing avoidable harm.
        expectedOutcome:
          - "Change management procedure is documented and used."
          - "Risk and security assessment is part of change records."
          - "Emergency changes follow a defined path."
        howTo:
          - step: "Document change management"
          - step: "Require risk and security assessment"
          - step: "Define emergency change path"
        evidenceExamples:
          - "Change management procedure"
          - "Change ticket sample"
          - "Emergency change record"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No change management"
            "3": "Inconsistent"
            "5": "Procedure followed, emergency path defined"

      - id: ISO27001:A.8.33
        title: "Test information"
        weight: 2
        answerType: scale
        tags: [sdlc, test-data, privacy]
        question: |
          Is test information appropriately selected, protected, and
          managed?
        purpose: |
          Production data used as test data multiplies exposure and is
          a common privacy failure mode. Managed test information
          preserves test value without the risk.
        expectedOutcome:
          - "Test data sources are documented."
          - "Production data in test is restricted or masked."
          - "Access to test data is controlled."
        howTo:
          - step: "Document test data sources"
          - step: "Restrict / mask production data in test"
          - step: "Control access to test data"
        evidenceExamples:
          - "Test data policy"
          - "Masking record"
          - "Access control configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Prod data in test, uncontrolled"
            "3": "Partial control"
            "5": "Restricted and masked"
        appliesIf: "organization.develops_software == true"

      - id: ISO27001:A.8.34
        title: "Protection of information systems during audit testing"
        weight: 1
        answerType: scale
        tags: [audit, testing, change-management]
        question: |
          Are audit tests and other assurance activities involving
          operational systems planned and agreed between the tester and
          appropriate management to avoid disruption?
        purpose: |
          Uncoordinated testing on production systems causes outages
          and damages the audit relationship. Coordination preserves
          both stability and audit value.
        expectedOutcome:
          - "Audit test plans are agreed before execution."
          - "Production tests have rollback / impact plans."
          - "Test outcomes are documented."
        howTo:
          - step: "Agree audit test plans before execution"
          - step: "Plan for rollback / impact"
          - step: "Document outcomes"
        evidenceExamples:
          - "Agreed audit test plan"
          - "Rollback / impact plan"
          - "Test outcome record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Uncoordinated testing"
            "3": "Partial coordination"
            "5": "Coordinated and documented"
