        expectedOutcome:
          - "Media handling policy aligns with classification."
          - "Transport and disposal are controlled."
          - "Media inventory is current."
        howTo:
          - step: "Align media handling with classification"
          - step: "Control transport and disposal"
          - step: "Maintain media inventory"
        evidenceExamples:
          - "Media handling policy"
          - "Disposal certificate"
          - "Media inventory"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No media controls"
            "3": "Controls partial"
            "5": "Lifecycle managed"

