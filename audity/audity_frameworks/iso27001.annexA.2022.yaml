          - step: "Reference in design reviews"
          - step: "Maintain principles over time"
        evidenceExamples:
          - "Engineering principles document"
          - "Design review record citing principles"
          - "Update history"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
