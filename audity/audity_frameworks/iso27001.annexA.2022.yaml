        expectedOutcome:
          - "Clear desk / clear screen policy is documented."
          - "Personnel are aware of the policy."
          - "Spot checks verify compliance."
        howTo:
          - step: "Document clear desk / clear screen policy"
          - step: "Raise awareness"
          - step: "Run spot checks"
        evidenceExamples:
          - "Policy document"
          - "Awareness material"
          - "Spot check report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 18
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No policy"
            "3": "Policy, no checks"
            "5": "Policy + spot checks"

      - id: ISO27001:A.7.8
        title: "Equipment siting and protection"
