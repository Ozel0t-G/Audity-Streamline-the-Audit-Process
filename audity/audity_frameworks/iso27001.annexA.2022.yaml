        title: "Screening"
        weight: 2
        answerType: scale
        tags: [people, screening, hr, joiners]
        question: |
          Are background verification checks on all candidates for
          employment carried out prior to joining, and on an ongoing
          basis where appropriate, in accordance with applicable laws
          and ethical considerations?
        purpose: |
          Screening reduces insider risk where the role warrants it.
          Doing it consistently and lawfully balances risk reduction
          with employee rights.
        expectedOutcome:
          - "Screening requirements are defined by role sensitivity."
          - "Screening is performed before access is granted."
          - "Results are recorded confidentially."
        howTo:
          - step: "Define screening requirements by role sensitivity"
          - step: "Run screening before access is granted"
          - step: "Record results under HR confidentiality"
        evidenceExamples:
          - "Screening policy"
          - "Sample screening record"
          - "Pre-onboarding gate evidence"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No screening"
            "3": "Screening inconsistent"
            "5": "Screening per role, recorded"

      - id: ISO27001:A.6.2
        title: "Terms and conditions of employment"
        weight: 2
        answerType: scale
        tags: [people, contracts, hr]
        question: |
          Do employment contractual agreements state personnel and the
          organization's responsibilities for information security?
        purpose: |
          Contractual security obligations are the legal basis for
          enforcement. Omitting them weakens both disciplinary action
          and post-employment obligations.
        expectedOutcome:
          - "Security obligations appear in employment contracts."
          - "Standard clauses exist and are used."
          - "Updates to obligations are communicated."
        howTo:
          - step: "Add standard security clauses to employment contracts"
          - step: "Maintain clauses centrally with legal"
          - step: "Communicate updates"
        evidenceExamples:
          - "Sample employment contract"
          - "Standard clause library"
          - "Communication record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No clauses"
            "3": "Inconsistent"
            "5": "Standard clauses applied"

      - id: ISO27001:A.6.3
        title: "Information security awareness, education and training"
        weight: 2
        answerType: scale
        tags: [people, awareness, training, education]
        question: |
          Do personnel and relevant interested parties receive
          appropriate information security awareness, education, and
          training, and regular updates about the organization's
          policies and procedures?
        purpose: |
          People are part of the attack surface. Training reduces
          policy violations, phishing success, and accidental
          mishandling of information.
        expectedOutcome:
          - "Annual training is delivered to all in-scope personnel."
          - "Completion is tracked."
          - "Effectiveness is measured."
        howTo:
          - step: "Roll out annual training"
          - step: "Track completion and follow up"
          - step: "Measure effectiveness (e.g., phishing tests)"
        evidenceExamples:
          - "Training completion report"
          - "Phishing simulation results"
          - "Curriculum reference"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No training"
            "3": "Training, low completion"
            "5": "High completion, effectiveness measured"
        crossReferences:
          - nist-csf-2.0:PR.AT-01

      - id: ISO27001:A.6.4
        title: "Disciplinary process"
        weight: 2
        answerType: scale
        tags: [people, hr, enforcement]
        question: |
          Is a formal and communicated disciplinary process in place to
          take action against personnel and other relevant interested
          parties who have committed information security policy
          violations?
        purpose: |
          Enforcement legitimacy depends on a known and proportional
          process. Absent that, disciplinary action becomes contestable
          and inconsistent.
        expectedOutcome:
          - "Disciplinary process is documented and communicated."
          - "Process aligns with HR and legal standards."
          - "Process is applied consistently."
        howTo:
          - step: "Document the disciplinary process with HR / legal"
          - step: "Communicate the process to personnel"
          - step: "Apply consistently"
        evidenceExamples:
          - "Disciplinary policy"
          - "Communication record"
          - "Sample handling case (anonymized)"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No process"
            "3": "Process exists, inconsistent"
            "5": "Process applied consistently"

      - id: ISO27001:A.6.5
        title: "Responsibilities after termination or change of employment"
        weight: 2
        answerType: scale
        tags: [people, offboarding, leavers]
        question: |
