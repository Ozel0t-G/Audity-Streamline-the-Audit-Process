framework:
  schemaVersion: 1
  key: iso27001.annexA.2022
  name: "ISO/IEC 27001:2022 Annex A"
  shortName: "ISO 27001:2022 A"
  version: "2022"
  status: draft
  date: 2026-06-20
  language: en
  category: iso27001
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "ISMS Manager"
    - "Risk Owner"
    - "CISO"
    - "Compliance Officer"
  estimatedDurationMinutes: 420
  description: |
    ISO/IEC 27001:2022 is the international standard for information
    security management systems (ISMS). Annex A of the standard lists
    93 reference controls, grouped into four themes: Organizational,
    People, Physical, and Technological controls.

    This YAML covers all 93 Annex A controls as individual audit-readiness
    items for the Audity platform. The management clauses 4 to 10 of the
    main standard (ISMS requirements) are intentionally out of scope of
    this Annex-A-only file and should be authored separately.

    The original ISO/IEC 27001:2022 text is copyright-protected. All
    audit questions, purposes, expected outcomes, and operational guidance
    in this file have been paraphrased and do not reproduce the standard's
    wording.
  scopeNote: |
    In scope: all 93 reference controls of Annex A of ISO/IEC 27001:2022
    organized into the four themes A.5 Organizational, A.6 People,
    A.7 Physical, and A.8 Technological.

    Out of scope (intentionally not included here for licensing reasons
    and scope clarity): the management system clauses 4 to 10 of
    ISO/IEC 27001:2022, the implementation guidance in ISO/IEC 27002:2022,
    and sector-specific extensions (e.g., 27017, 27018, 27701). Cross-
    references to other frameworks in this file are advisory only.
  license:
    status: tenant_licensed
    confirmationRequired: true
    notice: |
      ISO/IEC 27001:2022 is published by ISO and IEC and is protected by
      international copyright. Lawful use generally requires a licensed
      copy of the standard per user or per organization. This file
      reproduces only the publicly cited control identifiers (e.g.,
      A.5.1, A.8.24) and short reference titles; all audit-question
      content has been paraphrased into Audity audit-readiness language
      and does not reproduce ISO text. Tenants are responsible for
      ensuring that their use of this file is consistent with their own
      ISO licensing.

severityRubric:
  critical: |
    Control failure would directly expose regulated information, halt a
    mission-critical service, or breach a contractual or regulatory
    obligation triggering mandatory reporting.
  high: |
    Material breach of policy or absence of a core safeguard without a
    compensating control; significant operational, legal, or reputational
    impact is likely.
  medium: |
    Control is partially implemented or inconsistently applied; residual
    risk is visible but not acute and can be remediated in the normal
    improvement cycle.
  low: |
    Documentation or maturity gap with no immediate harm; primarily a
    completeness or housekeeping issue.

