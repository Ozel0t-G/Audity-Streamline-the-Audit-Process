            "3": "Partial"
            "5": "Required and verified"

      - id: ISO27001:A.8.27
        title: "Secure system architecture and engineering principles"
        weight: 2
        answerType: scale
        tags: [architecture, engineering, principles]
        question: |
          Are secure system architecture and engineering principles
          established, documented, maintained, and applied to any
          information system development activities?
        purpose: |
          Engineering principles guide hundreds of small decisions per
          project. Documented principles bake security into routine
          design without continuous review burden.
        expectedOutcome:
          - "Engineering principles are documented."
          - "Principles are referenced in design reviews."
          - "Principles are kept current."
        howTo:
