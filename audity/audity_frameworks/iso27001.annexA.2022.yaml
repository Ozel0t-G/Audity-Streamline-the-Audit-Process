          - "Remote wipe capability exists where appropriate."
        howTo:
          - step: "Define off-site asset controls"
          - step: "Implement loss reporting"
          - step: "Enable remote wipe where appropriate"
        evidenceExamples:
          - "Off-site asset policy"
          - "Loss reporting record"
          - "Remote wipe configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No off-site controls"
            "3": "Controls partial"
            "5": "Controls comprehensive"

      - id: ISO27001:A.7.10
