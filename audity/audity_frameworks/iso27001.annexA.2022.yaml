domains:
  - id: organizational
    name: "A.5 Organizational controls"
    description: |
      Controls concerning policy, roles and responsibilities, supplier
      relationships, incident management, continuity, legal and
      regulatory obligations, and documented operating procedures.
    controls:
      - id: ISO27001:A.5.1
        title: "Policies for information security"
        weight: 3
        answerType: scale
        tags: [governance, policy, isms]
        question: |
          Are information security policies defined, approved by
          management, published, communicated to relevant personnel, and
          reviewed at planned intervals or after material changes?
        purpose: |
          Policies make management's expectations enforceable and
          auditable. Without an approved and communicated policy set the
          ISMS has no binding authority and no consistent basis for
          decision-making.
        expectedOutcome:
          - "A current information security policy set is approved by management."
          - "Policies are published and acknowledged by affected personnel."
          - "Policies are reviewed on a defined cadence and after material change."
        howTo:
          - step: "Maintain a top-level information security policy and supporting topic policies"
          - step: "Obtain management approval and document acknowledgements"
          - step: "Define a review cadence and triggers"
        evidenceExamples:
          - "Approved policy documents"
          - "Acknowledgement log"
          - "Policy review minutes"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No policy set"
            "3": "Policies exist, not reviewed"
            "5": "Approved, communicated, reviewed"
        crossReferences:
          - nist-csf-2.0:GV.PO-01

      - id: ISO27001:A.5.2
        title: "Information security roles and responsibilities"
        weight: 3
        answerType: scale
        tags: [governance, roles, raci]
        question: |
          Are information security roles and responsibilities defined,
          allocated, and communicated according to organizational needs?
        purpose: |
          Ambiguous accountability is the most common root cause of
          missed controls. Allocated roles make handovers cleaner and
          give audit a single owner per control area.
        expectedOutcome:
          - "Security roles are defined for relevant areas of the ISMS."
          - "Allocations are documented and communicated."
          - "Role changes trigger handover and update."
        howTo:
          - step: "Maintain a RACI for ISMS roles"
          - step: "Reflect roles in job descriptions and onboarding"
          - step: "Update on organizational changes"
        evidenceExamples:
          - "RACI matrix"
          - "Sample job description with security duties"
          - "Handover record on role change"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No documented roles"
            "3": "Roles documented, not communicated"
            "5": "Roles allocated and current"
        crossReferences:
          - nist-csf-2.0:GV.RR-02

      - id: ISO27001:A.5.3
        title: "Segregation of duties"
        weight: 3
        answerType: scale
        tags: [governance, sod, access-control]
        question: |
          Are conflicting duties and conflicting areas of responsibility
          segregated to reduce the risk of fraud, error, or
          unauthorized actions?
        purpose: |
          Single-person workflows for sensitive operations create
          uncheckable failure modes. Segregation forces a second pair of
          eyes where the impact justifies it.
        expectedOutcome:
          - "Toxic role / permission combinations are documented."
          - "Segregation is enforced in process and tooling."
          - "Compensating controls are documented where segregation is impractical."
        howTo:
          - step: "Identify sensitive duties and toxic combinations"
          - step: "Enforce segregation in process and tooling"
          - step: "Document compensating controls where needed"
        evidenceExamples:
          - "SoD matrix"
          - "IAM policy enforcing splits"
          - "Compensating control register"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No SoD"
            "3": "SoD documented, not enforced"
            "5": "SoD enforced with compensations"

      - id: ISO27001:A.5.4
        title: "Management responsibilities"
        weight: 2
        answerType: scale
        tags: [governance, leadership, accountability]
        question: |
          Does management require all personnel to apply information
          security in accordance with established policies and procedures,
          and does it demonstrate visible support for the ISMS?
        purpose: |
          Visible management support signals priority to the rest of the
          organization. Programs that depend only on the security team
          for enforcement consistently underperform.
        expectedOutcome:
          - "Management expectations on security are explicit in policy or charter."
          - "Management participates in ISMS reviews."
          - "Non-compliance is addressed visibly."
        howTo:
          - step: "Capture management expectations in the policy or charter"
          - step: "Schedule recurring ISMS management reviews"
          - step: "Address non-compliance through documented channels"
        evidenceExamples:
          - "Management commitment statement"
          - "Management review minutes"
          - "Non-compliance handling record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Management absent"
            "3": "Management nominally engaged"
            "5": "Management visibly engaged"

      - id: ISO27001:A.5.5
        title: "Contact with authorities"
        weight: 2
        answerType: scale
        tags: [governance, authorities, incident-response]
        question: |
          Is appropriate contact with relevant authorities (e.g., law
          enforcement, regulators, CERT) established and maintained?
        purpose: |
          Establishing contact before an incident is the single biggest
          accelerator during one. Cold-starting the contact during a
          crisis costs hours that the response cannot afford.
        expectedOutcome:
          - "A current list of relevant authorities and contact channels exists."
          - "Contacts are validated periodically."
          - "Notification obligations are documented."
        howTo:
          - step: "Identify relevant authorities and contact channels"
          - step: "Validate contacts at least annually"
          - step: "Document notification obligations and timing"
        evidenceExamples:
          - "Authority contact list"
          - "Contact validation log"
          - "Notification obligation register"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No authority contacts"
            "3": "Contacts exist, not validated"
            "5": "Validated contacts with obligations"

      - id: ISO27001:A.5.6
        title: "Contact with special interest groups"
        weight: 1
        answerType: scale
        tags: [governance, community, threat-intelligence]
        question: |
          Is contact maintained with special interest groups, forums,
          and professional associations to receive early information
          about threats, vulnerabilities, and good practices?
        purpose: |
          Industry forums often surface threats before vendor or public
          channels do. Membership keeps the organization informed and
          provides peer benchmarking.
        expectedOutcome:
          - "Relevant memberships and channels are documented."
          - "Intake from forums feeds threat / vulnerability processes."
          - "Insights are shared internally."
        howTo:
          - step: "Identify relevant forums (ISAC, sector groups)"
          - step: "Route intake into threat / vulnerability processes"
          - step: "Share insights internally"
        evidenceExamples:
          - "Membership list"
          - "Intake routing process"
          - "Internal briefing"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No engagement"
            "3": "Member, not used"
            "5": "Member, routed, shared"

      - id: ISO27001:A.5.7
        title: "Threat intelligence"
        weight: 2
        answerType: scale
        tags: [governance, threat-intelligence, risk-assessment]
        question: |
          Is information about threats collected, analyzed, and used to
          inform risk assessments and protective decisions?
        purpose: |
          Threat intelligence converts external signal into prioritized
          action. Without it, risk assessments default to generic
          scenarios that may not reflect actual exposure.
        expectedOutcome:
          - "Relevant intelligence sources are subscribed."
          - "Intelligence is triaged and analyzed."
          - "Analysis informs risk and detection decisions."
        howTo:
          - step: "Subscribe to relevant intelligence sources"
          - step: "Triage and analyze incoming intel"
          - step: "Feed analysis into risk and detection processes"
        evidenceExamples:
          - "Intel source list"
          - "Triaged intel queue"
          - "Risk decision citing intel"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 18
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No intel"
            "3": "Intel collected, not used"
            "5": "Intel used in decisions"
        crossReferences:
          - nist-csf-2.0:ID.RA-02

      - id: ISO27001:A.5.8
        title: "Information security in project management"
        weight: 2
        answerType: scale
        tags: [governance, project-management, sdlc]
        question: |
          Is information security integrated into project management
          methodology so that risks are assessed and controls are
          considered throughout each project's lifecycle?
        purpose: |
          Security retrofitted into projects after design is the most
          expensive and least effective form of control. Embedding into
          project methodology catches risk at the cheapest stage.
        expectedOutcome:
          - "Project methodology includes security checkpoints."
          - "Risk and controls are documented per project."
          - "Project closures verify security obligations are met."
        howTo:
          - step: "Embed security checkpoints in project methodology"
          - step: "Require risk assessment at key gates"
          - step: "Verify security at project closure"
        evidenceExamples:
          - "Project methodology with security gates"
          - "Project risk assessment"
          - "Project closure checklist"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Security not in projects"
            "3": "Security ad hoc"
            "5": "Embedded across lifecycle"

      - id: ISO27001:A.5.9
        title: "Inventory of information and other associated assets"
        weight: 3
        answerType: scale
        tags: [asset-management, inventory, classification]
        question: |
          Is an inventory of information and associated assets, including
          owners, developed and maintained?
        purpose: |
          Asset inventory is the foundation of every downstream control
          (classification, access, monitoring). Missing entries become
          unmanaged blind spots.
        expectedOutcome:
          - "A central asset inventory exists with owners."
          - "Information assets and supporting assets are both covered."
          - "Inventory is reconciled periodically."
        howTo:
          - step: "Maintain a central asset inventory"
          - step: "Capture both information and supporting assets"
          - step: "Reconcile against discovery periodically"
        evidenceExamples:
          - "Asset inventory extract"
          - "Reconciliation report"
          - "Owner assignment record"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No inventory"
            "3": "Inventory partial"
            "5": "Inventory maintained, owners assigned"
        crossReferences:
          - nist-csf-2.0:ID.AM-01
          - nist-csf-2.0:ID.AM-02

      - id: ISO27001:A.5.10
        title: "Acceptable use of information and other associated assets"
        weight: 2
        answerType: scale
        tags: [governance, acceptable-use, policy]
        question: |
          Are rules for the acceptable use and procedures for handling
          information and other associated assets defined, documented,
          and communicated?
        purpose: |
          Acceptable use rules give users a clear line and give the
          organization grounds for enforcement. Their absence makes
          violations harder to address.
        expectedOutcome:
          - "An acceptable use policy is documented and acknowledged."
          - "Handling rules align with classification."
          - "Violations are addressed under disciplinary process."
        howTo:
          - step: "Maintain an acceptable use policy"
          - step: "Align handling rules to classification"
          - step: "Tie violations to disciplinary process"
        evidenceExamples:
          - "Acceptable use policy"
          - "Acknowledgement record"
          - "Handling rules document"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No AUP"
            "3": "AUP exists, not enforced"
            "5": "AUP enforced and acknowledged"

      - id: ISO27001:A.5.11
        title: "Return of assets"
        weight: 2
        answerType: scale
        tags: [asset-management, offboarding, leavers]
        question: |
          Are personnel and other interested parties required to return
          information and other associated assets in their possession
          upon termination or change of employment, contract, or
          agreement?
        purpose: |
          Unreturned assets are a common source of post-termination
          data leakage. A documented return process closes the loop and
          provides evidence of due diligence.
        expectedOutcome:
          - "Return process is part of offboarding."
          - "Returned assets are inventoried and verified."
          - "Non-returns trigger escalation."
        howTo:
          - step: "Build return into offboarding checklists"
          - step: "Inventory and verify returns"
          - step: "Escalate non-returns"
        evidenceExamples:
          - "Offboarding checklist"
          - "Asset return log"
          - "Escalation record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No return process"
            "3": "Return inconsistent"
            "5": "Return verified, escalated"

      - id: ISO27001:A.5.12
        title: "Classification of information"
        weight: 3
        answerType: scale
        tags: [asset-management, classification, data]
        question: |
          Is information classified according to needs for confidentiality,
          integrity, availability, and other applicable requirements?
        purpose: |
          Without classification, controls cannot be applied
          proportionally. Classification is the gating decision that
          drives downstream handling and protection.
        expectedOutcome:
          - "A classification scheme is defined and approved."
          - "Information assets carry classification metadata."
          - "Classification drives handling and access controls."
        howTo:
          - step: "Approve a classification scheme"
          - step: "Apply classification to assets"
          - step: "Tie controls to classification"
        evidenceExamples:
          - "Classification scheme document"
          - "Assets with classification metadata"
          - "Control mapping by classification"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No classification"
            "3": "Scheme exists, not applied"
            "5": "Applied and drives controls"
        crossReferences:
          - nist-csf-2.0:ID.AM-05

      - id: ISO27001:A.5.13
        title: "Labelling of information"
        weight: 2
        answerType: scale
        tags: [asset-management, labelling, data]
        question: |
          Is an appropriate set of procedures for information labelling
          developed and implemented in accordance with the classification
          scheme?
        purpose: |
          Labelling makes classification visible at the point of use.
          Without labels, classification metadata cannot influence the
          handling decisions of users and systems.
        expectedOutcome:
          - "Labelling procedures align to the classification scheme."
          - "Labels are applied consistently in tools and documents."
          - "Automation supports labelling where practical."
        howTo:
          - step: "Define labelling procedures aligned to classification"
          - step: "Apply labels in tools and documents"
          - step: "Use automation where practical"
        evidenceExamples:
          - "Labelling procedure"
          - "Labelled sample"
          - "Automation configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No labelling"
            "3": "Labelling inconsistent"
            "5": "Labelling consistent and automated"

      - id: ISO27001:A.5.14
        title: "Information transfer"
        weight: 2
        answerType: scale
        tags: [data, transfer, encryption]
        question: |
          Are rules, procedures, and agreements for information transfer
          in place for all types of transfer (electronic, physical,
          verbal) within the organization and with external parties?
        purpose: |
          Transfer is the moment when information leaves controlled
          environments. Defined rules prevent ad hoc, insecure paths
          that bypass other safeguards.
        expectedOutcome:
          - "Transfer rules cover electronic, physical, and verbal."
          - "External transfer agreements are in place where needed."
          - "Sensitive transfers use approved methods."
        howTo:
          - step: "Document transfer rules per channel"
          - step: "Put agreements in place with external parties"
          - step: "Enforce approved methods for sensitive transfers"
        evidenceExamples:
          - "Transfer policy"
          - "Sample data transfer agreement"
          - "Approved channel inventory"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No transfer rules"
            "3": "Rules partial"
            "5": "Rules and agreements in place"

      - id: ISO27001:A.5.15
        title: "Access control"
        weight: 3
        answerType: scale
        tags: [access-control, iam, authorization]
        question: |
          Are rules to control physical and logical access to information
          and other associated assets established and implemented based
          on business and information security requirements?
        purpose: |
          Access control is the most-audited and most-misconfigured
          control area. Documented rules anchored to business needs make
          access decisions defensible and consistent.
        expectedOutcome:
          - "Access control policy is documented and applied."
          - "Rules are based on business need and risk."
          - "Compliance with access rules is monitored."
        howTo:
          - step: "Document an access control policy"
          - step: "Drive rules from business need and risk"
          - step: "Monitor compliance"
        evidenceExamples:
          - "Access control policy"
          - "Access compliance report"
          - "Sample access decision"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No policy"
            "3": "Policy exists, not enforced"
            "5": "Policy enforced and monitored"
        crossReferences:
          - nist-csf-2.0:PR.AA-05

      - id: ISO27001:A.5.16
        title: "Identity management"
        weight: 3
        answerType: scale
        tags: [iam, identity, lifecycle]
        question: |
          Is the full lifecycle of identities (creation, maintenance,
          deactivation) managed under a documented process?
        purpose: |
          Identity is the control plane for access. Lifecycle gaps,
          especially failure to deactivate, are the dominant root cause
          of access-related incidents.
        expectedOutcome:
          - "Identity lifecycle is documented and applied."
          - "Joiner / mover / leaver events trigger identity updates."
          - "Inactive or stale identities are removed."
        howTo:
          - step: "Maintain identity lifecycle procedures"
          - step: "Couple JML events to identity updates"
          - step: "Remove inactive or stale identities"
        evidenceExamples:
          - "Identity lifecycle procedure"
          - "JML process map"
          - "Stale identity removal report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No identity lifecycle"
            "3": "Partial lifecycle"
            "5": "Full lifecycle with cleanup"
        crossReferences:
          - nist-csf-2.0:PR.AA-01

      - id: ISO27001:A.5.17
        title: "Authentication information"
        weight: 3
        answerType: scale
        tags: [iam, authentication, secrets, passwords]
        question: |
          Are allocation and management of authentication information
          (passwords, tokens, keys) controlled by a management process
          and supported by good user practice?
        purpose: |
          Weak or shared authentication information is the most-exploited
          weakness in initial access. Controlled allocation and rotation
          materially reduce that risk.
        expectedOutcome:
          - "Allocation, rotation, and revocation procedures exist."
          - "Secrets are stored protected (vault, KMS)."
          - "Password / MFA policy reflects current threats."
        howTo:
          - step: "Define allocation, rotation, revocation procedures"
          - step: "Use secrets vaults and KMS"
          - step: "Apply current password / MFA guidance"
        evidenceExamples:
          - "Secrets management standard"
          - "Vault audit log"
          - "Password / MFA policy"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Secrets in plaintext"
            "3": "Vaults partial"
            "5": "Vaults and MFA enforced"

      - id: ISO27001:A.5.18
        title: "Access rights"
        weight: 3
        answerType: scale
        tags: [iam, access-review, least-privilege]
        question: |
          Are access rights provisioned, reviewed, modified, and removed
          in accordance with the access control policy?
        purpose: |
          Provisioning without later review accumulates privilege.
          Periodic review and clean removal limit the blast radius of
          any one compromised account.
        expectedOutcome:
          - "Provisioning follows approval workflow."
          - "Periodic access reviews are performed."
          - "Removal on leaver / mover events is verified."
        howTo:
          - step: "Run provisioning through an approval workflow"
          - step: "Run access reviews on a defined cadence"
          - step: "Verify removal on leaver / mover events"
        evidenceExamples:
          - "Approval workflow record"
          - "Access review report"
          - "Leaver removal log"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No reviews"
            "3": "Reviews irregular"
            "5": "Reviews + verified removal"
        crossReferences:
          - nist-csf-2.0:PR.AA-05

      - id: ISO27001:A.5.19
        title: "Information security in supplier relationships"
        weight: 2
        answerType: scale
        tags: [supplier, third-party, governance]
        question: |
          Are processes and procedures defined and implemented to manage
          the information security risks associated with the use of
          suppliers' products or services?
        purpose: |
          Supplier risk is one of the most cited audit gaps. A documented
          program ensures consistent treatment across procurement and
          operations.
        expectedOutcome:
          - "Supplier risk management process is documented."
          - "Process is integrated with procurement."
          - "Roles for managing supplier risks are clear."
        howTo:
          - step: "Document the supplier risk management process"
          - step: "Integrate with procurement"
          - step: "Assign roles for supplier risk owners"
        evidenceExamples:
          - "Supplier risk management process"
          - "Procurement integration map"
          - "Supplier risk role description"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No supplier process"
            "3": "Process exists, not used"
            "5": "Process integrated and used"

      - id: ISO27001:A.5.20
        title: "Addressing information security within supplier agreements"
        weight: 3
        answerType: scale
        tags: [supplier, contracts, legal]
        question: |
          Are relevant information security requirements established and
          agreed with each supplier based on the type of supplier
          relationship?
        purpose: |
          Contracts are the only enforceable lever against supplier
          underperformance. Tiered, fit-for-purpose security clauses
          turn intent into obligation.
        expectedOutcome:
          - "Standard security clauses exist per supplier tier."
          - "Clauses include incident notification and audit rights."
          - "Deviations are recorded and approved."
        howTo:
          - step: "Develop tiered standard security clauses with legal"
          - step: "Mandate use in procurement templates"
          - step: "Track and approve deviations"
        evidenceExamples:
          - "Standard clause library"
          - "Procurement template"
          - "Deviation register"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No security clauses"
            "3": "Clauses inconsistent"
            "5": "Clauses standardized and enforced"
        crossReferences:
          - nist-csf-2.0:GV.SC-05

      - id: ISO27001:A.5.21
        title: "Managing information security in the ICT supply chain"
        weight: 2
        answerType: scale
        tags: [supplier, supply-chain, ict]
        question: |
          Are processes and procedures defined to manage information
          security risks associated with the ICT products and services
          supply chain?
        purpose: |
          Compromises in upstream ICT components propagate to consuming
          organizations. Managing the ICT supply chain specifically is
          necessary because generic supplier processes miss technical
          provenance and integrity.
        expectedOutcome:
          - "ICT-specific supply chain risks are identified."
          - "Provenance and integrity checks are defined."
          - "Critical components have documented risk treatment."
        howTo:
          - step: "Map ICT components and their provenance"
          - step: "Define integrity and authenticity checks"
          - step: "Treat risks for critical components"
        evidenceExamples:
          - "ICT supply chain risk register"
          - "Integrity check policy"
          - "Provenance documentation"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No ICT chain controls"
            "3": "Partial"
            "5": "Mapped, checked, treated"

      - id: ISO27001:A.5.22
        title: "Monitoring, review and change management of supplier services"
        weight: 2
        answerType: scale
        tags: [supplier, monitoring, change-management]
        question: |
          Are supplier service changes, including the maintenance and
          improvement of existing security policies, procedures, and
          controls, monitored, reviewed, and managed?
        purpose: |
          Supplier posture drifts after onboarding. Continuous monitoring
          and change management of supplier services catch silent
          regression.
        expectedOutcome:
          - "Supplier services are reviewed on a defined cadence."
          - "Material changes trigger reassessment."
          - "Findings feed contractual and operational decisions."
        howTo:
          - step: "Define review cadence per supplier tier"
          - step: "Trigger reassessment on material change"
          - step: "Use findings in contractual / operational decisions"
        evidenceExamples:
          - "Supplier review schedule"
          - "Change reassessment record"
          - "Decision based on findings"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No supplier review"
            "3": "Annual only"
            "5": "Cadenced + event-driven"

      - id: ISO27001:A.5.23
        title: "Information security for use of cloud services"
        weight: 3
        answerType: scale
        tags: [supplier, cloud, shared-responsibility]
        question: |
          Are processes for acquisition, use, management, and exit from
          cloud services established in accordance with information
          security requirements?
        purpose: |
          Cloud usage often bypasses procurement and security review,
          creating shadow exposure. A defined cloud process makes shared
          responsibility explicit and verifiable.
        expectedOutcome:
          - "A cloud usage policy with shared responsibility model exists."
          - "Acquisition, use, and exit are covered."
          - "Cloud configurations are reviewed against baselines."
        howTo:
          - step: "Document a cloud usage policy with shared responsibility"
          - step: "Cover acquisition, ongoing use, and exit"
          - step: "Review cloud configurations against baselines"
        evidenceExamples:
          - "Cloud policy"
          - "Shared responsibility matrix"
          - "Configuration baseline report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No cloud policy"
            "3": "Policy exists, drift"
            "5": "Policy + baselines + reviews"
        crossReferences:
          - nist-csf-2.0:GV.SC-07
        appliesIf: "organization.uses_cloud == true"

      - id: ISO27001:A.5.24
        title: "Information security incident management planning and preparation"
        weight: 3
        answerType: scale
        tags: [incident-response, plan, preparation]
        question: |
          Has the organization planned and prepared for managing
          information security incidents by defining, establishing, and
          communicating incident management processes, roles, and
          responsibilities?
        purpose: |
          Improvised incident response is consistently worse than
          planned response. Preparation determines whether the
          organization contains incidents quickly or scrambles through
          them.
        expectedOutcome:
          - "An incident management process exists with roles and authorities."
          - "Process is communicated and exercised."
          - "Tooling and runbooks support the process."
        howTo:
          - step: "Document the incident management process and roles"
          - step: "Communicate to involved teams"
          - step: "Exercise the process at least annually"
        evidenceExamples:
          - "IR process document"
          - "Exercise report"
          - "Runbook library"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No IR process"
            "3": "Process exists, untested"
            "5": "Process exercised regularly"
        crossReferences:
          - nist-csf-2.0:ID.IM-04

      - id: ISO27001:A.5.25
        title: "Assessment and decision on information security events"
        weight: 2
        answerType: scale
        tags: [incident-response, triage, declaration]
        question: |
          Are information security events assessed and decisions made
          on whether they are to be categorized as information security
          incidents?
        purpose: |
          Without an explicit decision step, real incidents are missed
          and noise is over-elevated. Documented criteria normalize
          the call.
        expectedOutcome:
          - "Event-to-incident criteria are documented."
          - "Decisions are recorded with rationale."
          - "Outcomes feed metrics."
        howTo:
          - step: "Document event-to-incident criteria"
          - step: "Record decisions with rationale"
          - step: "Track outcomes as metrics"
        evidenceExamples:
          - "Decision criteria document"
          - "Sample decision record"
          - "Triage metrics"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No criteria"
            "3": "Criteria informal"
            "5": "Criteria applied and tracked"
        crossReferences:
          - nist-csf-2.0:DE.AE-08

      - id: ISO27001:A.5.26
        title: "Response to information security incidents"
        weight: 3
        answerType: scale
        tags: [incident-response, response, execution]
        question: |
          Are information security incidents responded to in accordance
          with documented procedures?
        purpose: |
          Procedure adherence under stress determines whether response
          is consistent and auditable. Deviation without reason is a
          common audit finding.
        expectedOutcome:
          - "Response procedures are followed during incidents."
          - "Deviations are recorded with rationale."
          - "Response actions are timestamped."
        howTo:
          - step: "Apply documented response procedures"
          - step: "Record deviations and rationale"
          - step: "Timestamp response actions"
        evidenceExamples:
          - "Response procedure"
          - "Incident timeline"
          - "Deviation record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Procedures not used"
            "3": "Partial adherence"
            "5": "Procedures followed and logged"
        crossReferences:
          - nist-csf-2.0:RS.MA-01

      - id: ISO27001:A.5.27
        title: "Learning from information security incidents"
        weight: 2
        answerType: scale
        tags: [incident-response, lessons-learned, improvement]
        question: |
          Is knowledge gained from information security incidents used
          to strengthen and improve information security controls?
        purpose: |
          Repeating incidents indicate that lessons did not become
          changes. A structured lessons-learned step turns incidents
          into program inputs.
        expectedOutcome:
          - "Lessons learned are documented per material incident."
          - "Improvements are tracked to closure."
          - "Recurring root causes drive program changes."
        howTo:
          - step: "Conduct lessons learned after material incidents"
          - step: "Track improvements to closure"
          - step: "Aggregate recurring root causes"
        evidenceExamples:
          - "Lessons learned report"
          - "Improvement backlog"
          - "Root cause trend report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No lessons learned"
            "3": "Captured, not tracked"
            "5": "Tracked and driving change"
        crossReferences:
          - nist-csf-2.0:RS.AN-03

      - id: ISO27001:A.5.28
        title: "Collection of evidence"
        weight: 2
        answerType: scale
        tags: [incident-response, forensics, evidence]
        question: |
          Are procedures for the identification, collection, acquisition,
          and preservation of evidence related to information security
          events established and applied?
        purpose: |
          Evidence collected without procedure can be inadmissible or
          unreliable. Documented procedures protect the value of
          evidence for both internal and external uses.
        expectedOutcome:
          - "Evidence handling procedures are documented."
          - "Integrity and provenance are preserved."
          - "Chain of custody is maintained."
        howTo:
          - step: "Adopt evidence handling procedures"
          - step: "Preserve integrity and provenance"
          - step: "Maintain chain of custody"
        evidenceExamples:
          - "Evidence handling SOP"
          - "Hash / signature record"
          - "Chain of custody form"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Ad hoc collection"
            "3": "Procedures partial"
            "5": "Procedures applied"

      - id: ISO27001:A.5.29
        title: "Information security during disruption"
        weight: 3
        answerType: scale
        tags: [continuity, resilience, disruption]
        question: |
          Has the organization planned how to maintain information
          security at an appropriate level during disruption?
        purpose: |
          Security controls often degrade or are disabled during
          disruption. Pre-planned security degradation modes prevent
          security from becoming the cost of continuity.
        expectedOutcome:
          - "Security expectations during disruption are documented."
          - "Compensating controls are planned for degraded modes."
          - "Plans are exercised."
        howTo:
          - step: "Document security expectations during disruption"
          - step: "Plan compensating controls for degraded modes"
          - step: "Exercise plans"
        evidenceExamples:
          - "Security continuity plan"
          - "Degraded mode controls"
          - "Exercise report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No plan"
            "3": "Plan untested"
            "5": "Plan exercised"
        crossReferences:
          - nist-csf-2.0:RC.RP-01

      - id: ISO27001:A.5.30
        title: "ICT readiness for business continuity"
        weight: 2
        answerType: scale
        tags: [continuity, ict, rto]
        question: |
          Is ICT readiness planned, implemented, maintained, and tested
          based on business continuity objectives and ICT continuity
          requirements?
        purpose: |
          Business continuity plans that assume ICT services will return
          on demand frequently fail. Documented and tested ICT
          continuity meets the BCP at the right point.
        expectedOutcome:
          - "ICT continuity requirements are documented."
          - "ICT recovery plans are tested."
          - "Test outcomes inform BCP and ICT investment."
        howTo:
          - step: "Capture ICT continuity requirements (RTO, RPO)"
          - step: "Test recovery procedures"
          - step: "Feed outcomes to BCP and investment planning"
        evidenceExamples:
          - "ICT continuity plan"
          - "Recovery test report"
          - "BCP update record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No ICT continuity"
            "3": "Plan untested"
            "5": "Plan tested, integrated"

      - id: ISO27001:A.5.31
        title: "Legal, statutory, regulatory and contractual requirements"
        weight: 3
        answerType: scale
        tags: [governance, compliance, legal]
        question: |
          Are legal, statutory, regulatory, and contractual requirements
          relevant to information security and the organization's
          approach to meet them identified, documented, and kept up to
          date for each information system and the organization?
        purpose: |
          Failure to meet a known obligation is a fast path to penalty,
          contract loss, or breach notification. An obligations register
          is the basis for demonstrating due care.
        expectedOutcome:
          - "A current register of applicable obligations exists."
          - "Each obligation has an owner and a control mapping."
          - "Changes in obligations trigger impact review."
        howTo:
          - step: "Maintain a register of applicable obligations"
          - step: "Map each obligation to internal controls"
          - step: "Review on legal / contract changes"
        evidenceExamples:
          - "Legal obligations register"
          - "Obligation-to-control mapping"
          - "Review log"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No register"
            "3": "Register outdated"
            "5": "Register maintained and mapped"
        crossReferences:
          - nist-csf-2.0:GV.OC-03

      - id: ISO27001:A.5.32
        title: "Intellectual property rights"
        weight: 2
        answerType: scale
        tags: [governance, ip, legal, licensing]
        question: |
          Are appropriate procedures implemented to protect intellectual
          property rights and ensure compliance with related obligations
          (e.g., software licensing)?
        purpose: |
          IP misuse exposes the organization to legal action and
          contract termination. Procedures around licensing and use
          reduce both inadvertent and deliberate misuse.
        expectedOutcome:
          - "IP and licensing procedures are documented."
          - "Software license inventory is maintained."
          - "Compliance is monitored."
        howTo:
          - step: "Document IP and licensing procedures"
          - step: "Maintain software license inventory"
          - step: "Monitor compliance"
        evidenceExamples:
          - "IP policy"
          - "License inventory"
          - "Compliance scan report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No IP control"
            "3": "Inventory partial"
            "5": "Inventory + compliance"

      - id: ISO27001:A.5.33
        title: "Protection of records"
        weight: 2
        answerType: scale
        tags: [data, records, retention]
        question: |
          Are records protected from loss, destruction, falsification,
          unauthorized access, and unauthorized release in accordance
          with legislative, regulatory, contractual, and business
          requirements?
        purpose: |
          Records carry evidentiary, contractual, and regulatory weight.
          Their loss or tampering produces direct legal and operational
          consequences.
        expectedOutcome:
          - "Records retention requirements are documented."
          - "Protection controls match requirements."
          - "Retention and disposal are auditable."
        howTo:
          - step: "Document records retention requirements"
          - step: "Apply protection commensurate with requirements"
          - step: "Audit retention and disposal"
        evidenceExamples:
          - "Records retention schedule"
          - "Protection control mapping"
          - "Disposal audit log"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No retention rules"
            "3": "Rules exist, not audited"
            "5": "Rules audited and enforced"

      - id: ISO27001:A.5.34
        title: "Privacy and protection of PII"
        weight: 3
        answerType: scale
        tags: [privacy, pii, dpo, gdpr]
        question: |
          Are privacy and the protection of personally identifiable
          information addressed as required by applicable laws,
          regulations, and contractual requirements?
        purpose: |
          PII handling is regulated globally with material penalties.
          Aligning privacy and security controls is required to meet
          obligations and to demonstrate accountability.
        expectedOutcome:
          - "Privacy obligations are identified and assigned an owner."
          - "Privacy controls (lawful basis, DPIA, subject rights) are documented."
          - "Privacy and security incident processes are linked."
        howTo:
          - step: "Identify privacy obligations and owner"
          - step: "Document privacy controls (DPIAs, subject rights, lawful basis)"
          - step: "Link privacy with security incident processes"
        evidenceExamples:
          - "Privacy obligations register"
          - "DPIA template / record"
          - "Privacy incident playbook"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No privacy program"
            "3": "Partial"
            "5": "Documented and exercised"
        appliesIf: "data.contains_pii == true"

      - id: ISO27001:A.5.35
        title: "Independent review of information security"
        weight: 2
        answerType: scale
        tags: [governance, audit, review]
        question: |
          Is the organization's approach to managing information
          security and its implementation reviewed independently at
          planned intervals or when significant changes occur?
        purpose: |
          Self-assessment alone misses blind spots. Independent review
          (internal audit, external review, certification audits)
          provides a fresh perspective and reassurance.
        expectedOutcome:
          - "Independent review cadence is documented."
          - "Findings are tracked to closure."
          - "Reviews cover both design and operating effectiveness."
        howTo:
          - step: "Schedule independent reviews on a defined cadence"
          - step: "Track findings to closure"
          - step: "Cover both design and operating effectiveness"
        evidenceExamples:
          - "Audit plan / schedule"
          - "Audit report"
          - "Findings tracker"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No reviews"
            "3": "Reviews irregular"
            "5": "Reviews regular, findings tracked"

      - id: ISO27001:A.5.36
        title: "Compliance with policies, rules and standards for information security"
        weight: 2
        answerType: scale
        tags: [governance, compliance, monitoring]
        question: |
          Is compliance with the organization's information security
          policy, topic-specific policies, rules, and standards regularly
          reviewed?
        purpose: |
          Policies without compliance monitoring drift into voluntary
          guidelines. Routine review keeps the policy stack credible.
        expectedOutcome:
          - "Compliance reviews are scheduled and performed."
          - "Non-compliance is recorded and addressed."
          - "Trends inform policy updates."
        howTo:
          - step: "Schedule compliance reviews per policy"
          - step: "Record and address non-compliance"
          - step: "Feed trends into policy review"
        evidenceExamples:
          - "Compliance review plan"
          - "Non-compliance log"
          - "Policy update from trend"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No compliance review"
            "3": "Reviewed irregularly"
            "5": "Reviewed and acted upon"

      - id: ISO27001:A.5.37
        title: "Documented operating procedures"
        weight: 2
        answerType: scale
        tags: [governance, procedures, documentation, operations]
        question: |
          Are operating procedures for information processing facilities
          documented and made available to all users who need them?
        purpose: |
          Tribal knowledge fails as soon as staff change. Documented
          procedures preserve operational consistency and reduce
          error-driven incidents.
        expectedOutcome:
          - "Operating procedures are documented and accessible."
          - "Procedures are reviewed periodically."
