            "3": "Principles unused"
            "5": "Principles applied"

      - id: ISO27001:A.8.28
        title: "Secure coding"
        weight: 3
        answerType: scale
        tags: [sdlc, secure-coding, sast]
        question: |
          Are secure coding principles applied to software development?
        purpose: |
          The majority of application vulnerabilities trace back to a
          small set of well-known coding mistakes. Secure coding
          practice plus automated checking blocks most at source.
        expectedOutcome:
          - "Secure coding standards are defined and used."
          - "SAST runs in pipelines."
          - "Findings are triaged and fixed under SLA."
        howTo:
          - step: "Adopt secure coding standards"
          - step: "Run SAST in CI"
          - step: "Triage and fix findings under SLA"
        evidenceExamples:
          - "Secure coding standard"
          - "SAST results"
          - "Fix SLA report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No secure coding"
            "3": "Standards, no SAST"
            "5": "Standards + SAST + SLA"
        appliesIf: "organization.develops_software == true"

      - id: ISO27001:A.8.29
        title: "Security testing in development and acceptance"
        weight: 2
        answerType: scale
        tags: [sdlc, testing, dast, sca]
        question: |
