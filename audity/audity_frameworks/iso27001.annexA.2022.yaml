          - "Risks at the siting level are reviewed."
        howTo:
          - step: "Document siting standards"
          - step: "Identify equipment in sensitive areas"
          - step: "Review siting risks on relocations"
        evidenceExamples:
          - "Siting standards document"
          - "Critical equipment register"
          - "Siting review record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No siting standards"
            "3": "Standards partial"
            "5": "Standards applied and reviewed"
        appliesIf: "facility.onPremises == true"

