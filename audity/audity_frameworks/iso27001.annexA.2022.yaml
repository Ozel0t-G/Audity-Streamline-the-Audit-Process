          and enforced.
        expectedOutcome:
          - "Post-employment obligations are defined."
          - "Obligations are communicated at exit."
          - "Enforcement options are documented."
        howTo:
          - step: "Define post-employment obligations"
          - step: "Communicate at exit interview"
          - step: "Maintain enforcement options with legal"
        evidenceExamples:
          - "Post-employment obligation clause"
          - "Exit checklist"
          - "Enforcement playbook"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No obligations"
            "3": "Obligations not communicated"
            "5": "Communicated and enforceable"

      - id: ISO27001:A.6.6
        title: "Confidentiality or non-disclosure agreements"
        weight: 2
        answerType: scale
        tags: [people, nda, confidentiality, legal]
        question: |
          Are confidentiality or non-disclosure agreements reflecting
          the organization's needs for the protection of information
          identified, regularly reviewed, and signed by personnel and
          other relevant interested parties?
        purpose: |
          NDAs are the standard legal lever protecting confidential
          information shared with employees, contractors, and partners.
          Current, signed agreements are evidence of intent and basis
