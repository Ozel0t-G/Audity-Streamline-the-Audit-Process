      - id: ISO27001:A.8.25
        title: "Secure development life cycle"
        weight: 3
        answerType: scale
        tags: [sdlc, secure-development, devsecops]
        question: |
          Are rules for the secure development of software and systems
          established and applied?
        purpose: |
          Security retrofitted post-build is the most expensive option.
          A documented secure SDLC catches design and implementation
          issues at the cheapest stage.
        expectedOutcome:
          - "Secure SDLC rules are documented and applied."
          - "Security activities exist per lifecycle stage."
          - "Compliance with rules is monitored."
        howTo:
          - step: "Document secure SDLC per lifecycle stage"
          - step: "Embed security activities into the SDLC"
          - step: "Monitor compliance"
        evidenceExamples:
          - "Secure SDLC policy"
          - "Stage-gate checklist"
          - "Compliance report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No secure SDLC"
            "3": "Partial"
            "5": "Embedded and monitored"
        crossReferences:
          - nist-csf-2.0:PR.PS-06
        appliesIf: "organization.develops_software == true"

