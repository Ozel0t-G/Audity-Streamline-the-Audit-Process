          - step: "Authorize maintenance providers"
          - step: "Log maintenance"
        evidenceExamples:
          - "Maintenance schedule"
          - "Provider authorization record"
          - "Maintenance log"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No maintenance regime"
            "3": "Maintenance ad hoc"
            "5": "Maintenance scheduled and logged"

      - id: ISO27001:A.7.14
        title: "Secure disposal or re-use of equipment"
        weight: 3
        answerType: scale
        tags: [physical-security, disposal, sanitization]
        question: |
          Are items of equipment containing storage media verified to
          ensure that any sensitive data and licensed software has been
          removed or securely overwritten prior to disposal or re-use?
        purpose: |
          Improperly disposed equipment is a frequent source of data
          leakage and regulatory action. Verified sanitization closes
          that path.
        expectedOutcome:
          - "Sanitization procedure exists per media type."
          - "Sanitization is verified before disposal or re-use."
          - "Certificates are retained."
        howTo:
          - step: "Document sanitization procedure per media type"
          - step: "Verify sanitization before disposal / re-use"
          - step: "Retain certificates"
        evidenceExamples:
          - "Sanitization procedure"
          - "Sanitization certificate"
          - "Disposal log"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No sanitization"
            "3": "Sanitization not verified"
            "5": "Verified and certified"

  - id: technological
    name: "A.8 Technological controls"
    description: |
      Technical controls covering endpoints, access, cryptography,
      logging, monitoring, network security, secure development,
      change management, and protection of test and production
      environments.
    controls:
      - id: ISO27001:A.8.1
        title: "User endpoint devices"
        weight: 3
        answerType: scale
        tags: [endpoint, devices, hardening]
        question: |
          Is information stored on, processed by, or accessible via
          user endpoint devices protected through documented controls
          appropriate to risk?
        purpose: |
          Endpoints are where users interact with sensitive data and
          where most initial compromises land. Endpoint controls are
          high-leverage in real-world risk reduction.
        expectedOutcome:
          - "Endpoint hardening baseline is defined and enforced."
          - "Endpoint protection (EDR, anti-malware) is deployed."
          - "Endpoint compliance is monitored."
        howTo:
          - step: "Define hardening baseline"
          - step: "Deploy endpoint protection"
          - step: "Monitor endpoint compliance"
        evidenceExamples:
          - "Hardening baseline"
          - "Endpoint compliance dashboard"
          - "EDR coverage report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No endpoint controls"
            "3": "Partial"
            "5": "Baseline + EDR + monitoring"

      - id: ISO27001:A.8.2
        title: "Privileged access rights"
        weight: 3
        answerType: scale
        tags: [iam, privileged-access, pam]
        question: |
          Are the allocation and use of privileged access rights
          restricted and managed under a documented process, including
          periodic review?
        purpose: |
          Privileged accounts are the dominant target for adversaries.
          Restriction, just-in-time use, and review materially limit
          their abuse.
        expectedOutcome:
          - "Privileged accounts are inventoried."
          - "Use is restricted (e.g., just-in-time, PAM)."
          - "Quarterly or more frequent review is performed."
        howTo:
          - step: "Inventory privileged accounts"
          - step: "Restrict use via PAM / just-in-time"
          - step: "Run quarterly reviews"
        evidenceExamples:
          - "Privileged account inventory"
          - "PAM configuration"
          - "Review report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No control of privileged access"
            "3": "Partial"
            "5": "PAM + reviews"

      - id: ISO27001:A.8.3
        title: "Information access restriction"
        weight: 3
        answerType: scale
        tags: [access-control, authorization, data]
        question: |
          Is access to information and other associated assets
          restricted in accordance with the established topic-specific
          policy on access control?
        purpose: |
          Over-broad access multiplies the impact of any compromised
          account. Restriction by policy is what aligns technical
          access with intent.
        expectedOutcome:
          - "Access restrictions reflect the access control policy."
          - "Default deny is the baseline."
          - "Exceptions are documented and time-bound."
        howTo:
          - step: "Apply default deny baseline"
          - step: "Reflect policy in technical controls"
          - step: "Time-bound exceptions"
        evidenceExamples:
          - "Access policy"
          - "Sample technical enforcement"
          - "Exception register"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Broad access"
            "3": "Restrictions partial"
            "5": "Restrictions enforced"

      - id: ISO27001:A.8.4
        title: "Access to source code"
        weight: 2
        answerType: scale
        tags: [access-control, source-code, development]
        question: |
          Is read and write access to source code, development tools,
          and software libraries appropriately managed?
        purpose: |
          Source code access enables supply chain compromise and IP
          loss. Tight management of code and build environments
          protects both confidentiality and integrity.
        expectedOutcome:
          - "Source code access is role-based and reviewed."
          - "Code repository access is logged."
          - "Build pipelines enforce policy on commits and reviews."
        howTo:
          - step: "Implement role-based access to repos and pipelines"
          - step: "Log code repository access"
          - step: "Enforce review and signing on commits"
        evidenceExamples:
          - "Repo access policy"
          - "Repo audit log"
          - "Pipeline policy"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No code access control"
            "3": "Access broad"
            "5": "Access role-based, logged"
        appliesIf: "organization.develops_software == true"

      - id: ISO27001:A.8.5
        title: "Secure authentication"
        weight: 3
        answerType: scale
        tags: [iam, authentication, mfa]
        question: |
          Are secure authentication technologies and procedures
          implemented in accordance with the access control policy and
          risk?
        purpose: |
          Weak authentication on internet-exposed and privileged
          interfaces is the most exploited weakness. Strong methods
          (MFA, phishing-resistant, machine identity) materially raise
          the attacker cost.
        expectedOutcome:
          - "MFA is enforced for remote and privileged access."
          - "Phishing-resistant methods are used for high-risk access."
          - "Authentication failures are logged and alerted."
        howTo:
          - step: "Enforce MFA on remote and privileged access"
          - step: "Prefer phishing-resistant methods for highest risk"
          - step: "Alert on suspicious authentication patterns"
        evidenceExamples:
          - "MFA policy and enforcement report"
          - "Authentication log review"
          - "Phishing-resistant configuration"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No MFA"
            "3": "MFA partial"
            "5": "MFA enforced + phishing-resistant"
        crossReferences:
          - nist-csf-2.0:PR.AA-03

      - id: ISO27001:A.8.6
        title: "Capacity management"
        weight: 2
        answerType: scale
        tags: [availability, capacity, performance]
        question: |
          Are the use of resources monitored and adjusted in line with
          current and expected capacity requirements?
        purpose: |
          Capacity exhaustion mimics denial of service. Forward-looking
          capacity management keeps availability inside committed
          ranges.
        expectedOutcome:
          - "Capacity targets per critical service are documented."
          - "Capacity is monitored against thresholds."
          - "Action is taken before exhaustion."
        howTo:
          - step: "Document capacity targets per critical service"
          - step: "Monitor capacity with thresholds"
          - step: "Act on threshold breaches in advance"
        evidenceExamples:
          - "Capacity plan"
          - "Capacity dashboard"
          - "Scaling action record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 18
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No capacity management"
            "3": "Monitored, not acted on"
            "5": "Planned and acted on"

      - id: ISO27001:A.8.7
        title: "Protection against malware"
        weight: 3
        answerType: scale
        tags: [endpoint, malware, anti-malware, edr]
        question: |
          Is protection against malware implemented and supported by
          appropriate user awareness?
        purpose: |
          Malware remains a dominant initial-access and impact vector.
          Layered defenses (technical plus awareness) materially reduce
          successful execution.
        expectedOutcome:
          - "Anti-malware / EDR is deployed across in-scope endpoints."
          - "Signatures and detection content are kept current."
          - "User awareness supports the technical controls."
        howTo:
          - step: "Deploy anti-malware / EDR"
          - step: "Keep detection content current"
          - step: "Support with user awareness"
        evidenceExamples:
          - "EDR coverage report"
          - "Update / signature status"
          - "Awareness campaign record"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No protection"
            "3": "Partial coverage"
            "5": "Full coverage + awareness"

      - id: ISO27001:A.8.8
        title: "Management of technical vulnerabilities"
        weight: 3
        answerType: scale
        tags: [vulnerability, patching, scanning]
        question: |
          Is information about technical vulnerabilities of information
          systems in use obtained, the organization's exposure
          evaluated, and appropriate measures taken in a timely manner?
        purpose: |
          The window between vulnerability disclosure and exploitation
          continues to shrink. A disciplined vulnerability management
          process is what keeps the window manageable.
        expectedOutcome:
          - "Scanning runs on a defined cadence."
          - "Vulnerabilities are validated, prioritized, and tracked."
          - "Patching SLAs by severity are met."
        howTo:
          - step: "Run regular vulnerability scans"
          - step: "Validate and prioritize findings"
          - step: "Track patching against SLAs"
        evidenceExamples:
          - "Scan reports"
          - "Vulnerability register"
          - "SLA compliance report"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No vuln management"
            "3": "Scanning, no SLA"
            "5": "SLAs met"
        crossReferences:
          - nist-csf-2.0:ID.RA-01

      - id: ISO27001:A.8.9
        title: "Configuration management"
        weight: 3
        answerType: scale
        tags: [configuration, hardening, drift]
        question: |
          Are configurations of hardware, software, services, and
          networks established, documented, implemented, monitored, and
          reviewed?
        purpose: |
          Drift from secure configuration produces silent vulnerability.
          Configuration management restores the link between policy
          and operational reality.
        expectedOutcome:
          - "Secure baselines exist per platform."
          - "Drift is detected and remediated."
          - "Configuration changes follow change control."
        howTo:
          - step: "Define secure baselines per platform"
          - step: "Detect drift continuously"
          - step: "Channel changes through change control"
        evidenceExamples:
          - "Baseline definitions"
          - "Drift report"
          - "Change ticket"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No baselines"
            "3": "Baselines, no drift detection"
            "5": "Baselines + detection + control"
        crossReferences:
          - nist-csf-2.0:PR.PS-01

      - id: ISO27001:A.8.10
        title: "Information deletion"
        weight: 2
        answerType: scale
        tags: [data, deletion, retention]
        question: |
          Is information stored in information systems, devices, or
          storage media deleted when no longer required?
        purpose: |
          Excess retention multiplies the impact of a breach and may
          violate privacy obligations. Deletion at end-of-need is both
          a privacy and a security control.
        expectedOutcome:
          - "Retention periods are defined per data type."
          - "Deletion is performed at end-of-retention."
          - "Deletion is verifiable."
        howTo:
          - step: "Define retention periods per data type"
          - step: "Automate deletion at end-of-retention where possible"
          - step: "Maintain deletion evidence"
        evidenceExamples:
          - "Retention schedule"
          - "Deletion job log"
          - "Deletion certificate"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No deletion practice"
            "3": "Deletion ad hoc"
            "5": "Deletion scheduled and verified"

      - id: ISO27001:A.8.11
        title: "Data masking"
        weight: 2
        answerType: scale
        tags: [data, masking, privacy, pseudonymization]
        question: |
          Is data masking used in accordance with the access control
          policy and applicable business and regulatory requirements,
          taking into account applicable legislation?
        purpose: |
          Masking and pseudonymization let business processes continue
          without exposing the original data. They reduce both breach
          impact and privacy obligations in many contexts.
        expectedOutcome:
          - "Masking / pseudonymization standards are defined."
          - "Applied to non-production environments where appropriate."
          - "Reversibility is controlled."
        howTo:
          - step: "Define masking / pseudonymization standards"
          - step: "Apply to non-production environments"
          - step: "Control reversibility"
        evidenceExamples:
          - "Masking policy"
          - "Sample masked dataset"
          - "Reversibility access control"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No masking"
            "3": "Masking partial"
            "5": "Masking enforced"
        appliesIf: "data.contains_pii == true"

      - id: ISO27001:A.8.12
        title: "Data leakage prevention"
        weight: 3
        answerType: scale
        tags: [data, dlp, exfiltration, monitoring]
        question: |
          Are data leakage prevention measures applied to systems,
          networks, and any other devices that process, store, or
          transmit sensitive information?
        purpose: |
          Egress is where breaches become incidents. DLP capabilities,
          even at policy level, reduce both accidental and deliberate
          exfiltration.
        expectedOutcome:
          - "DLP policy / rules are defined."
          - "DLP is enforced on key egress channels."
          - "Alerts are triaged."
        howTo:
          - step: "Define DLP policy / rules per data type"
          - step: "Enforce on email, web, and endpoint where supported"
          - step: "Triage alerts"
        evidenceExamples:
          - "DLP policy"
          - "DLP enforcement coverage"
          - "Alert triage log"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No DLP"
            "3": "Monitor only"
            "5": "Enforce and triage"

      - id: ISO27001:A.8.13
        title: "Information backup"
        weight: 3
        answerType: scale
        tags: [backup, recovery, ransomware]
        question: |
          Are backup copies of information, software, and systems
          maintained, regularly tested, and protected in accordance with
          the agreed topic-specific policy on backup?
        purpose: |
          Backups are the strongest control against ransomware and
          destructive incidents. Untested or unprotected backups have a
          high rate of silent failure when needed.
        expectedOutcome:
          - "Backups follow a documented policy aligned to RPO / RTO."
          - "At least one offline or immutable copy exists."
          - "Restore tests are performed and documented."
        howTo:
          - step: "Apply backup policy aligned to RPO/RTO"
          - step: "Maintain offline / immutable copy"
          - step: "Test restores and document"
        evidenceExamples:
          - "Backup policy"
          - "Restore test report"
          - "Backup access audit"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No backups"
            "3": "Backups untested"
            "5": "Backups tested + immutable copy"
        crossReferences:
          - nist-csf-2.0:PR.DS-11

      - id: ISO27001:A.8.14
        title: "Redundancy of information processing facilities"
        weight: 2
        answerType: scale
        tags: [availability, redundancy, dr]
        question: |
          Are information processing facilities implemented with
          redundancy sufficient to meet availability requirements?
        purpose: |
          Availability commitments rest on the ability of the
          underlying facilities to absorb single component failures.
          Redundancy converts that ability from theory to practice.
        expectedOutcome:
          - "Critical services have documented redundancy."
          - "Failover is tested periodically."
          - "Single points of failure are tracked."
        howTo:
          - step: "Document redundancy per critical service"
          - step: "Test failover periodically"
          - step: "Track and reduce single points of failure"
        evidenceExamples:
          - "Redundancy design"
          - "Failover test report"
          - "SPOF register"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No redundancy"
            "3": "Redundancy untested"
            "5": "Redundancy tested"

      - id: ISO27001:A.8.15
        title: "Logging"
        weight: 3
        answerType: scale
        tags: [logging, monitoring, siem]
        question: |
          Are logs that record activities, exceptions, faults, and
          other relevant events produced, stored, protected, and
          analyzed?
        purpose: |
          Logs are the basis for detection, investigation, and
          accountability. Centralized, retained, and integrity-protected
          logs make all three possible.
        expectedOutcome:
          - "Logging requirements per system class are defined."
          - "Logs are centralized with defined retention."
          - "Log integrity is protected."
        howTo:
          - step: "Define what to log per system class"
          - step: "Forward to a central, retained store"
          - step: "Protect log integrity"
        evidenceExamples:
          - "Logging requirements document"
          - "SIEM ingestion report"
          - "Integrity protection design"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No central logging"
            "3": "Partial centralization"
            "5": "Central + retained + integrity"
        crossReferences:
          - nist-csf-2.0:PR.PS-04

      - id: ISO27001:A.8.16
        title: "Monitoring activities"
        weight: 3
        answerType: scale
        tags: [monitoring, soc, detection]
        question: |
          Are networks, systems, and applications monitored for
          anomalous behavior, and are appropriate actions taken to
          evaluate potential information security incidents?
        purpose: |
          Logs without monitoring are passive. Active monitoring
          converts log data into timely detections and response actions.
        expectedOutcome:
          - "Detections are defined and deployed across log sources."
          - "Detections are tuned to reduce noise."
          - "Actions on detections are tracked."
        howTo:
          - step: "Build detections across log sources"
          - step: "Tune detections regularly"
          - step: "Track actions taken"
        evidenceExamples:
          - "Detection rule export"
          - "Tuning log"
          - "Action tracker"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No monitoring"
            "3": "Monitoring untuned"
            "5": "Monitoring tuned and actioned"
        crossReferences:
          - nist-csf-2.0:DE.CM-01

      - id: ISO27001:A.8.17
        title: "Clock synchronization"
        weight: 1
        answerType: scale
        tags: [logging, time, ntp]
        question: |
          Are the clocks of information processing systems synchronized
          to approved time sources?
        purpose: |
          Inconsistent clocks make incident reconstruction unreliable
          and undermine the evidentiary value of logs.
        expectedOutcome:
          - "Approved time sources are defined."
          - "Systems sync to those sources."
          - "Drift is monitored."
        howTo:
          - step: "Define approved time sources"
          - step: "Configure systems to sync"
          - step: "Monitor for drift"
        evidenceExamples:
          - "NTP / time source policy"
          - "Drift monitoring report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 12
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No sync"
            "3": "Sync without monitoring"
            "5": "Sync and monitored"

      - id: ISO27001:A.8.18
        title: "Use of privileged utility programs"
        weight: 2
        answerType: scale
        tags: [endpoint, utilities, privileged-access]
        question: |
          Is the use of utility programs that might be capable of
          overriding system and application controls restricted and
          tightly controlled?
        purpose: |
          Privileged utilities can bypass downstream controls. Their
          uncontrolled presence makes the rest of the configuration
          unreliable.
        expectedOutcome:
          - "Privileged utilities are inventoried."
          - "Use is restricted and logged."
          - "Removal is enforced where unnecessary."
        howTo:
          - step: "Inventory privileged utilities"
          - step: "Restrict use; log invocations"
          - step: "Remove where unnecessary"
        evidenceExamples:
          - "Utility inventory"
          - "Use log"
          - "Removal record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Free use"
            "3": "Partial control"
            "5": "Controlled, logged"

      - id: ISO27001:A.8.19
        title: "Installation of software on operational systems"
        weight: 2
        answerType: scale
        tags: [change-management, software, allowlisting]
        question: |
          Are procedures and measures implemented to securely manage
          software installation on operational systems?
        purpose: |
          Unmanaged software installation introduces both vulnerability
          and untrusted code. Controlled installation paths keep the
          attack surface measurable.
        expectedOutcome:
          - "Only approved software can be installed on operational systems."
          - "Installation goes through change control."
          - "Drift is detected."
        howTo:
          - step: "Restrict installation to approved software"
          - step: "Require change control for installs"
          - step: "Detect drift"
        evidenceExamples:
          - "Approved software list"
          - "Change records for installs"
          - "Drift report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Free installation"
            "3": "Partial control"
            "5": "Approved-only, drift detected"

      - id: ISO27001:A.8.20
        title: "Networks security"
        weight: 3
        answerType: scale
        tags: [network, segmentation, firewall]
        question: |
          Are networks and network devices secured, managed, and
          controlled to protect information in systems and applications?
        purpose: |
          Network design is what limits blast radius. Sound design and
          managed devices prevent flat-network amplification of any
          single compromise.
        expectedOutcome:
          - "Network segmentation is implemented based on trust zones."
          - "Network device configurations follow baselines."
          - "Network changes follow change control."
        howTo:
          - step: "Segment networks by trust zone"
          - step: "Baseline network device configurations"
          - step: "Channel network changes through change control"
        evidenceExamples:
          - "Network design"
          - "Device baseline configuration"
          - "Change record"
        evidenceMinimumCount: 2
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "Flat network"
            "3": "Segmentation partial"
            "5": "Segmentation + baselines + control"
        crossReferences:
          - nist-csf-2.0:PR.IR-01

      - id: ISO27001:A.8.21
        title: "Security of network services"
        weight: 2
        answerType: scale
        tags: [network, services, supplier]
        question: |
          Are security mechanisms, service levels, and requirements of
          network services identified, implemented, and monitored?
        purpose: |
          Network services delivered by providers are part of the trust
          boundary. Requirements and monitoring make the assurance
          provided by those services tangible.
        expectedOutcome:
          - "Required security mechanisms for network services are documented."
          - "Service levels include security requirements."
          - "Delivery is monitored."
        howTo:
          - step: "Document required security mechanisms"
          - step: "Include security in service levels"
          - step: "Monitor delivery"
        evidenceExamples:
          - "Service requirement document"
          - "SLA with security clauses"
          - "Monitoring report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 36
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No requirements"
            "3": "Requirements partial"
            "5": "Requirements + monitoring"

      - id: ISO27001:A.8.22
        title: "Segregation of networks"
        weight: 2
        answerType: scale
        tags: [network, segmentation, zoning]
        question: |
          Are groups of information services, users, and information
          systems segregated in the organization's networks?
        purpose: |
          Segregation limits both lateral movement and accidental
          cross-environment exposure. Specific zoning is a core part of
          modern network design.
        expectedOutcome:
          - "Network zones are defined and enforced."
          - "Inter-zone flows are explicit."
          - "Reviews keep zoning current."
        howTo:
          - step: "Define and enforce network zones"
          - step: "Make inter-zone flows explicit"
          - step: "Review zoning periodically"
        evidenceExamples:
          - "Zoning design"
          - "Inter-zone flow matrix"
          - "Review record"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No segregation"
            "3": "Partial"
            "5": "Zoned and reviewed"

      - id: ISO27001:A.8.23
        title: "Web filtering"
        weight: 2
        answerType: scale
        tags: [web, filtering, egress]
        question: |
          Is access to external websites managed to reduce exposure to
          malicious content?
        purpose: |
          Outbound web is a frequent malware delivery and exfiltration
          channel. Filtering reduces exposure to both well-known
          malicious destinations and inappropriate categories.
        expectedOutcome:
          - "Web filtering is enforced for managed devices."
          - "Categories and known-bad are blocked."
          - "Exceptions are managed."
        howTo:
          - step: "Enforce web filtering on managed devices"
          - step: "Block known-bad and risky categories"
          - step: "Manage exceptions"
        evidenceExamples:
          - "Filtering policy"
          - "Block category list"
          - "Exception register"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 18
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No filtering"
            "3": "Filtering inconsistent"
            "5": "Filtering enforced, exceptions managed"

      - id: ISO27001:A.8.24
        title: "Use of cryptography"
        weight: 3
        answerType: scale
        tags: [cryptography, encryption, key-management]
        question: |
          Are rules for the effective use of cryptography, including
          cryptographic key management, defined and implemented?
        purpose: |
          Cryptography is among the most powerful and most-misused
          control areas. Documented rules and key management make it
          consistent and auditable.
        expectedOutcome:
          - "Cryptographic standards (algorithms, key sizes) are defined."
          - "Keys are managed under documented processes."
          - "Cryptographic use is reviewed periodically."
