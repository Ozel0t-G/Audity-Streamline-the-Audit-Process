        expectedOutcome:
          - "Standard NDAs exist for relevant roles and engagements."
          - "NDAs are signed and stored."
          - "NDAs are reviewed periodically."
        howTo:
          - step: "Maintain NDA templates with legal"
          - step: "Require signature where relevant"
          - step: "Review NDAs on cadence"
        evidenceExamples:
          - "NDA template library"
          - "Signed NDA record"
          - "Review log"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 60
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No NDAs"
            "3": "NDAs partial"
            "5": "NDAs current and signed"

      - id: ISO27001:A.6.7
        title: "Remote working"
        weight: 2
        answerType: scale
        tags: [people, remote, endpoint, byod]
        question: |
          Are security measures implemented when personnel are working
          remotely to protect information accessed, processed, or stored
          outside the organization's premises?
        purpose: |
          Remote work removes physical control over the environment.
          Specific controls are needed to restore equivalent assurance
          over devices, networks, and behaviors off-premises.
        expectedOutcome:
          - "A remote working policy is in place."
          - "Endpoint hardening and VPN / zero-trust controls are applied."
          - "Awareness includes remote-specific risks."
        howTo:
          - step: "Adopt a remote working policy"
          - step: "Apply endpoint hardening and secure remote access"
          - step: "Cover remote-specific risks in awareness"
        evidenceExamples:
          - "Remote working policy"
          - "Endpoint hardening baseline"
          - "Remote access configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No remote controls"
            "3": "Controls partial"
            "5": "Controls comprehensive"

      - id: ISO27001:A.6.8
        title: "Information security event reporting"
        weight: 2
        answerType: scale
        tags: [people, reporting, events, awareness]
        question: |
          Does the organization provide a mechanism for personnel to
          report observed or suspected information security events
          through appropriate channels in a timely manner?
        purpose: |
          Many incidents are first noticed by users. A trusted, easy
          reporting channel shortens detection time and increases the
          rate of catching issues early.
        expectedOutcome:
          - "Reporting channel is published and easy to use."
          - "Reports are acknowledged and triaged."
          - "Reporters receive feedback where appropriate."
        howTo:
          - step: "Publish a reporting channel (email, button, hotline)"
          - step: "Acknowledge and triage reports"
          - step: "Give reporters feedback"
        evidenceExamples:
          - "Reporting channel reference"
          - "Triage log"
          - "Feedback sample"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No channel"
            "3": "Channel exists, low use"
            "5": "Channel used and triaged"
        crossReferences:
          - nist-csf-2.0:ID.RA-08

  - id: physical
    name: "A.7 Physical controls"
    description: |
      Controls protecting facilities, equipment, and people against
      physical and environmental threats; includes perimeter security,
      entry control, monitoring, equipment maintenance, and secure
      disposal.
    controls:
      - id: ISO27001:A.7.1
        title: "Physical security perimeters"
        weight: 2
        answerType: scale
        tags: [physical-security, perimeter, facilities]
        question: |
          Are physical security perimeters defined and used to protect
          areas containing information and other associated assets?
        purpose: |
          A defined perimeter is the most basic physical safeguard.
          Without it, every other physical control depends on hope
          rather than design.
        expectedOutcome:
          - "Perimeters are documented per facility."
          - "Perimeter integrity is maintained."
          - "Inspections detect and repair breaches."
        howTo:
          - step: "Document perimeters per facility"
          - step: "Maintain perimeter integrity (walls, doors, fences)"
          - step: "Inspect and repair on a cadence"
        evidenceExamples:
          - "Facility security design"
          - "Inspection log"
          - "Repair ticket"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No defined perimeter"
            "3": "Perimeter not inspected"
            "5": "Perimeter maintained"
        appliesIf: "facility.onPremises == true"

      - id: ISO27001:A.7.2
        title: "Physical entry"
        weight: 3
        answerType: scale
        tags: [physical-security, access, entry-control]
        question: |
          Are secure areas protected by appropriate entry controls and
          access points, and are entries logged and reviewed?
        purpose: |
          Uncontrolled entry undoes downstream controls. Tiered entry
          with logging makes physical access auditable.
        expectedOutcome:
          - "Entry controls correspond to area sensitivity."
          - "Entries are logged."
          - "Logs are reviewed periodically."
        howTo:
          - step: "Apply entry controls per sensitivity tier"
          - step: "Log entries"
          - step: "Review logs periodically"
        evidenceExamples:
          - "Entry control matrix"
          - "Badge log extract"
          - "Log review report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No entry control"
            "3": "Entry control, no review"
            "5": "Entry control + review"
        crossReferences:
          - nist-csf-2.0:PR.AA-06
        appliesIf: "facility.onPremises == true"

      - id: ISO27001:A.7.3
        title: "Securing offices, rooms and facilities"
        weight: 2
        answerType: scale
        tags: [physical-security, facilities]
        question: |
          Are physical security measures designed and implemented for
          offices, rooms, and facilities?
        purpose: |
          Generic perimeters do not address internal area sensitivity
          (server rooms, archive, finance). Internal segmentation
          limits internal misuse.
        expectedOutcome:
          - "Internal sensitive areas are identified and protected."
          - "Construction and locks match sensitivity."
          - "Reviews keep design current."
        howTo:
          - step: "Identify internal sensitive areas"
          - step: "Apply construction / lock standards"
          - step: "Review design on changes"
        evidenceExamples:
          - "Internal area inventory"
          - "Standards document"
          - "Review report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No internal segmentation"
            "3": "Some segmentation"
            "5": "Segmented and reviewed"
        appliesIf: "facility.onPremises == true"

      - id: ISO27001:A.7.4
        title: "Physical security monitoring"
        weight: 2
        answerType: scale
        tags: [physical-security, monitoring, cctv]
        question: |
          Are premises continuously monitored for unauthorized physical
          access?
        purpose: |
          Monitoring shortens time-to-detect for physical intrusion and
          gives investigators evidence after the fact.
        expectedOutcome:
          - "Monitoring (CCTV, alarms, sensors) covers sensitive areas."
          - "Alarms are routed and triaged."
          - "Recordings are retained per policy."
        howTo:
          - step: "Cover sensitive areas with monitoring"
          - step: "Route alarms to a triage process"
          - step: "Retain recordings per policy"
        evidenceExamples:
          - "Monitoring coverage map"
          - "Alarm triage log"
          - "Retention configuration"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 18
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No monitoring"
            "3": "Monitoring without triage"
            "5": "Monitoring + triage + retention"
        crossReferences:
          - nist-csf-2.0:DE.CM-02
        appliesIf: "facility.onPremises == true"

      - id: ISO27001:A.7.5
        title: "Protecting against physical and environmental threats"
        weight: 2
        answerType: scale
        tags: [physical-security, environmental, facilities]
        question: |
          Is protection against physical and environmental threats
          (e.g., natural disasters, malicious attack, accidents)
          designed and implemented?
        purpose: |
          Environmental events cause as much downtime as cyber events
          for many organizations. Defensive design reduces both
          probability and impact.
        expectedOutcome:
          - "Environmental risk assessment is documented."
          - "Protections match assessed risk."
          - "Protections are tested."
        howTo:
          - step: "Assess environmental risks (fire, water, weather, seismic)"
          - step: "Apply protections to match"
          - step: "Test protections periodically"
        evidenceExamples:
          - "Environmental risk assessment"
          - "Protection design"
          - "Test report"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No environmental design"
            "3": "Design without testing"
            "5": "Design and tested"
        appliesIf: "facility.onPremises == true"

      - id: ISO27001:A.7.6
        title: "Working in secure areas"
        weight: 2
        answerType: scale
        tags: [physical-security, procedures, secure-areas]
        question: |
          Are security measures for working in secure areas designed
          and implemented?
        purpose: |
          Behaviours in secure areas (recording, escorting, device use)
          determine whether the area's protection holds during normal
          work.
        expectedOutcome:
          - "Procedures for working in secure areas exist."
          - "Personnel are briefed."
          - "Compliance is monitored."
        howTo:
          - step: "Document procedures for working in secure areas"
          - step: "Brief authorized personnel"
          - step: "Monitor compliance"
        evidenceExamples:
          - "Secure area procedure"
          - "Brief sign-off"
          - "Compliance check"
        evidenceMinimumCount: 1
        evidenceRetentionMonths: 24
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"
          quickAnswers:
            "0": "No procedures"
            "3": "Procedures, not briefed"
            "5": "Briefed and monitored"
        appliesIf: "facility.onPremises == true"

      - id: ISO27001:A.7.7
        title: "Clear desk and clear screen"
        weight: 1
        answerType: scale
        tags: [physical-security, clear-desk, clear-screen]
