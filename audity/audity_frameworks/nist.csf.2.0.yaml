framework:
  schemaVersion: 1
  key: nist.csf.2.0
  name: "NIST Cybersecurity Framework 2.0"
  shortName: "NIST CSF 2.0"
  version: "2.0"
  status: draft
  date: 2026-06-20
  language: en
  category: nist_csf
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "Risk Owner"
    - "CISO"
    - "IT Management"
    - "Compliance Officer"
  estimatedDurationMinutes: 480
  description: |
    The NIST Cybersecurity Framework (CSF) 2.0 is a voluntary framework
    published by the U.S. National Institute of Standards and Technology
    that helps organizations of any size or sector understand, assess,
    prioritize, and communicate their cybersecurity efforts. Version 2.0
    expands the scope beyond critical infrastructure and adds a sixth
    Function, GOVERN, that addresses cybersecurity governance and
    enterprise risk management.

    This YAML represents all 106 Subcategories of CSF 2.0 as individual
    audit-readiness controls grouped into the six Functions. Each control
    contains an audit question, the purpose of the outcome, expected
    indicators of implementation, operational guidance, and evidence
    suggestions for use inside the Audity platform.
  scopeNote: |
    In scope: all six Functions (GOVERN, IDENTIFY, PROTECT, DETECT,
    RESPOND, RECOVER), all 22 Categories, and all 106 Subcategories of
    NIST CSF 2.0 as defined in NIST CSWP 29.

    Out of scope: sector-specific Community Profiles, the Informative
    References catalog, Implementation Examples published separately by
    NIST, and the Tier descriptions. Cross-walks to other frameworks in
    this file are limited to well-known mappings (ISO/IEC 27001:2022,
    NIST SP 800-53 Rev. 5) and are advisory only.
  license:
    status: open_licensed
    confirmationRequired: false
    notice: |
      NIST CSF 2.0 is published by the U.S. National Institute of Standards
      and Technology and is not subject to copyright in the United States.
      Subcategory wording in this file has been paraphrased into audit
      question form; the original NIST text is not reproduced verbatim.

severityRubric:
  critical: |
    Control failure would directly expose regulated data, halt a mission
    critical service, or trigger a mandatory breach notification.
  high: |
    Material breach of policy or absence of a core safeguard with no
    compensating control; significant risk of operational or reputational
    impact.
  medium: |
    Control is partially implemented or inconsistently applied; residual
    risk is visible but not acute and can be remediated in the normal
    improvement cycle.
  low: |
    Documentation or maturity gap with no immediate harm; primarily a
    housekeeping or completeness issue.

