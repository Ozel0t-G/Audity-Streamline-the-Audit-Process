framework:
  schemaVersion: 1
  key: eu.nis2.2022
  name: "EU NIS2 Directive (2022/2555)"
  shortName: "NIS2"
  version: "2022/2555"
  status: draft
  date: 2026-06-20
  language: en
  category: nis2
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "CISO"
    - "Compliance Officer"
    - "DPO"
    - "Management Body"
  estimatedDurationMinutes: 300
  description: |
    Directive (EU) 2022/2555 (NIS2) is the European Union's revised
    framework for a high common level of cybersecurity across the Union.
    It defines cybersecurity risk-management measures, governance
    obligations on management bodies, and incident reporting requirements
    for essential and important entities.

    This YAML translates the obligations of NIS2 into audit-readiness
    controls grouped into Governance, Risk-Management Measures, Reporting,
    and Enforcement readiness. The ten risk-management measures of
    Article 21 are reflected one-to-one as controls.
  scopeNote: |
    In scope: governance duties (Art. 20), risk-management measures
    (Art. 21 a-j), reporting obligations (Art. 23), and basic enforcement
    readiness derived from Chapters V and VII.

    Out of scope: sector-specific transposition requirements from
    individual EU Member States, Commission Implementing Regulation
    (EU) 2024/2690 detailed technical requirements (these are referenced
    in `crossReferences` rather than expanded), and obligations on
    competent authorities, CSIRTs, or the Cooperation Group.
  license:
    status: open_licensed
    confirmationRequired: false
    notice: |
      Directive (EU) 2022/2555 is published in the Official Journal of
      the European Union. EU law texts are not subject to copyright in
      most jurisdictions. Article wording has been paraphrased into
      audit-readiness language and is not reproduced verbatim.

severityRubric:
  critical: |
    Failure exposes essential service continuity or triggers mandatory
    reporting under Art. 23; potential for regulatory fines up to 2 %
    of global turnover.
  high: |
    Material breach of an Art. 21 measure without a compensating control;
    likely to surface in supervisory review.
  medium: |
    Partial implementation of an Art. 21 measure; remediable in the
    normal improvement cycle.
  low: |
    Documentation or process maturity gap with no immediate supervisory
    impact.

