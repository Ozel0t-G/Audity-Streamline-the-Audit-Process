        title: "Cyber threat information sharing"
        weight: 1
        answerType: scale
        tags: [information-sharing, threat-intelligence, community]
        question: |
          Does the entity participate, where appropriate, in
          information-sharing arrangements for cyber threat information
          and intelligence with trusted communities?
        purpose: |
          Art. 45 enables voluntary information-sharing arrangements
          with appropriate safeguards.
        expectedOutcome:
