framework:
  schemaVersion: 1
  key: nist.sp800-53.r5.moderate
  name: "NIST SP 800-53 Rev. 5 - Moderate Baseline (Family-Level View)"
  shortName: "NIST 800-53 Rev. 5"
  version: "Rev. 5 (Moderate Baseline)"
  status: draft
  date: 2026-06-20
  language: en
  category: internal_policy
  owner: "TODO: assign framework owner"
  intendedAudience:
    - "Auditor"
    - "Compliance Officer"
    - "Security Architect"
    - "FedRAMP Lead"
  estimatedDurationMinutes: 480
  description: |
    NIST Special Publication 800-53 Rev. 5, "Security and Privacy
    Controls for Information Systems and Organizations", is the U.S.
    federal catalog of security and privacy controls. It is the basis
    of FedRAMP, FISMA, and several state and sector frameworks.

    This YAML covers the 20 control families of SP 800-53 Rev. 5 as
    audit-readiness controls, scoped to the Moderate Baseline of NIST
    SP 800-53B. The roughly 287 individual control identifiers of the
    Moderate Baseline are summarized at family level; teams using
    SP 800-53 for an Authority to Operate (ATO) must work at the
    control-identifier level.
  scopeNote: |
    In scope: all 20 control families of SP 800-53 Rev. 5 (AC, AT, AU,
    CA, CM, CP, IA, IR, MA, MP, PE, PL, PM, PS, PT, RA, SA, SC, SI, SR)
    as one control per family. The Moderate Baseline of SP 800-53B
    informs the scoring and expectations within each family.

    Out of scope: the approximately 287 individual control identifiers
    of the Moderate Baseline as separate controls; the Low and High
    baselines; control enhancements; control parameters / assignments;
    SP 800-53A assessment procedures; FedRAMP-specific tailoring.
  license:
    status: open_licensed
    confirmationRequired: false
    notice: |
      NIST SP 800-53 Rev. 5 is published by the U.S. National Institute
      of Standards and Technology and is in the public domain in the
      United States. Family and control content has been paraphrased
      into audit-readiness language and is not reproduced verbatim.

severityRubric:
  critical: |
    Failure leaves a Moderate Baseline family substantially
    unimplemented; would block FedRAMP / FISMA ATO.
  high: |
    Material gap in a family without compensating controls.
  medium: |
    Partial implementation; remediable in the normal improvement cycle.
  low: |
    Documentation or maturity gap with limited operational impact.

