server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 30m;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http://localhost:9000 http://127.0.0.1:9000; frame-ancestors 'none'; frame-src 'self' blob:; img-src 'self' data: blob: https://cdn.jsdelivr.net https://www.google.com https://t0.gstatic.com https://t1.gstatic.com https://t2.gstatic.com https://t3.gstatic.com; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'self'" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location ~ /\.(?!well-known) {
    return 404;
  }

  location ~* /(docker-compose|package-lock|package|tsconfig|vite.config|tailwind.config|postcss.config)\.(json|ya?ml|ts|js)$ {
    return 404;
  }

  location ~* ^/(src|apps|packages|frameworks|scripts|node_modules)/ {
    return 404;
  }

  location ~* \.map$ {
    return 404;
  }

  location = /index.html {
    expires -1;
    try_files /index.html =404;
  }

  location ~* \.(?:js|css)$ {
    expires -1;
    try_files $uri =404;
  }

  location ~* \.(?:png|jpe?g|gif|ico|svg|webp|woff2?)$ {
    expires 30d;
    try_files $uri =404;
  }

  location / {
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://audity-api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://audity-api:3000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
