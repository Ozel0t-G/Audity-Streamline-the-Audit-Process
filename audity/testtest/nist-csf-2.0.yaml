          - "Coverage-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.PS-06
        title: "Sichere Software-Entwicklungs-Praktiken werden angewendet"
        weight: 3
        answerType: scale
        tags: [protect, platform, ssdlc, devsecops]
        question: |
          Werden sichere Entwicklungs-Praktiken (SAST/DAST/SCA, Code-Reviews,
          Threat-Modeling, Secret-Scanning) im SDLC integriert?
        purpose: |
          „Shift-Left" reduziert Findings-Kosten um den Faktor 10-100.
          Sichere Entwicklung ist günstiger als Reparatur.
        expectedOutcome: |
          - SSDLC-Policy.
          - SAST/SCA in CI/CD.
          - Threat-Modeling vor Major-Releases.
        howTo:
