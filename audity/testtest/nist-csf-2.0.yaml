# ============================================================================
# Severity-Skala für das Risiko-Modul
# ============================================================================
severityRubric:
  critical: "Mission-Disruption oder Daten-Exposition mit unmittelbarer regulatorischer Meldepflicht."
  high:     "Signifikante Verletzung der Cybersecurity-Strategie ohne kompensierende Kontrolle."
  medium:   "Kontrolle teilweise umgesetzt; Restrisiko erkennbar, aber nicht akut."
  low:      "Dokumentations- oder Reife-Lücke ohne direkten Schaden."
