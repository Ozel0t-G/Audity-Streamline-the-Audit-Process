        weight: 3
        answerType: scale
        tags: [respond, ir-plan, activation]
        question: |
          Wird der Incident-Response-Plan beim ersten qualifizierten Incident
          ohne Verzögerung aktiviert, mit klarer Aktivierungs-Autorität?
        purpose: |
          Verzögerte Aktivierung kostet Geschwindigkeit. Klare Trigger und
          benannte Aktivierungs-Autorität verhindert Ankommens-Konflikte.
        expectedOutcome: |
          - Activation-Trigger im Plan.
          - 24/7-Erreichbarkeit der Aktivierungs-Autorität.
          - Aktivierung dokumentiert.
        howTo:
          - step: "Activation-Schwellen festlegen"
          - step: "On-Call-Rotation"
          - step: "Activation-Log-Template"
        evidenceExamples:
          - "IR-Plan-Aktivierungs-Abschnitt"
          - "On-Call-Schedule"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

