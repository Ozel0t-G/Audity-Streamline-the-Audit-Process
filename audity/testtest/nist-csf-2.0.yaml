          Schäden (mehr Assets, mehr Daten, mehr User) neu bewertet?
        purpose: |
          Incidents wachsen. Initial-Schätzungen sind fast immer zu niedrig.
          Kontinuierliche Re-Bewertung verhindert blinde Flecken.
        expectedOutcome: |
