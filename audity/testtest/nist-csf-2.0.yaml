      # ---- PR.IR: Technology Infrastructure Resilience ----
      - id: NIST-CSF-2.0:PR.IR-01
        title: "Netzwerke und Umgebungen werden vor unautorisiertem logischen Zugriff geschützt"
        weight: 3
        answerType: scale
        tags: [protect, infrastructure, network, segmentation]
        question: |
          Werden Netzwerke segmentiert und der laterale Zugriff durch Firewall-,
          Mikrosegmentations- oder Zero-Trust-Architekturen kontrolliert?
        purpose: |
          Flache Netze erlauben Angreifern nach Initial-Compromise freie Fahrt.
          Segmentierung ist der wichtigste Schadensbegrenzungs-Mechanismus.
        expectedOutcome: |
          - Mindestens 3 Netzsegmente (Untrusted/DMZ/Trusted).
          - Mikrosegmentation in Cloud-Workloads.
          - Default-Deny-Policy.
        howTo:
          - step: "Segmentations-Plan"
          - step: "Firewall-Regelwerk Default-Deny"
          - step: "Cloud-NSG mit Workload-Tags"
        evidenceExamples:
          - "Netzwerk-Diagramm"
          - "Firewall-Policy-Snapshot"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.IR-02
        title: "Technologie-Assets vor Umweltgefährdungen geschützt"
        weight: 2
        answerType: scale
        tags: [protect, infrastructure, physical, environment]
        question: |
          Werden Cybersecurity-relevante Assets vor Umweltgefährdungen
          (Strom, Feuer, Wasser, Temperatur) durch Tier-III-äquivalente
          Maßnahmen geschützt?
        purpose: |
          Verfügbarkeit ist Teil der CIA-Triade. Umwelt-Risiken werden in
          Logical-Security-Programmen oft unterschätzt.
        expectedOutcome: |
          - USV mit Generator-Backup.
          - Brandschutz mit Inert-Gas.
          - Klima-Redundanz N+1.
        howTo:
          - step: "RZ-Audit gegen Tier-Standard"
          - step: "Gap-Plan"
        evidenceExamples:
          - "RZ-Zertifikat"
          - "Audit-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.IR-03
        title: "Mechanismen für Verfügbarkeit eingebaut, um Resilienz unter normalen und adversen Bedingungen zu gewährleisten"
        weight: 3
        answerType: scale
        tags: [protect, infrastructure, availability, resilience]
        question: |
          Sind in kritische Services Redundanz, Failover und Load-Balancing
          eingebaut, sodass einzelne Ausfälle nicht zu Mission-Disruption führen?
        purpose: |
          Single Points of Failure brechen unter Last oder Angriff. Redundanz
          ist eine Investition, die sich beim ersten Outage rentiert.
        expectedOutcome: |
          - Pro kritischem Service Redundanz (Active-Active oder Active-Passive).
          - DR-Site bei Mission-Critical-Workloads.
          - Failover-Tests mind. jährlich.
        howTo:
          - step: "BIA-basierte Service-Klassifikation"
          - step: "Pro Klasse Redundanz-Standard"
          - step: "Failover-Test-Kalender"
        evidenceExamples:
          - "Service-Klassifikation"
          - "Failover-Test-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.IR-04
        title: "Adäquate Ressourcen-Kapazität für Verfügbarkeit gepflegt"
        weight: 2
        answerType: scale
        tags: [protect, infrastructure, capacity]
        question: |
          Wird Kapazitäts-Management (Compute, Storage, Network) aktiv betrieben,
          sodass Lastspitzen und Wachstum keine Service-Disruption verursachen?
        purpose: |
          Resource-Exhaustion ist ein DoS ohne Angreifer. Capacity-Mgmt sichert
          gegen Eigenschaden ab.
        expectedOutcome: |
          - Capacity-Modell pro kritischem Service.
          - Frühwarnung bei 70 % Auslastung.
          - Quartals-Forecast.
        howTo:
          - step: "Capacity-Modelle entwickeln"
          - step: "Monitoring-Schwellen"
          - step: "Forecast-Review"
        evidenceExamples:
          - "Capacity-Modell"
          - "Monitoring-Dashboard"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

  # ==========================================================================
  # DETECT (DE) — 11 Subcategories
  # ==========================================================================
  - id: DE
    name: "Detect — Continuous Monitoring and Adverse Event Analysis"
    description: |
      Kontinuierliche Überwachung und zeitnahe Erkennung von Cybersecurity-
      Ereignissen. Detect schließt die Lücke zwischen Compromise und Response.

    controls:

      # ---- DE.CM: Continuous Monitoring ----
      - id: NIST-CSF-2.0:DE.CM-01
        title: "Netzwerke und Netzwerk-Services überwacht, um adverse Events zu erkennen"
        weight: 3
        answerType: scale
        tags: [detect, monitoring, network, ids]
        question: |
          Werden Netzwerk-Traffic und Services kontinuierlich auf anomale
          oder bösartige Aktivität überwacht (NDR, IDS, NetFlow)?
        purpose: |
          Netzwerk ist der einzige Layer, den Angreifer nicht umgehen können.
          NDR ist daher die robusteste Detection-Schicht.
        expectedOutcome: |
          - NDR oder IDS in allen kritischen Segmenten.
          - Alert-Routing ins SIEM.
          - SLA für Alert-Response.
        howTo:
          - step: "NDR-Tool deployen (z. B. Suricata, Zeek)"
          - step: "Sigma/SNORT-Regeln pflegen"
          - step: "SOC-Run-Books erstellen"
        evidenceExamples:
          - "NDR-Architektur"
          - "Regel-Set-Auszug"
          - "Run-Book-Beispiel"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:DE.CM-02
        title: "Physische Umgebung überwacht, um adverse Events zu erkennen"
        weight: 1
        answerType: scale
        tags: [detect, monitoring, physical]
        question: |
          Wird die physische Umgebung kritischer Assets durch CCTV, Sensoren
          und Zutritts-Logs überwacht?
        purpose: |
          Physische Angriffe (Tailgating, USB-Drop) sind nach wie vor real.
          Physische Detection ergänzt logische Schichten.
        expectedOutcome: |
          - CCTV in sensiblen Bereichen.
          - Bewegungsmelder + Logs.
          - Visitor-Mgmt mit Tracking.
        howTo:
          - step: "CCTV-Coverage-Audit"
          - step: "Sensor-Audit-Trail"
          - step: "Visitor-Mgmt-System"
        evidenceExamples:
          - "CCTV-Site-Plan"
          - "Visitor-Log-Sample"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 3 AND evidenceCount >= 1"
          gapWhen: "score <= 1 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:DE.CM-03
        title: "Personnel-Aktivität und Technologie-Nutzung überwacht, um adverse Events zu erkennen"
        weight: 2
        answerType: scale
        tags: [detect, monitoring, user-behavior, ueba]
        question: |
          Werden Nutzeraktivitäten und Technologie-Nutzung auf Anomalien
          (z. B. impossible-travel, abnormale Datenmengen) überwacht?
        purpose: |
          Insider-Risk und Compromised-Account-Erkennung verlangt Behavior-
          Analytics. UEBA ist heute Standard für reife Programme.
        expectedOutcome: |
          - UEBA-Tool oder SIEM-Use-Cases.
          - Privacy-Notice an Mitarbeiter.
          - Quartals-Review der Use-Cases.
        howTo:
          - step: "UEBA-Use-Cases mit Legal abstimmen"
          - step: "Datenschutz-Notice"
          - step: "Use-Case-Tuning"
        evidenceExamples:
          - "UEBA-Konfiguration"
          - "Privacy-Notice"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:DE.CM-06
        title: "Aktivität von externen Service-Providern überwacht, um adverse Events zu erkennen"
        weight: 2
        answerType: scale
        tags: [detect, monitoring, third-party]
        question: |
          Werden Aktivitäten externer Service-Provider in eigenen Systemen
          überwacht und auditiert?
        purpose: |
          Third-Party-Compromise ist ein Top-Vektor. Wer keine Sichtbarkeit
          auf Provider-Aktivität hat, sieht den Angriff zuletzt.
        expectedOutcome: |
          - Logging aller Provider-Zugriffe.
          - Alert auf ungewöhnliche Provider-Aktivität.
          - Quartals-Review.
        howTo:
          - step: "Provider-spezifische Use-Cases"
          - step: "Review-Routine"
        evidenceExamples:
