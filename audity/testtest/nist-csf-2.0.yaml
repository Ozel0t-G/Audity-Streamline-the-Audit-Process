  # ==========================================================================
  # RESPOND (RS) — 13 Subcategories
  # ==========================================================================
  - id: RS
    name: "Respond — Incident Response"
    description: |
      Wenn ein Incident erkannt ist, schnell und koordiniert reagieren.
      Respond reduziert Schaden und sichert Recovery.

    controls:

      # ---- RS.MA: Incident Management ----
      - id: NIST-CSF-2.0:RS.MA-01
