          - step: "Phishing-Sim-Plattform"
          - step: "Reporting an Vorstand"
        evidenceExamples:
          - "LMS-Completion-Report"
          - "Phishing-Sim-Trend"
          - "Vorstands-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.AT-02
        title: "Personal mit spezialisierten Rollen wird im Bereich Cybersecurity geschult"
        weight: 2
        answerType: scale
        tags: [protect, awareness, role-based-training]
        question: |
          Erhalten Mitarbeiter in Cyber-relevanten Rollen (Entwickler, Admins,
          Privileged Users) rollen-spezifische Cybersecurity-Schulungen?
        purpose: |
          General-Awareness reicht für Entwickler oder Admins nicht — sie
          brauchen tiefere, technische Schulung passend zu ihrer Rolle.
        expectedOutcome: |
          - Role-Based-Training-Katalog.
          - Vollständigkeits-Tracking.
          - Re-Zertifizierung jährlich.
        howTo:
          - step: "Rollen mit Cyber-Bezug listen"
          - step: "Pro Rolle Training-Pfad definieren"
          - step: "Tracking im LMS"
