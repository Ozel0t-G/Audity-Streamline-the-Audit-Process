        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:DE.AE-03
        title: "Information wird aus mehreren Quellen korreliert"
        weight: 2
        answerType: scale
        tags: [detect, analysis, correlation, siem]
        question: |
          Werden Sicherheits-Events aus mehreren Quellen (Network, Endpoint,
          Identity, Cloud) korreliert, um zusammenhängende Angriffsketten
