  # ==========================================================================
  # RECOVER (RC) — 8 Subcategories
  # ==========================================================================
  - id: RC
    name: "Recover — Restoration and Communication"
    description: |
      Nach einem Incident in den normalen Geschäftsbetrieb zurückkehren —
      koordiniert, vollständig, mit klarer Kommunikation.

    controls:

      # ---- RC.RP: Incident Recovery Plan Execution ----
      - id: NIST-CSF-2.0:RC.RP-01
        title: "Recovery-Anteil des Incident-Response-Plans wird ausgeführt, sobald von Incident-Response-Prozess initiiert"
        weight: 3
        answerType: scale
        tags: [recover, plan, execution]
        question: |
          Wird die Recovery-Phase als formaler, dokumentierter Schritt nach
          erfolgreichem Eradication initiiert und durchgeführt?
        purpose: |
          „Recovery" ist eine eigene Phase mit eigenen Risiken — z. B.
          versehentliche Wiedereinspielung kompromittierter Backups.
        expectedOutcome: |
          - Recovery-Phase im IR-Plan.
          - Verifikation pre/post Recovery.
          - Recovery-Sign-off.
        howTo:
          - step: "Recovery-Phase-Doku"
          - step: "Verification-Checkliste"
          - step: "Sign-off-Form"
        evidenceExamples:
          - "Recovery-Plan-Auszug"
          - "Verification-Checkliste"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:RC.RP-02
        title: "Recovery-Aktionen werden ausgewählt, gescopt, priorisiert und durchgeführt"
        weight: 2
        answerType: scale
        tags: [recover, plan, prioritization]
        question: |
          Werden Recovery-Aktionen nach Mission-Priorität gewählt und
          umgesetzt (kritische Services zuerst, niedrige zuletzt)?
        purpose: |
          „Erst alles wiederherstellen" ist im Ernstfall unmöglich — bewusste
          Priorisierung minimiert Business-Impact.
        expectedOutcome: |
          - Recovery-Priorities-Liste aus BIA.
          - RTO/RPO pro Service.
          - Reihenfolge dokumentiert.
        howTo:
          - step: "BIA-Daten nutzen"
          - step: "Priorisierungs-Liste pflegen"
        evidenceExamples:
          - "Recovery-Priorities-Liste"
          - "BIA-Auszug"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:RC.RP-03
        title: "Integrität von Backups und anderen Restoration-Assets wird verifiziert, bevor verwendet"
        weight: 3
        answerType: scale
        tags: [recover, backup, integrity]
        question: |
          Wird die Integrität von Backups und Restoration-Quellen verifiziert,
          bevor sie zur Wiederherstellung verwendet werden (Hash-Check,
          IOC-Scan)?
        purpose: |
          Kompromittierte Backups führen zu Re-Infection. Integritäts-Checks
          sind die letzte Verteidigungslinie.
        expectedOutcome: |
          - Hash-Verification-Pflicht.
          - IOC-Scan vor Restore.
          - Sign-off-Form.
        howTo:
          - step: "Hash-Verification-SOP"
          - step: "IOC-Scan im Backup-Tool"
        evidenceExamples:
          - "SOP-Dokument"
          - "Scan-Bericht-Beispiel"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:RC.RP-04
        title: "Kritische Mission-Funktionen und Cybersecurity-Risk-Management werden nach Recovery wiederhergestellt"
        weight: 3
        answerType: scale
        tags: [recover, mission, normalization]
        question: |
          Werden nach Recovery alle Mission-kritischen Funktionen und das
          Cybersecurity-Risk-Management wieder in Normalbetrieb überführt?
        purpose: |
          Recovery endet nicht mit „Systeme wieder up" — Risk-Mgmt-Funktionen
          müssen auch wieder normal arbeiten.
        expectedOutcome: |
          - Normal-Operations-Checkliste.
          - Monitoring zurück auf Standard.
          - Risk-Owner bestätigen.
        howTo:
          - step: "Normal-Ops-Checkliste"
          - step: "Monitoring-Reset"
        evidenceExamples:
          - "Checkliste"
          - "Sign-off-Form"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:RC.RP-05
        title: "Integrität von wiederhergestellten Assets wird verifiziert, Systems and Services restored, und Normal Operating Status confirmed"
        weight: 2
        answerType: scale
        tags: [recover, verification, post-recovery]
        question: |
          Wird die Integrität wiederhergestellter Assets nach Recovery
          unabhängig verifiziert und Normalbetrieb formal bestätigt?
        purpose: |
          Recovery-Erfolg ohne Verifikation ist Wunschdenken. Unabhängige
          Verifikation findet Restbestände der Bedrohung.
        expectedOutcome: |
          - Post-Recovery-Scan.
          - Independent-Sign-off (z. B. Security-Team statt nur IT-Ops).
          - Bestätigungs-Dokumentation.
        howTo:
          - step: "Post-Recovery-Scan-SOP"
          - step: "Independent-Sign-off"
        evidenceExamples:
          - "Scan-Bericht"
          - "Sign-off-Form"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:RC.RP-06
        title: "Ende von Incident-Recovery wird basierend auf Kriterien deklariert und Incident-bezogene Dokumentation vervollständigt"
        weight: 2
        answerType: scale
        tags: [recover, closure, documentation]
        question: |
          Wird das Ende der Recovery-Phase formal deklariert, mit
          vollständiger Incident-Dokumentation und Lessons-Learned?
        purpose: |
          Ohne formales Closure bleiben Incidents offen — Action-Items
          versanden, Lessons gehen verloren.
        expectedOutcome: |
          - Closure-Kriterien definiert.
          - Lessons-Learned-Workshop.
          - Final Incident-Bericht.
        howTo:
          - step: "Closure-Kriterien definieren"
          - step: "Lessons-Learned-Workshop standardisieren"
          - step: "Bericht-Template"
        evidenceExamples:
          - "Closure-Kriterien-Dokument"
          - "Lessons-Learned-Bericht"
          - "Final-Incident-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- RC.CO: Incident Recovery Communication ----
      - id: NIST-CSF-2.0:RC.CO-03
        title: "Recovery-Aktivitäten und Fortschritt in Wiederherstellung von operationalen Fähigkeiten werden an ausgewiesene interne und externe Stakeholder kommuniziert"
        weight: 2
        answerType: scale
        tags: [recover, communication, stakeholder]
        question: |
          Werden Recovery-Fortschritt und Status während und nach Recovery
          kontinuierlich an die relevanten Stakeholder kommuniziert?
        purpose: |
          „Schweigen" während Recovery erzeugt Vertrauensverlust. Klare
          Status-Updates beruhigen Stakeholder und schaffen Transparenz.
        expectedOutcome: |
          - Update-Cadence (z. B. alle 4h während aktiver Recovery).
          - Stakeholder-Listen.
          - Approved-Statements.
        howTo:
          - step: "Cadence-Plan"
          - step: "Stakeholder-Listen"
          - step: "Statement-Templates"
        evidenceExamples:
          - "Cadence-Plan"
          - "Stakeholder-Liste"
          - "Statement-Template"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:RC.CO-04
        title: "Öffentliche Updates über Incident-Recovery werden veröffentlicht, mit Verwendung von approved Methoden und Messages"
        weight: 2
        answerType: scale
        tags: [recover, communication, public]
        question: |
          Werden öffentliche Communications über Incident-Recovery nach einem
          approved Communication-Plan veröffentlicht (Pressestelle, Legal,
          Vorstand)?
        purpose: |
          Inkonsistente öffentliche Kommunikation eskaliert Reputations-
          Schäden. Approved-Process schützt Marke und Compliance.
        expectedOutcome: |
          - Public-Communication-Process mit Pressestelle.
          - Pre-Approved Statements.
          - Vorstands-Sign-off-Pflicht.
        howTo:
          - step: "Public-Communication-Process mit PR/Legal"
          - step: "Templates pre-approven"
          - step: "Sign-off-Workflow"
        evidenceExamples:
          - "Public-Comm-Process"
          - "Pre-Approved-Statements"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

