          - "SOC-Run-Books"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- DE.AE: Adverse Event Analysis ----
      - id: NIST-CSF-2.0:DE.AE-02
        title: "Potentiell adverse Events werden analysiert, um die assoziierten Aktivitäten besser zu verstehen"
        weight: 2
        answerType: scale
        tags: [detect, analysis, triage]
        question: |
          Werden Alerts und potentielle Incidents systematisch analysiert
          (Triage, Enrichment, False-Positive-Reduktion)?
