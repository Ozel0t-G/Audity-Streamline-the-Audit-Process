          - "Letzter Review-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:DE.CM-09
        title: "Computing-Hardware und -Software, Runtime-Umgebungen und ihre Daten überwacht, um adverse Events zu erkennen"
        weight: 3
        answerType: scale
        tags: [detect, monitoring, endpoint, edr]
        question: |
          Werden Endpoints und Workloads durch EDR/XDR auf Malware, Lateral
