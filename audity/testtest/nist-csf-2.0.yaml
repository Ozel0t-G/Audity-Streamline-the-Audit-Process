        question: |
          Werden technische Indikatoren und Threat-Intel mit ausgewiesenen
          Partnern (CERTs, ISACs, MSP) im Rahmen einer formalen Vereinbarung
          geteilt?
        purpose: |
          Information-Sharing macht die ganze Community resilienter.
