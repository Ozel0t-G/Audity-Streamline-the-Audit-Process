      # ---- PR.DS: Data Security ----
      - id: NIST-CSF-2.0:PR.DS-01
        title: "Vertraulichkeit, Integrität und Verfügbarkeit von Daten-at-Rest geschützt"
        weight: 3
        answerType: scale
        tags: [protect, data, encryption, at-rest]
        question: |
          Werden geschäftskritische Daten im Ruhezustand (Datenbanken,
          Backups, Endgeräte) verschlüsselt und Integrität validiert?
        purpose: |
          Geräte-Verlust und Backup-Diebstahl sind reale Risiken.
          Verschlüsselung-at-Rest macht entwendete Daten unbrauchbar.
        expectedOutcome: |
          - FDE (BitLocker/FileVault) auf 100 % Endgeräten.
          - DB-Encryption (TDE) für sensible Datenbanken.
          - Backup-Encryption.
        howTo:
          - step: "MDM erzwingt FDE"
          - step: "TDE in DB konfigurieren"
          - step: "Backup-Tool-Encryption aktivieren"
        evidenceExamples:
          - "MDM-Encryption-Report"
          - "DB-Config-Auszug"
          - "Backup-Job-Config"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.DS-02
        title: "Vertraulichkeit, Integrität und Verfügbarkeit von Daten-in-Transit geschützt"
        weight: 3
        answerType: scale
        tags: [protect, data, encryption, in-transit, tls]
        question: |
          Werden Daten während der Übertragung (intern und extern) konsequent
          durch starke Verschlüsselung (TLS 1.2+) geschützt?
        purpose: |
          Klartext-Übertragung erlaubt Sniffing und Man-in-the-Middle.
          TLS ist die Mindest-Hürde.
        expectedOutcome: |
          - TLS 1.2+ für alle externen Verbindungen.
          - Intern: TLS für sensitive Pfade, mTLS wo möglich.
          - Cipher-Suite-Hardening.
        howTo:
          - step: "Cipher-Hardening per Config-as-Code"
          - step: "TLS-Scan-Tool (z. B. testssl.sh) periodisch"
          - step: "Legacy-Endpoints identifizieren und retiren"
        evidenceExamples:
          - "testssl.sh-Report"
          - "Cipher-Policy"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.DS-10
        title: "Vertraulichkeit, Integrität und Verfügbarkeit von Daten-in-Use geschützt"
        weight: 2
        answerType: scale
        tags: [protect, data, in-use, confidential-computing]
        question: |
          Werden Daten in Verarbeitung gegen unautorisierten Zugriff
          (Memory-Dumping, Cold-Boot, Container-Escape) geschützt?
        purpose: |
          Daten-in-Use sind oft der schwächste Punkt — sie sind unverschlüsselt
          in Memory. Schutzmaßnahmen sind oft komplex aber kritisch.
        expectedOutcome: |
          - Confidential-Computing wo sinnvoll (z. B. SGX, AMD-SEV).
          - Memory-Encryption Standard.
          - Process-Isolation (Container, VM).
        howTo:
          - step: "Sensible Workloads identifizieren"
          - step: "Confidential-Computing prüfen"
          - step: "Process-Isolation als Default"
        evidenceExamples:
          - "Workload-Klassifikation"
          - "Confidential-Computing-Architektur"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 3 AND evidenceCount >= 1"
          gapWhen: "score <= 1 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.DS-11
        title: "Backups von Daten werden erstellt, geschützt, gepflegt und getestet"
        weight: 3
        answerType: scale
        tags: [protect, data, backup, recovery]
        question: |
          Werden Backups regelmäßig erstellt, vor Modifikation/Löschung
          geschützt (z. B. immutable Storage) und Restore-Tests durchgeführt?
        purpose: |
          Ransomware zielt zuerst auf Backups. Ohne immutable Backups gibt es
          keine Recovery. Restore-Tests beweisen, dass das Backup taugt.
        expectedOutcome: |
          - 3-2-1-Backup-Strategie.
          - Immutable-Storage (z. B. S3 Object-Lock).
          - Restore-Test mind. quartalsweise mit dokumentiertem Ergebnis.
        howTo:
          - step: "Backup-Strategie 3-2-1 etablieren"
          - step: "Immutable-Tier konfigurieren"
          - step: "Restore-Test-Kalender"
        evidenceExamples:
          - "Backup-Strategie-Dokument"
          - "Object-Lock-Konfiguration"
          - "Restore-Test-Protokoll"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- PR.PS: Platform Security ----
      - id: NIST-CSF-2.0:PR.PS-01
        title: "Configuration-Management-Praktiken etabliert und angewendet"
        weight: 3
        answerType: scale
        tags: [protect, platform, config-management, hardening]
        question: |
          Wird Configuration-Management mit dokumentierten Baselines (CIS,
          DISA STIG) konsequent angewendet und durch Tooling erzwungen?
        purpose: |
          Misconfigurations sind die Cloud-Vulnerability #1. Baselines schaffen
          messbare Hygiene.
        expectedOutcome: |
          - CIS-Baselines pro Plattform.
          - Config-Drift-Detection (z. B. Wazuh, Chef-InSpec).
          - Compliance-Reporting.
        howTo:
          - step: "Baselines auswählen"
          - step: "Tooling deployen"
          - step: "Drift-Reporting an Owner"
        evidenceExamples:
          - "Baseline-Dokumentation"
          - "Drift-Report"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.PS-02
        title: "Software wird gemanaged, um Risiko zu minimieren"
        weight: 3
        answerType: scale
        tags: [protect, platform, patch-management]
        question: |
          Werden Software-Patches und -Updates zeitnah eingespielt, mit
          definierten SLAs nach Criticality?
        purpose: |
          Patch-Lag ist der häufigste Initial-Compromise-Vektor. SLAs
          erzwingen Disziplin.
        expectedOutcome: |
          - Patch-Policy mit SLAs (Critical 7d, High 30d).
          - Patch-Dashboard mit Compliance-Rate.
          - Emergency-Patch-Workflow.
        howTo:
          - step: "Patch-Policy formalisieren"
          - step: "Patch-Mgmt-Tool deployen"
          - step: "Dashboard und Reporting"
        evidenceExamples:
          - "Patch-Policy"
          - "Compliance-Dashboard"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.PS-03
        title: "Hardware wird gemanaged, um Risiko zu minimieren"
        weight: 2
        answerType: scale
        tags: [protect, platform, hardware]
        question: |
          Wird Hardware (Firmware-Updates, EOL-Tracking, sichere Konfiguration)
          aktiv gemanaged?
        purpose: |
          Veraltete Firmware ist eine reale, oft übersehene Angriffsfläche
          (z. B. BIOS-Implants).
        expectedOutcome: |
          - Firmware-Patch-Kalender.
          - EOL-Tracking.
          - Hardware-Inventar mit Firmware-Version.
        howTo:
          - step: "Firmware-Patch-Kalender"
          - step: "EOL-Liste pflegen"
          - step: "Hardware-Refresh-Plan"
        evidenceExamples:
          - "Firmware-Patch-Report"
          - "EOL-Liste"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.PS-04
        title: "Logs werden erstellt und in fortgesetzter Form verfügbar gemacht"
        weight: 3
        answerType: scale
        tags: [protect, platform, logging, siem]
        question: |
          Werden sicherheitsrelevante Logs aus allen kritischen Assets erstellt,
          zentral aggregiert und für die festgelegte Aufbewahrungszeit gespeichert?
        purpose: |
          Ohne Logs gibt es kein Detect und kein Forensic. Zentralisierung
          schützt vor Manipulation.
        expectedOutcome: |
          - Zentrales SIEM mit Coverage-Tracking.
          - Retention nach Compliance (≥1 Jahr typisch).
          - Tamper-Protection.
        howTo:
          - step: "SIEM auswählen und deployen"
          - step: "Coverage-Liste mit Owner"
          - step: "Retention nach Compliance einstellen"
        evidenceExamples:
          - "SIEM-Coverage-Bericht"
          - "Retention-Konfiguration"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.PS-05
        title: "Installation und Ausführung von nicht autorisierter Software wird verhindert"
        weight: 2
        answerType: scale
        tags: [protect, platform, application-control]
        question: |
          Wird die Installation und Ausführung von nicht-autorisierter
          Software durch Allow-Listing oder vergleichbare Mechanismen
          verhindert?
        purpose: |
          App-Control ist eine der wirksamsten Härtungs-Maßnahmen gegen
          Living-off-the-Land-Angriffe.
        expectedOutcome: |
          - Allow-Listing auf kritischen Endpoints.
          - Block-Listing als Mindeststandard.
          - Exception-Prozess.
        howTo:
          - step: "Pilot mit Microsoft AppLocker/WDAC"
          - step: "Stufenweiser Rollout"
          - step: "Exception-Prozess"
        evidenceExamples:
