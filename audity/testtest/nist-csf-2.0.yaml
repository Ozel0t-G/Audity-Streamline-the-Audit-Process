# yaml-language-server: $schema=../frameworks/schema/framework-v1.json
# ============================================================================
# NIST Cybersecurity Framework 2.0 — Audity Readiness YAML
# Schema v1 — vollständige Abdeckung aller 106 Subcategories
#
# Quelle: NIST Cybersecurity Framework (CSF) 2.0, NIST.CSWP.29, Februar 2024.
# Dieses Dokument enthält Audity-Readiness-Fragen, NICHT den offiziellen
# NIST-Wortlaut. Der Standardtext steht frei unter nvlpubs.nist.gov zur
# Verfügung.
# ============================================================================

framework:
  schemaVersion: 1
  key: nist.csf.2.0
  name: "NIST Cybersecurity Framework 2.0"
  shortName: "NIST CSF 2.0"
  version: "2.0"
  status: published
  date: 2026-06-20
  owner: "Audity Framework Library"
  language: de
  category: nist_csf
  description: |
    Das NIST Cybersecurity Framework 2.0 organisiert Cyber-Security-Praxis in
    sechs Funktionen — Govern, Identify, Protect, Detect, Respond, Recover —
    mit insgesamt 106 Subcategories. Audity bildet jede Subcategory als
    Readiness-Frage mit konkretem Soll-Bild ab.
  scopeNote: |
    Deckt alle 22 Categories und 106 Subcategories von NIST CSF 2.0 ab.
    Implementation Examples aus dem CSF werden in „howTo" verwendet, sind
    aber kein normativer Bestandteil.
  license:
    status: open_licensed
    confirmationRequired: false
    notice: |
      NIST CSF ist eine kostenfrei nutzbare Publikation der US-Bundesregierung.
      Wortlaut nicht reproduziert — nur Readiness-Übersetzung.

domains:

  # ==========================================================================
  # GOVERN (GV) — 31 Subcategories
  # ==========================================================================
  - id: GV
    name: "Govern — Cybersecurity Governance"
    description: |
      Strategie, Erwartungen und Policy zur Steuerung der Cybersecurity.
      Erfolgreiche Governance liefert die Voraussetzung für alle anderen Funktionen.

    controls:

      # ---- GV.OC: Organizational Context ----
      - id: NIST-CSF-2.0:GV.OC-01
        title: "Mission, Ziele und Aufgaben der Organisation verstanden"
        weight: 2
        answerType: scale
        tags: [govern, context, mission]
        question: |
          Ist die Mission der Organisation und ihre Bedeutung für die
          Cybersecurity-Strategie dokumentiert und allen Cybersecurity-
          Verantwortlichen bekannt?
        purpose: |
          Cybersecurity-Entscheidungen müssen am Geschäftszweck ausgerichtet
          sein. Ohne klares Mission-Verständnis priorisiert das Team nach
          Bauchgefühl statt nach Geschäftswert.
        expectedOutcome: |
          - Mission Statement schriftlich vorhanden und mit Cybersecurity-Bezug versehen.
          - In Onboarding-Material für neue Security-Mitarbeiter enthalten.
          - In Risk-Assessments als Eingangsgröße referenziert.
        howTo:
          - step: "Mission Statement aus Corporate Governance beziehen"
          - step: "Cybersecurity-Implikationen pro Mission-Bereich dokumentieren"
          - step: "In Security-Onboarding aufnehmen"
        evidenceExamples:
          - "Auszug aus Corporate Strategy mit Cybersecurity-Bezug"
          - "Onboarding-Folie 'So unterstützt Security die Mission'"
          - "Risk-Register mit Mission-Spalte"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.OC-02
        title: "Stakeholder-Erwartungen verstanden"
        weight: 2
        answerType: scale
        tags: [govern, context, stakeholders]
        question: |
          Sind interne und externe Stakeholder (Kunden, Regulator, Vorstand,
          Mitarbeiter) sowie deren Cybersecurity-Erwartungen identifiziert?
        purpose: |
          Cybersecurity ohne Stakeholder-Bezug verfehlt die wirklich relevanten
          Anforderungen. Stakeholder-Mapping macht Priorisierung möglich.
        expectedOutcome: |
          - Stakeholder-Map mit Cybersecurity-Erwartungen pro Stakeholder.
          - Aktualisierung mindestens jährlich.
          - Erwartungen in Risk- und Compliance-Programmen referenziert.
        howTo:
          - step: "Stakeholder-Liste aus Compliance/Legal beziehen"
          - step: "Interview pro Stakeholder zu Cybersecurity-Erwartungen"
          - step: "Mapping dokumentieren und mit Risk-Owner-Liste abgleichen"
        evidenceExamples:
          - "Stakeholder-Map mit Cybersecurity-Erwartungen"
          - "Interview-Notizen mit Datum"
          - "Compliance-Register mit Stakeholder-Spalte"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.OC-03
        title: "Rechtliche, regulatorische und vertragliche Anforderungen verstanden"
        weight: 3
        answerType: scale
        tags: [govern, context, legal, compliance]
        question: |
          Sind alle für die Organisation relevanten gesetzlichen, regulatorischen
          und vertraglichen Cybersecurity-Anforderungen identifiziert, dokumentiert
          und einem Owner zugeordnet?
        purpose: |
          Rechtliche Nicht-Konformität führt zu Bußgeldern, Reputationsschäden
          und Vertragskündigungen. Ein konsistentes Compliance-Register ist die
          Grundlage für nachhaltige Erfüllung.
        expectedOutcome: |
          - Vollständiges Compliance-Register (DSGVO, NIS2, branchenspezifisch).
          - Jeder Eintrag hat Owner + Review-Datum.
          - Vertragliche Cybersecurity-Klauseln aus Kundenverträgen erfasst.
        howTo:
          - step: "Legal/Compliance-Liste der geltenden Regularien beziehen"
          - step: "Kundenverträge mit Security-Annexen einlesen"
          - step: "Pro Anforderung Cybersecurity-Owner zuweisen"
          - step: "Quartalsweise Review-Zyklus etablieren"
        evidenceExamples:
          - "Compliance-Register (z. B. in OneTrust, Confluence, Excel)"
          - "Vertrags-Anhang-Liste mit Security-Klauseln"
          - "Letzter Quartals-Review-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.OC-04
        title: "Kritische Mission-Abhängigkeiten verstanden"
        weight: 3
        answerType: scale
        tags: [govern, context, dependencies]
        question: |
          Sind die kritischen externen Abhängigkeiten (Cloud-Provider, ISP, SaaS,
          Lieferketten) identifiziert, deren Ausfall die Mission gefährden würde?
        purpose: |
          Eine Cybersecurity-Strategie, die kritische Drittparteien ausblendet,
          ignoriert oft die größten Risikoquellen. Mission-Dependency-Mapping
          ist Voraussetzung für BCM und Third-Party-Risk.
        expectedOutcome: |
          - Liste kritischer Provider mit BIA-Bewertung.
          - Pro Provider Notfall-Kontakt + SLAs dokumentiert.
          - Single Points of Failure identifiziert.
        howTo:
          - step: "BIA-Daten aus BCM-Team beziehen"
          - step: "Pro Mission-Process kritische Provider listen"
          - step: "Single Points of Failure flaggen + Mitigation planen"
        evidenceExamples:
          - "BIA-Dokument mit kritischen Providern"
          - "SaaS-Inventory mit Criticality-Klassifikation"
          - "Diagram der Mission-Process-Abhängigkeiten"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.OC-05
        title: "Erwartungen an organisatorische Cybersecurity-Resilienz festgelegt"
        weight: 2
        answerType: scale
        tags: [govern, context, resilience]
        question: |
          Sind organisationsweite Erwartungen an Cybersecurity-Resilienz
          (Recovery-Zeiten, akzeptable Ausfälle, Sicherheitsniveau) explizit
          definiert und kommuniziert?
        purpose: |
          Ohne klare Resilienz-Erwartungen optimiert jedes Team unterschiedlich
          — und das schwächste Glied bestimmt den Gesamtschutz.
        expectedOutcome: |
          - Schriftliche Resilienz-Erwartungen (RTO/RPO pro Service-Klasse).
          - Vom Vorstand bestätigt.
          - In Service-Design-Reviews referenziert.
        howTo:
          - step: "Service-Klassen mit RTO/RPO definieren"
          - step: "Vorstands-Vote einholen"
          - step: "In Design-Review-Checklisten einbinden"
        evidenceExamples:
          - "Resilienz-Policy mit Vorstands-Unterschrift"
          - "Service-Classification-Tabelle"
          - "Design-Review-Template mit Resilienz-Sektion"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- GV.RM: Risk Management Strategy ----
      - id: NIST-CSF-2.0:GV.RM-01
        title: "Cybersecurity-Risikomanagement-Ziele festgelegt"
        weight: 3
        answerType: scale
        tags: [govern, risk, strategy]
        question: |
          Sind die Cybersecurity-Risikomanagement-Ziele (was als „akzeptables
          Risiko" gilt, welche Schwellenwerte zum Eskalations-Trigger werden)
          schriftlich definiert und vom Vorstand bestätigt?
        purpose: |
          Ohne formale Risiko-Ziele werden Entscheidungen reaktiv und
          inkonsistent getroffen. Klare Ziele machen Trade-offs erklärbar.
        expectedOutcome: |
          - Schriftliche Risk-Management-Charter.
          - Vorstands-Sign-off mit Datum.
          - Mindestens jährliche Review.
        howTo:
          - step: "Charter-Template entwerfen (Ziele, Scope, Owner, Reporting)"
          - step: "Vorstand stimmt zu, Sign-off dokumentiert"
          - step: "Jährliche Re-View einplanen"
        evidenceExamples:
          - "Risk-Management-Charter mit Sign-off"
          - "Vorstands-Protokoll mit Beschluss"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RM-02
        title: "Risk Appetite und Toleranz definiert und kommuniziert"
        weight: 3
        answerType: scale
        tags: [govern, risk, appetite]
        question: |
          Sind Risk Appetite und konkrete Risk-Tolerance-Schwellen pro
          Risikokategorie (financial, regulatory, operational) definiert?
        purpose: |
          Risk Appetite ist die Brücke zwischen Business-Strategie und
          Security-Entscheidung — ohne sie gibt es keine vernünftige Priorisierung.
        expectedOutcome: |
          - Risk-Appetite-Statement pro Kategorie.
          - Quantitative Schwellenwerte wo möglich.
          - In Risk-Treatment-Entscheidungen referenziert.
        howTo:
          - step: "Workshop mit CRO/CFO/CEO zu Appetite-Kategorien"
          - step: "Quantitative Schwellen (€-Werte) festlegen"
          - step: "In Risk-Register als Filter implementieren"
        evidenceExamples:
          - "Risk-Appetite-Statement (signiert)"
          - "Risk-Register mit Appetite-Schwellen-Marker"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RM-03
        title: "Cybersecurity-Risiko in das Enterprise Risk Management eingebettet"
        weight: 2
        answerType: scale
        tags: [govern, risk, erm]
        question: |
          Wird Cybersecurity-Risiko als Teil des unternehmensweiten Risk
          Managements behandelt — mit gleichem Reporting-Pfad und gleichen
          Decision-Gates?
        purpose: |
          Silo-Risk-Management lässt Cyber-Risiken im Schatten von Markt- oder
          Finanz-Risiken liegen. Integration erzwingt ehrliche Priorisierung.
        expectedOutcome: |
          - Cyber-Risiken im selben Risk-Register wie andere Enterprise-Risks.
          - Reporting an dasselbe Gremium (z. B. Risk-Komitee).
        howTo:
          - step: "Cyber-Risk-Register in ERM-System konsolidieren"
          - step: "Gemeinsame Bewertungskriterien etablieren"
          - step: "Einheitliches Reporting-Format"
        evidenceExamples:
          - "Konsolidiertes Risk-Register-Beispiel"
          - "Risk-Komitee-Protokoll mit Cyber- und Non-Cyber-Risiken"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RM-04
        title: "Strategische Ausrichtung für Risiko-Antwort kommuniziert"
        weight: 2
        answerType: scale
        tags: [govern, risk, strategy, communication]
        question: |
          Ist die strategische Richtung für die Cybersecurity-Risiko-Antwort
          (z. B. avoid / accept / transfer / mitigate-Präferenzen) festgelegt
          und kommuniziert?
        purpose: |
          Ohne strategische Vorgaben pickt jeder Risk-Owner die für ihn
          einfachste Option — was zu Inkonsistenz und blinden Flecken führt.
        expectedOutcome: |
          - Treatment-Präferenzen pro Risk-Klasse dokumentiert.
          - Im Risk-Management-Playbook hinterlegt.
        howTo:
          - step: "Treatment-Optionen pro Risk-Klasse durchdenken"
          - step: "Default-Präferenzen festlegen"
          - step: "In Risk-Owner-Schulung aufnehmen"
        evidenceExamples:
          - "Risk-Treatment-Policy"
          - "Schulungs-Material für Risk-Owner"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RM-05
        title: "Kommunikationslinien für Cybersecurity-Risiken etabliert"
        weight: 2
        answerType: scale
        tags: [govern, risk, communication]
        question: |
          Existieren klare Kommunikationswege und Reporting-Lines für
          Cybersecurity-Risiken zwischen Risk Owners, CISO und Top-Management?
        purpose: |
          Risiken, die nicht beim Entscheider ankommen, werden zu Vorfällen.
          Reporting-Lines müssen formal, nicht informell sein.
        expectedOutcome: |
          - Reporting-Diagramm mit Frequenz und Trigger-Events.
          - Kommunikations-Matrix (RACI).
          - Funktioniert nachweislich (z. B. letzte 3 Eskalationen).
        howTo:
          - step: "RACI-Matrix für Cyber-Risk-Reporting erstellen"
          - step: "Reporting-Frequenz (Monatlich/Quartal) festlegen"
          - step: "Eskalations-Trigger definieren"
        evidenceExamples:
          - "Cyber-Risk-Reporting-Diagramm"
          - "RACI-Matrix"
          - "Beispiel-Report ans Top-Management"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RM-06
        title: "Standardisierte Methode für Risiko-Berechnung, -Priorisierung und -Reaktion etabliert"
        weight: 2
        answerType: scale
        tags: [govern, risk, methodology]
        question: |
          Wird eine standardisierte Methodik (z. B. FAIR, ISO 27005, NIST 800-30)
          für die Berechnung, Priorisierung und Behandlung von Cybersecurity-
          Risiken konsequent eingesetzt?
        purpose: |
          Ad-hoc-Risikobewertung ist nicht vergleichbar zwischen Teams oder
          über Zeit. Standardisierung macht Trends und Vergleiche möglich.
        expectedOutcome: |
          - Risk-Assessment-Methodik schriftlich dokumentiert.
          - Schulung für Anwender durchgeführt.
          - Letzte 5 Assessments folgen der Methodik.
        howTo:
          - step: "Methodik wählen (FAIR / 27005 / hybrid)"
          - step: "Methodik dokumentieren mit Beispielen"
          - step: "Risk-Owner schulen"
        evidenceExamples:
          - "Risk-Assessment-Methodik-Dokument"
          - "Schulungs-Aufzeichnung mit Teilnehmern"
          - "Beispiel-Assessment, das die Methodik anwendet"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RM-07
        title: "Strategische Möglichkeiten (Positive Risk) aus Cybersecurity charakterisiert und enthalten"
        weight: 1
        answerType: scale
        tags: [govern, risk, opportunity]
        question: |
          Wird Cybersecurity auch als Chance (z. B. Differenzierung, Vertrauen,
          Markt-Premium) und nicht nur als Risiko behandelt?
        purpose: |
          Cybersecurity-Investments können Wettbewerbsvorteile schaffen.
          Eine reine Bedrohungs-Sicht unterschätzt diesen Hebel.
        expectedOutcome: |
          - Cyber-Opportunity-Register existiert.
          - Mindestens 2 Opportunity-Beispiele dokumentiert (z. B. „Zertifikat
            verschafft Markt-Zugang").
        howTo:
          - step: "Mit Sales/Marketing Cyber-bezogene Differenzierung diskutieren"
          - step: "Opportunity-Register als Spiegel zum Risk-Register führen"
        evidenceExamples:
          - "Opportunity-Register"
          - "Business-Case für Security-Zertifizierung"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 3 AND evidenceCount >= 1"
          gapWhen: "score <= 1 OR evidenceCount == 0"

      # ---- GV.RR: Roles, Responsibilities, and Authorities ----
      - id: NIST-CSF-2.0:GV.RR-01
        title: "Organisations-Leadership übernimmt Verantwortung für Cybersecurity-Risiko"
        weight: 3
        answerType: scale
        tags: [govern, roles, leadership]
        question: |
          Übernimmt das Top-Management nachweislich Verantwortung für Cybersecurity-
          Risiken — durch Charter, Vorstands-Berichte und Budget-Entscheidungen?
        purpose: |
          Wenn Cyber-Risiko nicht im Vorstand verankert ist, scheitert jede
          Initiative an Ressourcen-Engpässen oder Priorisierungs-Konflikten.
        expectedOutcome: |
          - Cyber-Risiko regelmäßig (≥4×/Jahr) im Vorstand traktandiert.
          - CISO berichtet direkt an Vorstand oder C-Level.
          - Vorstands-Beschlüsse zu Cyber-Themen dokumentiert.
        howTo:
          - step: "Quartals-Slot für Cyber-Reporting im Vorstand etablieren"
          - step: "Reporting-Format standardisieren (KRIs, Top-Risks, Updates)"
          - step: "Beschlüsse formell festhalten"
        evidenceExamples:
          - "Vorstands-Protokoll mit Cyber-Tagesordnungspunkt"
          - "Reporting-Template"
          - "Organigramm mit CISO-Berichtslinie"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RR-02
        title: "Cybersecurity-Rollen, Verantwortlichkeiten und Autoritäten dokumentiert"
        weight: 3
        answerType: scale
        tags: [govern, roles, raci]
        question: |
          Sind alle Cybersecurity-Rollen mit klar abgegrenzten Verantwortlichkeiten
          und Entscheidungs-Autoritäten dokumentiert?
        purpose: |
          Rollen-Ambiguität führt zu doppelter Arbeit oder zu Lücken („dachte,
          die machen das"). Klare RACI ist die Basis von Accountability.
        expectedOutcome: |
          - RACI-Matrix für Security-Prozesse.
          - Job-Descriptions enthalten Security-Verantwortung.
          - Authority-Levels (z. B. „CISO kann Notfall-Patches anordnen")
            schriftlich.
        howTo:
          - step: "Prozesse listen (IR, Vuln-Mgmt, Access-Review, …)"
          - step: "Pro Prozess RACI ausfüllen"
          - step: "Authority-Levels mit HR/Legal abstimmen"
        evidenceExamples:
          - "Security-RACI-Matrix"
          - "Job-Description CISO/Sec-Engineer"
          - "Authority-Delegation-Letter"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RR-03
        title: "Adäquate Ressourcen für die Cybersecurity-Strategie zugewiesen"
        weight: 3
        answerType: scale
        tags: [govern, roles, resources, budget]
        question: |
          Stehen adäquate finanzielle, personelle und technische Ressourcen
          für die Umsetzung der Cybersecurity-Strategie zur Verfügung?
        purpose: |
          Eine Strategie ohne Ressourcen ist eine Absichtserklärung. Ressourcen-
          Realismus entscheidet darüber, ob Pläne durchführbar sind.
        expectedOutcome: |
          - Cybersecurity-Budget mit Vorstands-Approval.
          - FTE-Plan vs. Ist-Stand.
          - Tooling-Coverage gegen identifizierte Bedarfe.
        howTo:
          - step: "Budget-Plan jährlich erstellen"
          - step: "FTE-Bedarf aus Strategie ableiten"
          - step: "Gap-Liste pflegen"
        evidenceExamples:
          - "Genehmigtes Cybersecurity-Budget"
          - "Org-Chart mit Soll/Ist-FTE"
          - "Tool-Stack-Inventar mit Coverage-Gap-Analyse"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.RR-04
        title: "Cybersecurity in HR-Praktiken integriert"
        weight: 2
        answerType: scale
        tags: [govern, roles, hr]
        question: |
          Sind Cybersecurity-Anforderungen in HR-Prozessen (Hiring, Onboarding,
          Performance-Reviews, Offboarding) verankert?
        purpose: |
          Menschen sind in jedem Audit der größte Risikofaktor. Wenn HR-Prozesse
          Security ignorieren, wachsen Lücken systemisch.
        expectedOutcome: |
          - Onboarding-Checkliste enthält Security-Awareness-Modul.
          - Hintergrund-Checks bei sensiblen Rollen dokumentiert.
          - Offboarding entzieht alle Zugänge nachweislich.
        howTo:
          - step: "Mit HR Onboarding-Checkliste reviewen"
          - step: "Offboarding-Workflow mit IT abstimmen"
          - step: "Hintergrund-Check-Policy einführen"
        evidenceExamples:
          - "HR-Onboarding-Checkliste mit Security-Items"
          - "Offboarding-Ticket-Template"
          - "Beispiel-Hintergrund-Check-Bestätigung (PII-redacted)"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- GV.PO: Policy ----
      - id: NIST-CSF-2.0:GV.PO-01
        title: "Cybersecurity-Policy etabliert"
        weight: 3
        answerType: scale
        tags: [govern, policy]
        question: |
          Existiert eine vom Top-Management bestätigte, organisations-weite
          Cybersecurity-Policy, die mindestens jährlich reviewed wird?
        purpose: |
          Die Policy ist der oberste schriftliche Wille der Organisation zu
          Cybersecurity. Ohne sie sind alle untergeordneten Standards
          willkürlich.
        expectedOutcome: |
          - Cybersecurity-Policy schriftlich, vom Vorstand unterschrieben.
          - Versions-Historie mit Review-Daten.
          - Allen Mitarbeitern bekannt gemacht.
        howTo:
          - step: "Policy-Template (z. B. SANS-Vorlage) anpassen"
          - step: "Stakeholder-Review (Legal, IT, HR)"
          - step: "Vorstands-Sign-off + Veröffentlichung"
        evidenceExamples:
          - "Cybersecurity-Policy mit Sign-off"
          - "Verteilungs-Bestätigung (Intranet-Screenshot, E-Mail-Log)"
          - "Versions-Historie"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.PO-02
        title: "Cybersecurity-Policy reviewed, aktualisiert und kommuniziert"
        weight: 2
        answerType: scale
        tags: [govern, policy, review]
        question: |
          Wird die Cybersecurity-Policy regelmäßig (mind. jährlich) und nach
          signifikanten Änderungen geprüft, aktualisiert und kommuniziert?
        purpose: |
          Eine veraltete Policy ist schlechter als gar keine — sie suggeriert
          Compliance, deckt aber die heutige Bedrohungslage nicht ab.
        expectedOutcome: |
          - Jährliche Review-Zyklus dokumentiert (Termin, Owner).
          - Ad-hoc-Trigger (z. B. neue Regulation) führten zu Revision.
          - Änderungen kommuniziert (z. B. via Newsletter).
        howTo:
          - step: "Review-Kalender mit Owner und Stellvertreter"
          - step: "Trigger-Liste (neue Gesetze, größere Incidents)"
          - step: "Kommunikations-Plan für Updates"
        evidenceExamples:
          - "Letztes Review-Protokoll"
          - "Versions-Diff zwischen 2 Policy-Versionen"
          - "Kommunikations-E-Mail zur Update"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- GV.OV: Oversight ----
      - id: NIST-CSF-2.0:GV.OV-01
        title: "Outcomes der Risk-Management-Strategie reviewt für Korrekturen"
        weight: 2
        answerType: scale
        tags: [govern, oversight, review]
        question: |
          Werden die Ergebnisse der Risk-Management-Aktivitäten regelmäßig
          gegen die strategischen Ziele bewertet und bei Abweichungen korrigiert?
        purpose: |
          Risk-Management ohne Outcome-Review verkommt zu reiner Aktivität —
          ohne Lerneffekt und ohne Strategie-Anpassung.
        expectedOutcome: |
          - Quartals-Review von KRIs vs. Ziele.
          - Korrektur-Maßnahmen bei Abweichungen dokumentiert.
          - Strategie-Updates aus Lessons-Learned.
        howTo:
          - step: "KRI-Dashboard quartalsweise reviewen"
          - step: "Bei Abweichung Korrektur-Plan erstellen"
          - step: "Strategie-Anpassung im Jahres-Update"
        evidenceExamples:
          - "KRI-Dashboard-Screenshot"
          - "Korrektur-Plan-Beispiel"
          - "Strategie-Update-Memo"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.OV-02
        title: "Risk-Management-Strategie reviewed und angepasst, um Coverage von Anforderungen sicherzustellen"
        weight: 2
        answerType: scale
        tags: [govern, oversight, strategy]
        question: |
          Wird die Risk-Management-Strategie überprüft und angepasst, um neue
          Bedrohungen, Regulierungen und Business-Anforderungen abzudecken?
        purpose: |
          Statische Strategien werden schnell irrelevant. Adaptivität ist der
          größte Hebel gegen sich wandelnde Bedrohungslagen.
        expectedOutcome: |
          - Jährliche Strategie-Review.
          - Threat-Landscape-Updates eingearbeitet.
          - Regulatorische Neuerungen abgedeckt.
        howTo:
          - step: "Jährliche Strategie-Klausur"
          - step: "Threat-Intel-Briefing als Input"
          - step: "Compliance-Register als Input"
        evidenceExamples:
          - "Aktuelles Strategie-Dokument mit Versionshistorie"
          - "Klausur-Protokoll"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.OV-03
        title: "Performance der Cybersecurity-Risk-Management-Aktivitäten reviewt"
        weight: 2
        answerType: scale
        tags: [govern, oversight, performance]
        question: |
          Wird die Performance der Cybersecurity-Risk-Management-Aktivitäten
          (Effektivität, Effizienz) gemessen und reviewt?
        purpose: |
          „We're doing risk management" ohne Performance-Messung erlaubt keine
          Investments-Steuerung. Maturity-Modelle und Metriken sind nötig.
        expectedOutcome: |
          - Definierte Metriken (z. B. % Risks im Appetite, MTTR von Risiken).
          - Performance-Report quartalsweise.
          - Verbesserungs-Roadmap.
        howTo:
          - step: "Metriken-Set definieren"
          - step: "Reporting automatisieren wo möglich"
          - step: "Verbesserungs-Ziele setzen"
        evidenceExamples:
          - "Metriken-Definition"
          - "Performance-Report"
          - "Verbesserungs-Roadmap"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- GV.SC: Cybersecurity Supply Chain Risk Management ----
      - id: NIST-CSF-2.0:GV.SC-01
        title: "Cybersecurity Supply Chain Risk Management (C-SCRM) Programm etabliert"
        weight: 3
        answerType: scale
        tags: [govern, supply-chain, cscrm]
        question: |
          Existiert ein formalisiertes Cybersecurity-Supply-Chain-Risk-Management-
          Programm (C-SCRM) mit Charter, Owner und Budget?
        purpose: |
          Supply-Chain-Angriffe (SolarWinds, Kaseya) sind die wachstumsstärkste
          Angriffsform. Ohne Programm fehlen Sichtbarkeit und Steuerung.
        expectedOutcome: |
          - C-SCRM-Charter signiert.
          - Owner benannt (CISO oder dedicated).
          - Budget für Programm und Tooling.
        howTo:
          - step: "Charter entwickeln (Scope, Ziele, RACI)"
          - step: "Owner benennen"
          - step: "Initial-Budget für Tooling (z. B. SBOM-Scanner)"
        evidenceExamples:
          - "C-SCRM-Charter mit Sign-off"
          - "Org-Chart mit C-SCRM-Owner"
          - "Budget-Posten"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-02
        title: "Cybersecurity-Rollen für Supplier definiert"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, roles]
        question: |
          Sind Cybersecurity-Verantwortlichkeiten und -Erwartungen pro
          Lieferanten-Klasse definiert und kommuniziert?
        purpose: |
          Wenn der Lieferant nicht weiß, was wir von ihm erwarten, kann er nicht
          liefern. Klare Anforderungen sind die Basis jeder Sicherheits-
          Partnerschaft.
        expectedOutcome: |
          - Lieferanten-Klassen mit Cybersecurity-Anforderungen.
          - Anforderungen in Verträge übernommen.
          - Onboarding mit Cyber-Briefing.
        howTo:
          - step: "Lieferanten-Klassen definieren (Tier 1/2/3)"
          - step: "Anforderungs-Katalog je Klasse"
          - step: "Vertragsklauseln aktualisieren"
        evidenceExamples:
          - "Anforderungs-Katalog"
          - "Standard-Vertragsklauseln"
          - "Onboarding-Material für Lieferanten"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-03
        title: "C-SCRM in Cybersecurity- und Enterprise-Risk-Management integriert"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, integration]
        question: |
          Ist Supply-Chain-Risk integraler Bestandteil des Cybersecurity- und
          Enterprise-Risk-Managements (gleiches Register, gleiche Bewertung)?
        purpose: |
          Silo-C-SCRM verliert Geschäfts-Kontext. Integration zwingt zu ehrlicher
          Priorisierung gegen andere Risiko-Arten.
        expectedOutcome: |
          - C-SCRM-Risiken im Haupt-Risk-Register.
          - Einheitliche Bewertungsskala.
          - Im Vorstands-Reporting enthalten.
        howTo:
          - step: "Register konsolidieren"
          - step: "Bewertungsskala harmonisieren"
          - step: "Reporting integrieren"
        evidenceExamples:
          - "Konsolidiertes Risk-Register-Beispiel"
          - "Vorstands-Report mit C-SCRM-Sektion"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-04
        title: "Supplier identifiziert und Cybersecurity-Risiko-priorisiert"
        weight: 3
        answerType: scale
        tags: [govern, supply-chain, inventory]
        question: |
          Existiert ein vollständiges Lieferanten-Inventar mit Cybersecurity-
          Risiko-Bewertung und Priorisierung?
        purpose: |
          „Wir wissen nicht, wer uns wie viel Risk liefert" ist die häufigste
          Antwort in Audits — und der häufigste Ausgangspunkt für Lieferketten-
          Angriffe.
        expectedOutcome: |
          - Vollständiges Lieferanten-Inventar.
          - Cyber-Risk-Score pro Lieferant.
          - Priorisierungs-Liste der Top-N High-Risk-Lieferanten.
        howTo:
          - step: "Procurement-Daten als Basis"
          - step: "Risiko-Score-Modell entwickeln (Datenklassifikation × Volumen)"
          - step: "Top-50 mit Sicherheits-Assessment durchspielen"
        evidenceExamples:
          - "Lieferanten-Inventar (Excel/GRC-Tool)"
          - "Risk-Score-Modell-Dokument"
          - "Top-N-Liste mit Assessments"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-05
        title: "Anforderungen an Lieferanten in Verträgen umgesetzt"
        weight: 3
        answerType: scale
        tags: [govern, supply-chain, contracts]
        question: |
          Werden Cybersecurity-Anforderungen rechtsverbindlich in Lieferanten-
          Verträgen festgehalten (Security-Annex, Audit-Rechte, Incident-
          Notification)?
        purpose: |
          Ohne Vertrag ist die Anforderung nicht durchsetzbar. Vertragliche
          Verankerung schafft Hebel im Konfliktfall.
        expectedOutcome: |
          - Standard-Security-Annex existiert.
          - In allen Verträgen ab definierter Risiko-Klasse vorhanden.
          - Audit-Rechte vereinbart.
        howTo:
          - step: "Mit Legal Standard-Annex entwerfen"
          - step: "Roll-out auf bestehende Verträge bei Verlängerung"
          - step: "Procurement-Pflicht in Workflow integrieren"
        evidenceExamples:
          - "Standard-Security-Annex"
          - "Stichprobe-Vertrag mit Annex"
          - "Procurement-Workflow-Diagramm"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-06
        title: "Planning und Due-Diligence für Lieferanten-Beziehung durchgeführt"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, due-diligence]
        question: |
          Wird vor Vertragsschluss mit einem Lieferanten eine Cybersecurity-
          Due-Diligence durchgeführt (Fragebogen, Audit, Zertifikate)?
        purpose: |
          Wer nicht prüft, kauft im Blindflug. Due-Diligence ist die einzige
          Chance, Risikoträger vor Vertragsschluss zu erkennen.
        expectedOutcome: |
          - Due-Diligence-Prozess dokumentiert.
          - Pro Vertragsschluss Due-Diligence-Bericht in Akte.
          - Veto-Recht bei Red-Flags.
        howTo:
          - step: "Due-Diligence-Fragebogen entwickeln"
          - step: "Veto-Schwellen definieren"
          - step: "In Procurement-Workflow einhängen"
        evidenceExamples:
          - "Due-Diligence-Fragebogen"
          - "Beispiel-Bericht"
          - "Veto-Policy"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-07
        title: "Risiken aus Lieferanten kontinuierlich identifiziert und assessiert"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, monitoring]
        question: |
          Werden Cybersecurity-Risiken aus bestehenden Lieferantenbeziehungen
          kontinuierlich überwacht (z. B. Re-Assessments, Threat-Intel)?
        purpose: |
          Lieferanten-Risiko ist nicht statisch. Ein gestern sicherer Lieferant
          kann morgen gehackt sein — ohne Monitoring sieht man's nicht.
        expectedOutcome: |
          - Jährliche Re-Assessments für High-Risk-Lieferanten.
          - Threat-Intel-Feeds (z. B. Lieferanten-Breach-Alerts).
          - Score-Update bei Material-Events.
        howTo:
          - step: "Re-Assessment-Kalender pro Klasse"
          - step: "Threat-Intel-Feed mit Lieferanten-Tags"
          - step: "Update-Workflow für Score-Änderungen"
        evidenceExamples:
          - "Re-Assessment-Tracker"
          - "Threat-Intel-Alert-Beispiel"
          - "Score-Change-Log"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-08
        title: "Relevante Lieferanten und Drittparteien in Incident Planning, Response und Recovery einbezogen"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, incident-response]
        question: |
          Sind kritische Lieferanten im Incident-Response-Plan eingebunden
          (Notfall-Kontakte, gemeinsame Übungen, Recovery-Koordination)?
        purpose: |
          Im Ernstfall müssen Lieferanten mitziehen. Ohne Vorab-Planung
          verstreichen wertvolle Stunden mit Kontakt-Suche.
        expectedOutcome: |
          - Notfall-Kontakte aller kritischen Lieferanten.
          - Joint-Incident-Exercises ≥1×/Jahr für Top-Lieferanten.
          - Communication-Playbook mit Lieferanten-Schritten.
        howTo:
          - step: "Kontakt-Liste pflegen"
          - step: "Joint-Exercise organisieren"
          - step: "Playbook erstellen"
        evidenceExamples:
          - "Notfall-Kontakt-Liste"
          - "Exercise-Bericht"
          - "Playbook-Abschnitt für Lieferanten"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-09
        title: "Cybersecurity-Praktiken werden im Lieferanten-Lifecycle integriert"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, lifecycle]
        question: |
          Werden Cybersecurity-Anforderungen über den gesamten Lieferanten-
          Lifecycle (Sourcing, Onboarding, Operations, Termination) angewendet?
        purpose: |
          Cyber-Anforderungen am Anfang sind wertlos, wenn sie über die Zeit
          erodieren oder beim Termination nicht durchgesetzt werden.
        expectedOutcome: |
          - Cyber-Gate in jedem Lifecycle-Schritt.
          - Termination beinhaltet Datenrückgabe + Zugriffsrücknahme.
          - Lifecycle-Checkliste in Procurement-Tool.
        howTo:
          - step: "Lifecycle-Prozess dokumentieren"
          - step: "Cyber-Gates pro Schritt definieren"
          - step: "Termination-Checkliste etablieren"
        evidenceExamples:
          - "Lifecycle-Diagramm mit Cyber-Gates"
          - "Termination-Checkliste"
          - "Procurement-Tool-Screenshot"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:GV.SC-10
        title: "Cybersecurity-Supply-Chain-Risk-Management-Pläne enthalten Provisions für Aktivitäten nach Conclusion oder Termination"
        weight: 2
        answerType: scale
        tags: [govern, supply-chain, termination]
        question: |
          Existieren dokumentierte Pläne für die sichere Beendigung von
          Lieferanten-Beziehungen (Datenlöschung, Zugriffsentzug,
          Vertragsende-Audit)?
        purpose: |
          Beendigte Beziehungen sind ein häufiger Datenleak-Ursprung —
          „forgotten access" und „forgotten data" sind die Klassiker.
        expectedOutcome: |
          - Termination-Playbook für Lieferanten.
          - Stichprobe-Audits nach Termination.
          - Daten-Löschungs-Bestätigungen.
        howTo:
          - step: "Playbook entwerfen"
          - step: "Audit-Stichproben-Plan"
          - step: "Standard-Bestätigungs-Template"
        evidenceExamples:
          - "Termination-Playbook"
          - "Audit-Stichprobe-Bericht"
          - "Löschungs-Bestätigung-Beispiel"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

  # ==========================================================================
  # IDENTIFY (ID) — 21 Subcategories
  # ==========================================================================
  - id: ID
    name: "Identify — Asset, Risk and Improvement Visibility"
    description: |
      Verstehen, was geschützt werden muss: Assets, Risiken und Verbesserungs-
      bedarfe. Identify ist das Fundament — was man nicht kennt, kann man nicht
      schützen.

    controls:

      # ---- ID.AM: Asset Management ----
      - id: NIST-CSF-2.0:ID.AM-01
        title: "Inventar aller Hardware-Assets gepflegt"
        weight: 3
        answerType: scale
        tags: [identify, asset-management, hardware]
        question: |
          Existiert ein vollständiges, aktuelles Inventar aller Hardware-Assets
          (Server, Workstations, Mobile, IoT, Netzwerk-Geräte) der Organisation?
        purpose: |
          Hardware-Assets ohne Inventar werden nicht gepatcht, nicht überwacht
          und nicht entsorgt. Ein vollständiges Inventar ist die Basis aller
          weiteren Kontrollen.
        expectedOutcome: |
          - CMDB oder Asset-Tool mit allen physischen Geräten.
          - Quartalsweise Abgleich gegen Netzwerk-Scan.
          - Ownership-Feld pro Asset.
        howTo:
          - step: "CMDB oder Asset-Mgmt-Tool einführen (z. B. Snipe-IT, ServiceNow)"
          - step: "Netzwerk-Discovery-Scan zur Vervollständigung"
          - step: "Quartals-Abgleich-Prozess"
        evidenceExamples:
          - "CMDB-Export mit aktuellen Assets"
          - "Discovery-Scan-Report"
          - "Letzter Abgleich-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.AM-02
        title: "Inventar aller Software-Assets gepflegt"
        weight: 3
        answerType: scale
        tags: [identify, asset-management, software, sbom]
        question: |
          Existiert ein vollständiges Inventar aller installierten Software,
          inkl. Versionen, Lizenzen und SBOMs für eigene Produkte?
        purpose: |
          Patch-Management, Vulnerability-Scanning und Lizenz-Compliance
          brauchen ein Software-Inventar. SBOM-Anforderungen werden zunehmend
          regulatorisch.
        expectedOutcome: |
          - Software-Inventar pro Asset (z. B. SCCM, Intune-Report).
          - SBOMs für eigene Produkte.
          - Whitelist/Blacklist-Policy.
        howTo:
          - step: "Endpoint-Mgmt-Tool für Software-Inventar"
          - step: "SBOM-Generierung in CI/CD (z. B. Syft, Anchore)"
          - step: "Quartals-Abgleich"
        evidenceExamples:
          - "Software-Inventar-Export"
          - "Beispiel-SBOM (SPDX/CycloneDX)"
          - "Whitelist-Policy"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.AM-03
        title: "Inventar von Services aller Art (intern und extern) gepflegt"
        weight: 2
        answerType: scale
        tags: [identify, asset-management, services]
        question: |
          Existiert ein Inventar aller internen und externen Services (APIs,
          SaaS, Cloud-Services), die geschäftskritische Funktionen erbringen?
        purpose: |
          Schatten-IT und unkatalogisierte SaaS-Nutzung sind häufige Daten-
          abflussvektoren. Service-Inventar macht das Risiko sichtbar.
        expectedOutcome: |
          - Service-Katalog mit Ownership, Daten-Klassifikation, Anbieter.
          - Discovery-Scan (z. B. SaaS-Discovery-Tool).
          - Onboarding-Prozess für neue Services.
        howTo:
          - step: "SaaS-Discovery aus SSO-Logs / CASB"
          - step: "Service-Katalog aufbauen"
          - step: "Onboarding-Workflow für neue Services"
        evidenceExamples:
          - "Service-Katalog"
          - "SaaS-Discovery-Report"
          - "Onboarding-Form"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.AM-04
        title: "Inventar von Service-Provider gepflegt"
        weight: 2
        answerType: scale
        tags: [identify, asset-management, providers]
        question: |
          Werden alle Service-Provider (Cloud, MSP, SaaS) in einem Inventar
          mit Cybersecurity-Risiko-Rating gepflegt?
        purpose: |
          Provider sind oft die einzige Stelle, wo sensible Daten verarbeitet
          werden. Ohne Provider-Inventar ist Third-Party-Risk-Mgmt blind.
        expectedOutcome: |
          - Provider-Liste mit Risiko-Klassifikation.
          - Verträge verlinkt.
          - Re-Assessment-Schedule.
        howTo:
          - step: "Procurement-Datenbasis"
          - step: "Risk-Score-Modell aus GV.SC-04"
          - step: "Re-Assessment-Kalender"
        evidenceExamples:
          - "Provider-Inventar"
          - "Re-Assessment-Tracker"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.AM-05
        title: "Assets nach Klassifikation, Kritikalität und Business Value priorisiert"
        weight: 3
        answerType: scale
        tags: [identify, asset-management, classification]
        question: |
          Werden Assets nach Daten-Klassifikation, Kritikalität und Business
          Value priorisiert, sodass Schutzmaßnahmen risikobasiert zugewiesen
          werden können?
        purpose: |
          Alle Assets gleich zu schützen ist ineffizient und meist unmöglich.
          Klassifikation lenkt Investitionen dorthin, wo sie am meisten zählen.
        expectedOutcome: |
          - Klassifikations-Schema (z. B. Public/Internal/Confidential/Secret).
          - Pro Asset Klassifikation gepflegt.
          - Schutz-Baseline pro Klasse.
        howTo:
          - step: "Klassifikations-Schema mit Legal/Business abstimmen"
          - step: "Bulk-Klassifizierung initial"
          - step: "Pro Klasse Schutz-Baseline definieren"
        evidenceExamples:
          - "Klassifikations-Schema-Dokument"
          - "Asset-Inventar mit Klassifikations-Spalte"
          - "Schutz-Baseline-Dokument"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.AM-07
        title: "Inventar von Daten und Daten-Flüssen gepflegt"
        weight: 3
        answerType: scale
        tags: [identify, asset-management, data, dataflow]
        question: |
          Existiert ein Inventar aller geschäftskritischen Datenbestände und
          deren Flüsse (intern, mit Drittparteien, grenzüberschreitend)?
        purpose: |
          Daten ohne sichtbaren Fluss können nicht geschützt werden.
          Datenfluss-Mapping ist Pflicht für DSGVO und vergleichbare Regularien.
        expectedOutcome: |
          - Data-Inventory mit Klassifikation.
          - Datenfluss-Diagramme für High-Class-Daten.
          - Aktualisierung bei System-Änderungen.
        howTo:
          - step: "Data-Discovery-Tool (z. B. BigID, Microsoft Purview)"
          - step: "Datenfluss-Diagramme pro Kerngeschäftsprozess"
          - step: "Versionierung bei Änderungen"
        evidenceExamples:
          - "Data-Inventory"
          - "Datenfluss-Diagramm-Beispiel"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.AM-08
        title: "Systeme, Hardware, Software, Services und Daten über den gesamten Lifecycle gemanaged"
        weight: 2
        answerType: scale
        tags: [identify, asset-management, lifecycle]
        question: |
          Werden Assets über den vollständigen Lifecycle (Beschaffung,
          Betrieb, Wartung, Ausserbetriebnahme) konsistent verwaltet?
        purpose: |
          End-of-Life-Assets sind eine häufige Quelle für Vulnerabilities und
          Daten-Leaks. Konsistentes Lifecycle-Mgmt verhindert das.
        expectedOutcome: |
          - Asset-Lifecycle-Policy mit Phasen-Definitionen.
          - EOL/EOS-Tracking.
          - Decommissioning-Checkliste.
        howTo:
          - step: "Lifecycle-Phasen definieren"
          - step: "EOL/EOS-Liste pflegen"
          - step: "Decommissioning-Workflow etablieren"
        evidenceExamples:
          - "Asset-Lifecycle-Policy"
          - "EOL-Tracking-Liste"
          - "Decommissioning-Beispiel-Ticket"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- ID.RA: Risk Assessment ----
      - id: NIST-CSF-2.0:ID.RA-01
        title: "Vulnerabilities in Assets identifiziert und dokumentiert"
        weight: 3
        answerType: scale
        tags: [identify, risk, vulnerability]
        question: |
          Werden Schwachstellen in Assets durch regelmäßige Scans und Reviews
          identifiziert, dokumentiert und priorisiert?
        purpose: |
          Unentdeckte Vulnerabilities sind die häufigste Angriffs-Tür.
          Vulnerability-Mgmt ist die operative Kern-Aktivität jedes
          Security-Programms.
        expectedOutcome: |
          - Vuln-Scan mindestens wöchentlich.
          - Findings im Ticket-System.
          - SLAs nach Criticality (z. B. Critical in 7d).
        howTo:
          - step: "Vuln-Scanner (z. B. Nessus, Qualys) deployen"
          - step: "Findings in Ticket-System routen"
          - step: "SLAs durchsetzen und Reporting"
        evidenceExamples:
          - "Scan-Schedule-Konfiguration"
          - "Findings-Report mit SLA-Tracking"
          - "Vuln-Mgmt-Dashboard"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-02
        title: "Cyber-Threat-Intel aus Information-Sharing-Foren und -Quellen empfangen"
        weight: 2
        answerType: scale
        tags: [identify, risk, threat-intel]
        question: |
          Empfängt die Organisation Cyber-Threat-Intelligence aus etablierten
          Quellen (CERTs, ISACs, kommerzielle Feeds) und nutzt sie operativ?
        purpose: |
          Reaktiv auf eigene Vorfälle zu warten ist zu spät. Threat-Intel
          erlaubt proaktive Härtung gegen bekannte Angreifer-Patterns.
        expectedOutcome: |
          - Mind. 2 Threat-Intel-Quellen abonniert.
          - Intel in SIEM/Tools integriert.
          - Beispiele für operativ genutzte Intel.
        howTo:
          - step: "CERT-Bund / BSI / Branchen-ISAC abonnieren"
          - step: "Feeds in SIEM als IOC-Listen einspeisen"
          - step: "Pro Quartal Use-Case dokumentieren"
        evidenceExamples:
          - "Liste der abonnierten Feeds"
          - "SIEM-Konfiguration mit IOC-Integration"
          - "Use-Case-Beispiel"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-03
        title: "Interne und externe Bedrohungen identifiziert und dokumentiert"
        weight: 2
        answerType: scale
        tags: [identify, risk, threat-modeling]
        question: |
          Sind interne (Insider, Fehler) und externe (Hacker, Nation-State,
          Konkurrenz) Bedrohungen identifiziert und in einem Threat-Model
          dokumentiert?
        purpose: |
          Ohne klares Threat-Modell verteidigt man gegen Phantome.
          Modellierung schafft Realitäts-Bezug zur eigenen Bedrohungslage.
        expectedOutcome: |
          - Threat-Modell pro Kerngeschäftsprozess.
          - Akteure mit Motiven und Fähigkeiten.
          - Jährliche Review.
        howTo:
          - step: "STRIDE oder MITRE-ATT&CK-Mapping"
          - step: "Per Prozess Threat-Modell erstellen"
          - step: "Jährliche Review-Sitzung"
        evidenceExamples:
          - "Threat-Modell-Dokument"
          - "MITRE-ATT&CK-Mapping"
          - "Review-Protokoll"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-04
        title: "Potentielle Impacts und Eintrittswahrscheinlichkeiten identifiziert"
        weight: 3
        answerType: scale
        tags: [identify, risk, impact]
        question: |
          Werden für identifizierte Bedrohungen die potentiellen Auswirkungen
          (finanziell, regulatorisch, Reputation) und Eintrittswahrscheinlichkeiten
          quantifiziert?
        purpose: |
          Ohne Impact- und Wahrscheinlichkeits-Bewertung gibt es keine
          rationale Priorisierung. Risiko = Impact × Wahrscheinlichkeit.
        expectedOutcome: |
          - Risiko-Matrix mit Impact- und Wahrscheinlichkeits-Skalen.
          - Pro Risk in Register bewertet.
          - Vorstands-Kommunikation in € pro Top-Risk.
        howTo:
          - step: "Impact-Skala definieren (€-Bereiche)"
          - step: "Wahrscheinlichkeits-Skala"
          - step: "Pro Risk-Register-Eintrag bewerten"
        evidenceExamples:
          - "Risiko-Matrix"
          - "Risk-Register-Ausschnitt"
          - "Top-Risk-Briefing"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-05
        title: "Bedrohungen, Vulnerabilities, Wahrscheinlichkeiten und Impacts werden für Risiken zusammengeführt"
        weight: 3
        answerType: scale
        tags: [identify, risk, register]
        question: |
          Werden identifizierte Bedrohungen, Vulnerabilities, Wahrscheinlichkeiten
          und Impacts systematisch in einem aktuellen Risk-Register
          zusammengeführt?
        purpose: |
          Vereinzelte Findings sind wertlos — erst die Synthese ergibt
          ein Risk-Statement, das Entscheidungen tragen kann.
        expectedOutcome: |
          - Risk-Register mit zusammengeführten Komponenten.
          - Trend-Tracking (steigend/fallend).
          - Monatliche Aktualisierung.
        howTo:
          - step: "Risk-Register-Tool (z. B. RiskWatch, GRC) etablieren"
          - step: "Monatlicher Update-Zyklus"
          - step: "Trend-View etablieren"
        evidenceExamples:
          - "Risk-Register-Ausschnitt"
          - "Trend-Bericht"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-06
        title: "Risk-Responses gewählt, priorisiert, geplant, getrackt und kommuniziert"
        weight: 3
        answerType: scale
        tags: [identify, risk, treatment]
        question: |
          Werden für jedes signifikante Risiko Treatment-Optionen gewählt
          (mitigate/transfer/accept/avoid), priorisiert und in einem
          Treatment-Plan verfolgt?
        purpose: |
          Risiken zu identifizieren, ohne sie zu behandeln, ist reiner
          Buchhaltungs-Aufwand. Treatment-Pläne sind die produktive Phase.
        expectedOutcome: |
          - Treatment-Plan pro Top-Risk.
          - Owner und Deadlines.
          - Monatliches Tracking.
        howTo:
          - step: "Treatment-Template entwickeln"
          - step: "Pro Risk Plan erstellen mit Owner und Deadline"
          - step: "Tracking im Steering"
        evidenceExamples:
          - "Treatment-Plan-Beispiel"
          - "Tracking-Dashboard"
          - "Steering-Protokoll"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-07
        title: "Änderungen und Exceptions gemanaged, assessiert für Risk Impact und dokumentiert"
        weight: 2
        answerType: scale
        tags: [identify, risk, change, exceptions]
        question: |
          Werden Änderungen an Sicherheitskontrollen und Exceptions
          (Ausnahmen von Policies) systematisch bewertet, genehmigt und
          dokumentiert?
        purpose: |
          „Quick fixes" und ungenehmigte Ausnahmen sind Audit-Killer und
          Quelle vieler Incidents. Strukturierte Exception-Mgmt schafft
          Sichtbarkeit.
        expectedOutcome: |
          - Exception-Register mit Begründung, Owner, Ablaufdatum.
          - Genehmigungs-Prozess durch CISO.
          - Quartals-Review aller Exceptions.
        howTo:
          - step: "Exception-Register etablieren"
          - step: "Approval-Workflow"
          - step: "Review-Kalender"
        evidenceExamples:
          - "Exception-Register"
          - "Approval-Workflow-Diagramm"
          - "Letztes Review-Protokoll"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-08
        title: "Prozesse für Empfangen, Analysieren und Reagieren auf Vulnerability Disclosures etabliert"
        weight: 2
        answerType: scale
        tags: [identify, risk, disclosure, vdp]
        question: |
          Existiert ein dokumentierter Prozess für die Annahme, Bewertung und
          Beantwortung von Schwachstellen-Meldungen durch externe Forscher
          (Vulnerability Disclosure Policy, VDP)?
        purpose: |
          Externe Forscher melden oft Schwachstellen, die intern nicht
          gefunden werden. Ohne VDP gehen diese Hinweise verloren oder werden
          öffentlich.
        expectedOutcome: |
          - VDP veröffentlicht (security.txt, Webseite).
          - SLA für Erstantwort (≤72h).
          - Triage-Prozess intern.
        howTo:
          - step: "VDP-Text basierend auf ISO 29147 erstellen"
          - step: "security.txt deployen"
          - step: "Internen Triage-Workflow festlegen"
        evidenceExamples:
          - "Veröffentlichte VDP"
          - "security.txt"
          - "Triage-Ticket-Beispiel"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-09
        title: "Authentizität und Integrität von Hardware und Software vor Akquisition und Nutzung assessiert"
        weight: 2
        answerType: scale
        tags: [identify, risk, supply-chain, integrity]
        question: |
          Werden Authentizität und Integrität von Hardware und Software vor
          ihrer Inbetriebnahme verifiziert (Signaturen, Provenance, Trusted-
          Source)?
        purpose: |
          Counterfeit-Hardware und tampered Software-Builds sind reale
          Bedrohungen. Verifikation ist eine einfache, hochwirksame Kontrolle.
        expectedOutcome: |
          - Trusted-Source-Policy.
          - Signaturprüfung in CI/CD.
          - Hardware-Inspection für Tier-1-Anbieter.
        howTo:
          - step: "Trusted-Source-Liste"
          - step: "Sigstore/Cosign in Pipeline"
          - step: "Hardware-Inspection-Checkliste"
        evidenceExamples:
          - "Trusted-Source-Policy"
          - "Pipeline-Config mit Signaturprüfung"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.RA-10
        title: "Kritische Lieferanten werden vor Akquisition assessiert"
        weight: 2
        answerType: scale
        tags: [identify, risk, supply-chain, assessment]
        question: |
          Werden kritische Lieferanten vor Vertragsschluss einer Cybersecurity-
          Bewertung unterzogen (Audit, Zertifikat, Fragebogen)?
        purpose: |
          Vertragsabschluss ohne Bewertung verlagert das Risiko auf den
          schwächsten Anbieter, ohne dass es jemand gemerkt hat.
        expectedOutcome: |
          - Pre-Award-Assessment für High-Risk-Lieferanten.
          - Veto bei Red Flags.
          - In Procurement-Workflow erzwungen.
        howTo:
          - step: "Pre-Award-Assessment-Form (CAIQ, SIG)"
          - step: "Veto-Schwellen"
          - step: "Procurement-Integration"
        evidenceExamples:
          - "Pre-Award-Assessment-Beispiel"
          - "Procurement-Workflow"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- ID.IM: Improvement ----
      - id: NIST-CSF-2.0:ID.IM-01
        title: "Improvements aus Assessments identifiziert"
        weight: 2
        answerType: scale
        tags: [identify, improvement, assessment]
        question: |
          Werden aus Cybersecurity-Assessments (intern und extern) konkrete
          Verbesserungs-Maßnahmen abgeleitet, priorisiert und nachverfolgt?
        purpose: |
          Assessments sind nur dann wertvoll, wenn aus den Ergebnissen
          Handlung wird. „Assessed and forgotten" ist Bürokratie.
        expectedOutcome: |
          - Findings-Tracker mit Owner und Status.
          - Quartals-Status-Reporting.
          - Closure-Rate als KPI.
        howTo:
          - step: "Findings-Tracker einführen"
          - step: "Owner-Pflichten dokumentieren"
          - step: "KPI: % Closure innerhalb SLA"
        evidenceExamples:
          - "Findings-Tracker"
          - "Letztes Status-Reporting"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.IM-02
        title: "Improvements aus Security-Tests und -Exercises identifiziert"
        weight: 2
        answerType: scale
        tags: [identify, improvement, testing]
        question: |
          Werden aus Pen-Tests, Red-Team-Exercises und Tabletop-Übungen
          systematisch Verbesserungen abgeleitet und umgesetzt?
        purpose: |
          Tests ohne Lerntransfer sind teurer Theater. Konsequente Auswertung
          unterscheidet wirkliche Resilienz von Compliance-Show.
        expectedOutcome: |
          - Lessons-Learned-Dokumentation nach jedem Test.
          - Action-Items im Tracker.
          - Re-Test bei Critical-Items.
        howTo:
          - step: "Lessons-Learned-Template"
          - step: "Action-Items in Tracker"
          - step: "Re-Test-Policy für Critical-Findings"
        evidenceExamples:
          - "Lessons-Learned-Bericht"
          - "Action-Items-Liste"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.IM-03
        title: "Improvements aus operativen Prozessen, Aktivitäten und Verfahren identifiziert"
        weight: 2
        answerType: scale
        tags: [identify, improvement, operations]
        question: |
          Werden aus dem täglichen Security-Betrieb (Tickets, Incidents,
          Audits, Metriken) systematisch Verbesserungen abgeleitet?
        purpose: |
          Continuous-Improvement-Kultur entscheidet darüber, ob ein Programm
          stagniert oder reift.
        expectedOutcome: |
          - Retro-Meetings (z. B. monatlich) mit Improvement-Backlog.
          - Metriken treiben Maßnahmen.
          - Sichtbarer Verbesserungs-Trend in KPIs.
        howTo:
          - step: "Monatliche Retros"
          - step: "Improvement-Backlog in Kanban"
          - step: "KPI-Trending"
        evidenceExamples:
          - "Retro-Protokoll"
          - "Improvement-Backlog-Screenshot"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:ID.IM-04
        title: "Incident-Response-Pläne und andere Cybersecurity-Pläne werden etabliert, kommuniziert und gepflegt"
        weight: 3
        answerType: scale
        tags: [identify, improvement, planning, incident-response]
        question: |
          Werden IR-Pläne, BCP, DRP und andere Cybersecurity-Pläne dokumentiert,
          regelmäßig kommuniziert und mindestens jährlich aktualisiert?
        purpose: |
          Pläne, die nur im Schrank stehen, helfen niemandem. Kommunikation
          und Aktualität sind die Lebenslinien eines Plans.
        expectedOutcome: |
          - Pläne aktuell (≤12 Monate alt).
          - In Tabletop-Exercises erprobt.
          - Verteilt an alle Stakeholder.
        howTo:
          - step: "Plan-Inventory pflegen"
          - step: "Annual-Review-Kalender"
          - step: "Tabletop-Pflicht"
        evidenceExamples:
          - "Plan-Inventory"
          - "Letzte Tabletop-Aufzeichnung"
          - "Verteiler-Liste"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

  # ==========================================================================
  # PROTECT (PR) — 22 Subcategories
  # ==========================================================================
  - id: PR
    name: "Protect — Safeguards Implementation"
    description: |
      Konkrete Schutzmaßnahmen umsetzen — von Identity über Daten- und
      Plattform-Sicherheit bis zur Infrastruktur-Resilienz.

    controls:

      # ---- PR.AA: Identity Management, Authentication, and Access Control ----
      - id: NIST-CSF-2.0:PR.AA-01
        title: "Identitäten und Credentials werden gemanaged"
        weight: 3
        answerType: scale
        tags: [protect, identity, iam]
        question: |
          Werden Identitäten und Credentials zentral gemanaged, mit klarem
          Lifecycle (Joiner-Mover-Leaver) und auditierbarer Veränderungshistorie?
        purpose: |
          Verwaiste Accounts und unklare Identitäts-Lifecycles sind die
          häufigste Ursache für laterale Bewegung nach Initial-Compromise.
        expectedOutcome: |
          - Zentrales IAM-System (AD, Entra, Okta).
          - JML-Prozesse automatisiert.
          - Audit-Logs der Identitäts-Änderungen.
        howTo:
          - step: "IAM-System als Single-Source-of-Truth etablieren"
          - step: "JML-Automation aus HR-System"
          - step: "Audit-Log-Retention konfigurieren"
        evidenceExamples:
          - "IAM-Architektur-Diagramm"
          - "JML-Workflow-Doku"
          - "Audit-Log-Sample"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.AA-02
        title: "Identitäten werden vor Authentifizierung verifiziert"
        weight: 3
        answerType: scale
        tags: [protect, identity, verification]
        question: |
          Werden Identitäten vor Issuance von Credentials (z. B. Account-
          Erstellung, Privileg-Erhöhung) angemessen verifiziert?
        purpose: |
          Schwache Identitäts-Verifikation öffnet die Tür für Social-
          Engineering-Angriffe via Helpdesk.
        expectedOutcome: |
          - Identitäts-Proofing-Standard (z. B. NIST 800-63 IAL-2 für sensible Rollen).
          - Helpdesk-Skripte für Reset-Anfragen.
          - Audit-Trail.
        howTo:
          - step: "IAL-Levels definieren"
          - step: "Helpdesk-Skripte"
          - step: "Trainingsmodul"
        evidenceExamples:
          - "Identity-Proofing-Policy"
          - "Helpdesk-Skript"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.AA-03
        title: "User-, Service- und Hardware-Identitäten werden authentifiziert"
        weight: 3
        answerType: scale
        tags: [protect, identity, authentication, mfa]
        question: |
          Werden alle Identitäten (Menschen, Services, Geräte) stark
          authentifiziert (MFA für Menschen, Zertifikate für Services/Geräte)?
        purpose: |
          Passwort-only-Auth ist die größte Single-Source-of-Compromise.
          Strong-Auth ist die kostengünstigste Härtung.
        expectedOutcome: |
          - MFA für 100 % der Mitarbeiter.
          - Service-Identitäten via mTLS/SPIFFE.
          - Geräte-Identität via Zertifikat.
        howTo:
          - step: "MFA-Rollout (TOTP/WebAuthn)"
          - step: "Service-Identitäten mit Cert-Mgmt"
          - step: "Device-Cert in MDM"
        evidenceExamples:
          - "MFA-Coverage-Report"
          - "Cert-Mgmt-Architektur"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.AA-04
        title: "Identitäts-Behauptungen werden geschützt, transportiert und verifiziert"
        weight: 2
        answerType: scale
        tags: [protect, identity, federation, sso]
        question: |
          Werden Identitäts-Behauptungen (Tokens, Assertions) sicher
          transportiert (TLS, signiert) und an der Service-Seite verifiziert?
        purpose: |
          Token-Diebstahl und -Forgery sind häufige Angriffsvektoren.
          Signatur- und Transport-Schutz schließt diese Lücke.
        expectedOutcome: |
          - SAML/OIDC mit Signatur-Validation.
          - Short-lived-Tokens.
          - TLS-Pflicht.
        howTo:
          - step: "IdP konfigurieren (Signatur-Algorithmen)"
          - step: "Token-TTLs setzen"
          - step: "TLS-Enforcement"
        evidenceExamples:
          - "IdP-Konfiguration"
          - "Token-TTL-Policy"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 1"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.AA-05
        title: "Access Permissions, Entitlements und Authorizations werden definiert und gemanaged nach Least-Privilege und Separation-of-Duties"
        weight: 3
        answerType: scale
        tags: [protect, identity, least-privilege, sod]
        question: |
          Werden Zugriffsrechte nach Least-Privilege und Separation-of-Duties
          vergeben, mit Reviews und automatischer Berechtigungs-Bereinigung?
        purpose: |
          Übermäßige Privilegien sind ein Multiplikator für jeden Compromise.
          Regelmäßige Reviews halten Berechtigungen schlank.
        expectedOutcome: |
          - Rollen-Modell mit Least-Privilege.
          - Quartals-Review aller privilegierten Konten.
          - SoD-Konflikt-Erkennung.
        howTo:
          - step: "Rollen-Modell entwickeln"
          - step: "Quartals-Review etablieren"
          - step: "SoD-Matrix"
        evidenceExamples:
          - "Rollen-Modell"
          - "Review-Bericht"
          - "SoD-Matrix"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      - id: NIST-CSF-2.0:PR.AA-06
        title: "Physischer Zugriff auf Assets gemanaged, überwacht und durchgesetzt nach Risiko"
        weight: 2
        answerType: scale
        tags: [protect, identity, physical-access]
        question: |
          Wird physischer Zugriff zu Cybersecurity-relevanten Ressourcen
          (Rechenzentrum, Server-Räume, Wiring) authorisiert, überwacht und
          dokumentiert?
        purpose: |
          Physischer Zugriff übersteuert oft logische Kontrollen. Ein
          unkontrolliertes RZ ist eine Single-Tür zur kompletten Infrastruktur.
        expectedOutcome: |
          - Badge-System mit Audit-Logs.
          - Visitor-Mgmt-Prozess.
          - CCTV für sensible Bereiche.
        howTo:
          - step: "Badge-System mit Zonen"
          - step: "Visitor-Log"
          - step: "CCTV-Retention"
        evidenceExamples:
          - "Badge-System-Konfiguration"
          - "Visitor-Log-Sample"
        scoring:
          scale: "0-5+NA"
          passWhen: "score >= 4 AND evidenceCount >= 2"
          gapWhen: "score <= 2 OR evidenceCount == 0"

      # ---- PR.AT: Awareness and Training ----
      - id: NIST-CSF-2.0:PR.AT-01
        title: "Personal wird im Bereich Cybersecurity-Awareness ausgebildet"
        weight: 2
        answerType: scale
        tags: [protect, awareness, training]
        question: |
          Erhalten alle Mitarbeiter regelmäßige Cybersecurity-Awareness-
          Schulungen (mind. jährlich) mit dokumentiertem Abschluss?
        purpose: |
          Phishing bleibt der Einstieg #1. Awareness ist die kostengünstigste
          Layer-Defense gegen Social Engineering.
        expectedOutcome: |
          - 100 % Coverage der Mitarbeiter pro Jahr.
          - Phishing-Simulationen quartalsweise.
          - Trend-Verbesserung in Klick-Rate.
        howTo:
