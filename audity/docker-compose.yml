services:
  audity-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: audity-web
    ports:
      - "${AUDITY_WEB_BIND:-127.0.0.1}:${AUDITY_WEB_PORT:-80}:8080"
    user: "101:101"
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=1777
      - /var/run:uid=101,gid=101,mode=1777
      - /tmp:uid=101,gid=101,mode=1777
      - /etc/nginx/conf.d:uid=101,gid=101,mode=1777
    environment:
      AUDITY_CSP_CONNECT_EXTRA: ${AUDITY_CSP_CONNECT_EXTRA:-http://localhost:9000 http://127.0.0.1:9000}
    depends_on:
      audity-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  audity-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: audity-api
    # default = internet (SMTP/LLM/etc.); audity-internal = reachable by the console runner.
    networks:
      - default
      - audity-internal
    # No `user:` here on purpose — the entrypoint starts as root only long
    # enough to fix ownership of volume-backed dirs (e.g. /app/archive on
    # an externally-created named volume) and then drops to the `node`
    # user via su-exec. Pinning user: "1000:1000" here would block the
    # privilege drop and crash with `su-exec: setgroups: Operation not
    # permitted`.
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./audity_frameworks:/app/audity_frameworks:ro
      - ./user_frameworks:/app/user_frameworks
      - audity-archive:/app/archive
      - audity-log-archive:/app/log-archive
    environment:
      AUDITY_ENV: ${AUDITY_ENV:-production}
      AUDITY_IMAGE_REGISTRY: ${AUDITY_IMAGE_REGISTRY:-ghcr.io/ozel0t-g}
      AUDITY_VERSION: ${AUDITY_VERSION:-latest}
      AUDITY_UPDATE_REPOSITORY: ${AUDITY_UPDATE_REPOSITORY:-Ozel0t-G/Audity-Streamline-the-Audit-Process}
      AUDITY_UPDATE_BRANCH: ${AUDITY_UPDATE_BRANCH:-production}
      AUDITY_UPDATE_CHANNEL: ${AUDITY_UPDATE_CHANNEL:-production}
      AUDITY_UPDATE_MANIFEST_PATH: ${AUDITY_UPDATE_MANIFEST_PATH:-audity/update-channel.json}
      AUDITY_UPDATE_CHECK_URL: ${AUDITY_UPDATE_CHECK_URL:-}
      AUDITY_UPDATER_URL: ${AUDITY_UPDATER_URL:-http://audity-updater:3099}
      AUDITY_UPDATER_TOKEN: ${AUDITY_UPDATER_TOKEN:-}
      AUDITY_PUBLIC_URL: ${AUDITY_PUBLIC_URL:-http://localhost}
      AUDITY_APP_SECRET: ${AUDITY_APP_SECRET:-change-me}
      AUDITY_ENCRYPTION_KEY: ${AUDITY_ENCRYPTION_KEY:-replace-with-base64-encoded-32-byte-key}
      AUDITY_LICENSE_PUBLIC_KEY: ${AUDITY_LICENSE_PUBLIC_KEY:-}
      AUDITY_LICENSE_GRACE_DAYS: ${AUDITY_LICENSE_GRACE_DAYS:-30}
      AUDITY_DATABASE_URL: ${AUDITY_DATABASE_URL:-postgres://audity:change-me@audity-db:5432/audity}
      AUDITY_REDIS_URL: ${AUDITY_REDIS_URL:-redis://audity-redis:6379}
      AUDITY_STORAGE_PROVIDER: ${AUDITY_STORAGE_PROVIDER:-minio}
      AUDITY_STORAGE_ENDPOINT: ${AUDITY_STORAGE_ENDPOINT:-http://audity-storage:9000}
      AUDITY_STORAGE_PUBLIC_ENDPOINT: ${AUDITY_STORAGE_PUBLIC_ENDPOINT:-}
      AUDITY_STORAGE_BUCKET: ${AUDITY_STORAGE_BUCKET:-audity-evidence}
      AUDITY_BACKUP_BUCKET: ${AUDITY_BACKUP_BUCKET:-audity-backups}
      AUDITY_STORAGE_ACCESS_KEY: ${AUDITY_STORAGE_ACCESS_KEY:-replace-me}
      AUDITY_STORAGE_SECRET_KEY: ${AUDITY_STORAGE_SECRET_KEY:-replace-me}
      AUDITY_UPLOAD_MAX_BYTES: ${AUDITY_UPLOAD_MAX_BYTES:-26214400}
      AUDITY_UPLOAD_ALLOWED_TYPES: ${AUDITY_UPLOAD_ALLOWED_TYPES:-application/pdf,text/plain,text/csv,image/png,image/jpeg,application/json}
      AUDITY_AUDITY_YAML_DIR: ${AUDITY_AUDITY_YAML_DIR:-audity_frameworks}
      AUDITY_USER_YAML_DIR: ${AUDITY_USER_YAML_DIR:-user_frameworks}
      AUDITY_USER_SOURCES_DIR: ${AUDITY_USER_SOURCES_DIR:-user_frameworks/_sources}
      AUDITY_FRAMEWORK_YAML_SYNC_INTERVAL_SECONDS: ${AUDITY_FRAMEWORK_YAML_SYNC_INTERVAL_SECONDS:-10}
      AUDITY_DEFAULT_FRAMEWORK_KEY: ${AUDITY_DEFAULT_FRAMEWORK_KEY:-nist-csf-2}
      AUDITY_DEFAULT_FRAMEWORK_ID: ${AUDITY_DEFAULT_FRAMEWORK_ID:-}
      AUDITY_REQUIRE_MFA: ${AUDITY_REQUIRE_MFA:-false}
      AUDITY_PUBLIC_REGISTRATION: ${AUDITY_PUBLIC_REGISTRATION:-false}
      AUDITY_SEED_ADMIN_EMAIL: ${AUDITY_SEED_ADMIN_EMAIL:-admin@audity.local}
      AUDITY_SEED_ADMIN_PASSWORD: ${AUDITY_SEED_ADMIN_PASSWORD:-change-me-now}
      AUDITY_SMTP_ENABLED: ${AUDITY_SMTP_ENABLED:-false}
      AUDITY_SMTP_HOST: ${AUDITY_SMTP_HOST:-smtp.example.com}
      AUDITY_SMTP_PORT: ${AUDITY_SMTP_PORT:-587}
      AUDITY_SMTP_TLS: ${AUDITY_SMTP_TLS:-true}
      AUDITY_SMTP_USER: ${AUDITY_SMTP_USER:-replace-me}
      AUDITY_SMTP_PASSWORD: ${AUDITY_SMTP_PASSWORD:-replace-me}
      AUDITY_LOG_LEVEL: ${AUDITY_LOG_LEVEL:-info}
      AUDITY_SESSION_IDLE_TIMEOUT_MINUTES: ${AUDITY_SESSION_IDLE_TIMEOUT_MINUTES:-30}
      AUDITY_ALLOWED_ORIGINS: ${AUDITY_ALLOWED_ORIGINS:-}
      AUDITY_SERVER_CONSOLE_ENABLED: ${AUDITY_SERVER_CONSOLE_ENABLED:-false}
      AUDITY_CONSOLE_RUNNER_URL: ${AUDITY_CONSOLE_RUNNER_URL:-http://audity-console-runner:3100}
      AUDITY_CONSOLE_RUNNER_TOKEN: ${AUDITY_CONSOLE_RUNNER_TOKEN:-}
      AUDITY_CONSOLE_IDLE_TIMEOUT_SECONDS: ${AUDITY_CONSOLE_IDLE_TIMEOUT_SECONDS:-600}
      AUDITY_CONSOLE_MAX_SESSION_SECONDS: ${AUDITY_CONSOLE_MAX_SESSION_SECONDS:-1800}
    ports:
      - "${AUDITY_API_BIND:-127.0.0.1}:${AUDITY_API_PORT:-3000}:3000"
    depends_on:
      audity-db:
        condition: service_healthy
      audity-redis:
        condition: service_healthy
      audity-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Maintenance-console executor: token-gated, runs ONLY the allowlisted maintenance
  # commands (no shell). It is the single component with the Docker socket, so it can
  # restart/inspect containers — but only via the fixed allowlist in apps/updater.
  # Started with `--profile console`; reachable only by the API over the internal network.
  audity-updater:
    build:
      context: .
      dockerfile: apps/updater/Dockerfile
    container_name: audity-updater
    profiles: ["console"]
    networks:
      - audity-internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      AUDITY_UPDATER_TOKEN: ${AUDITY_UPDATER_TOKEN:-}
      AUDITY_UPDATE_SCRIPT: ./scripts/update.sh
      AUDITY_COMPOSE_FILE: docker-compose.yml
    volumes:
      # The one privileged grant — confined to the allowlist-only, token-gated updater.
      - /var/run/docker.sock:/var/run/docker.sock

  audity-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: audity-worker
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./user_frameworks:/app/user_frameworks
    environment:
      AUDITY_APP_SECRET: ${AUDITY_APP_SECRET:-change-me}
      AUDITY_ENCRYPTION_KEY: ${AUDITY_ENCRYPTION_KEY:-replace-with-base64-encoded-32-byte-key}
      AUDITY_LICENSE_PUBLIC_KEY: ${AUDITY_LICENSE_PUBLIC_KEY:-}
      AUDITY_LICENSE_GRACE_DAYS: ${AUDITY_LICENSE_GRACE_DAYS:-30}
      AUDITY_DATABASE_URL: ${AUDITY_DATABASE_URL:-postgres://audity:change-me@audity-db:5432/audity}
      AUDITY_REDIS_URL: ${AUDITY_REDIS_URL:-redis://audity-redis:6379}
      AUDITY_USER_YAML_DIR: ${AUDITY_USER_YAML_DIR:-user_frameworks}
      AUDITY_USER_SOURCES_DIR: ${AUDITY_USER_SOURCES_DIR:-user_frameworks/_sources}
      AUDITY_STORAGE_ENDPOINT: ${AUDITY_STORAGE_ENDPOINT:-http://audity-storage:9000}
      AUDITY_STORAGE_PUBLIC_ENDPOINT: ${AUDITY_STORAGE_PUBLIC_ENDPOINT:-}
      AUDITY_STORAGE_BUCKET: ${AUDITY_STORAGE_BUCKET:-audity-evidence}
      AUDITY_BACKUP_BUCKET: ${AUDITY_BACKUP_BUCKET:-audity-backups}
      AUDITY_STORAGE_ACCESS_KEY: ${AUDITY_STORAGE_ACCESS_KEY:-replace-me}
      AUDITY_STORAGE_SECRET_KEY: ${AUDITY_STORAGE_SECRET_KEY:-replace-me}
      AUDITY_SMTP_ENABLED: ${AUDITY_SMTP_ENABLED:-false}
      AUDITY_SMTP_HOST: ${AUDITY_SMTP_HOST:-smtp.example.com}
      AUDITY_SMTP_PORT: ${AUDITY_SMTP_PORT:-587}
      AUDITY_SMTP_TLS: ${AUDITY_SMTP_TLS:-true}
      AUDITY_SMTP_USER: ${AUDITY_SMTP_USER:-replace-me}
      AUDITY_SMTP_PASSWORD: ${AUDITY_SMTP_PASSWORD:-replace-me}
      AUDITY_LOG_LEVEL: ${AUDITY_LOG_LEVEL:-info}
      WORKER_HEALTH_PORT: 3001
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    depends_on:
      audity-db:
        condition: service_healthy
      audity-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  audity-db:
    image: postgres@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae
    container_name: audity-db
    networks:
      - default
      - audity-internal
    environment:
      POSTGRES_DB: ${AUDITY_POSTGRES_DB:-audity}
      POSTGRES_USER: ${AUDITY_POSTGRES_USER:-audity}
      POSTGRES_PASSWORD: ${AUDITY_POSTGRES_PASSWORD:-change-me}
    volumes:
      - audity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10

  audity-redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: audity-redis
    networks:
      - default
      - audity-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  audity-storage:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: audity-storage
    networks:
      - default
      - audity-internal
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AUDITY_STORAGE_ACCESS_KEY:-replace-me}
      MINIO_ROOT_PASSWORD: ${AUDITY_STORAGE_SECRET_KEY:-replace-me}
    ports:
      - "${AUDITY_MINIO_BIND:-127.0.0.1}:${AUDITY_MINIO_API_PORT:-9000}:9000"
      - "${AUDITY_MINIO_CONSOLE_BIND:-127.0.0.1}:${AUDITY_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - audity-storage-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  # Normal bridge with internet egress (default for most services).
  default: {}
  # No internet gateway: containers on this network can reach each other but NOT the
  # internet. The maintenance console runs ONLY here, so it can reach local server
  # services but can never phone home / exfiltrate to the outside.
  audity-internal:
    internal: true

volumes:
  audity-db-data:
  audity-storage-data:
  audity-archive:
  audity-log-archive:
